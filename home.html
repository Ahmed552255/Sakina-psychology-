<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — الرئيسية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        /* ======================================== */
        /* --- 1. المتغيرات ونظام الألوان --- */
        /* ======================================== */
        :root {
            --primary: #82CFCF; --accent: #4a9d9d; --accent-dark: #337e7e;
            --bg: #f4f9f9; --white: #fff; --ink: #2c3e50; --text-sec: #7f8c8d;
            --grad: linear-gradient(135deg, var(--primary), var(--accent));
            --shadow: 0 8px 32px rgba(74, 157, 157, 0.12);
            --shadow-lg: 0 16px 45px rgba(74, 157, 157, 0.18);
            --radius: 26px;
        }

        /* ======================================== */
        /* --- 2. الإعدادات العامة --- */
        /* ======================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: 'Cairo', sans-serif; color: var(--ink); min-height: 100vh;
            overflow-x: hidden;
            background-color: var(--bg);
            position: relative;
            padding-bottom: 110px;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* ======================================== */
        /* --- 3. الخلفية والأشكال العائمة --- */
        /* ======================================== */
        .bg-orbs { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none; animation: float 40s infinite alternate; }
        .orb1 { width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(130, 207, 207, 0.2) 0%, transparent 70%); top: -15%; right: -15%; animation-duration: 35s; }
        .orb2 { width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(74, 157, 157, 0.12) 0%, transparent 70%); bottom: -10%; left: -10%; animation-duration: 45s; animation-direction: alternate-reverse; }
        @keyframes float { from { transform: translate(0, 0) scale(1); } to { transform: translate(5%, 8%) scale(1.1); } }

        /* ======================================== */
        /* --- 4. رأس الصفحة وأدوات الفلترة --- */
        /* ======================================== */
        .page-header { padding: 2rem 1.5rem 1.5rem; }
        .filters-container { max-width: 800px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
        .search-bar { position: relative; flex-grow: 1; }
        .search-bar input {
            width: 100%; height: 56px; padding: 0 4rem 0 1.5rem; border-radius: 18px;
            border: 1.5px solid #eaf1f1; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); font-size: 1rem; font-family: 'Cairo', sans-serif;
            outline: none; box-shadow: var(--shadow); transition: all 0.3s;
        }
        .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(130, 207, 207, 0.25); }
        .search-bar .icon { position: absolute; top: 50%; right: 1.5rem; transform: translateY(-50%); color: var(--text-sec); pointer-events: none; }

        .dropdown-filter { position: relative; flex-shrink: 0; }
        .dropdown-btn {
            display: flex; align-items: center; gap: 0.5rem; height: 56px; padding: 0 1.5rem;
            border-radius: 18px; border: 1.5px solid #eaf1f1; background: rgba(255, 255, 255, 0.85);
            font-size: 1rem; font-family: 'Cairo', sans-serif; font-weight: 600; color: var(--ink);
            cursor: pointer; box-shadow: var(--shadow); transition: all 0.3s;
        }
        .dropdown-btn:hover { border-color: var(--primary); }
        .dropdown-content {
            display: none; position: absolute; top: 110%; left: 0; background: var(--white);
            border-radius: 18px; box-shadow: var(--shadow-lg); padding: 0.5rem; z-index: 10;
            min-width: 240px; border: 1px solid rgba(0,0,0,0.05); animation: fadeIn 0.2s ease-out;
        }
        .dropdown-content.show { display: block; }
        .dropdown-item {
            padding: 0.8rem 1.2rem; border-radius: 14px; cursor: pointer; font-weight: 500;
            transition: background-color 0.2s, color 0.2s; display: flex; align-items: center; gap: 0.75rem;
        }
        .dropdown-item:hover { background-color: var(--bg); color: var(--accent-dark); }
        .dropdown-item.active { background: var(--grad); color: var(--white); font-weight: 700; }
        .dropdown-item i { color: var(--accent); transition: color 0.2s; }
        .dropdown-item.active i { color: var(--white); }

        /* ======================================== */
        /* --- 5. قائمة الأطباء --- */
        /* ======================================== */
        .doctors-list { max-width: 800px; margin: 2.5rem auto 0; padding: 0 1.5rem; display: grid; gap: 1.5rem; }
        .doctor-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1); border-radius: var(--radius);
            box-shadow: var(--shadow); padding: 1.5rem;
            display: flex; flex-direction: column; justify-content: space-between; /* تعديل هنا */
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.5s ease-out forwards; opacity: 0;
        }
        .doctor-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-lg); }
        @keyframes fadeIn { to { opacity: 1; } }

        .doctor-main-info { display: flex; gap: 1.5rem; align-items: flex-start; }
        .doctor-image {
            width: 100px; height: 100px; border-radius: 22px; object-fit: cover;
            flex-shrink: 0; border: 4px solid var(--white); box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }
        .doctor-details { flex-grow: 1; text-align: right; display: flex; flex-direction: column; } /* تعديل هنا */
        .doctor-details h3 { font-size: 1.3rem; font-weight: 700; color: var(--accent-dark); margin-bottom: 0.25rem; }
        .doctor-details .specialty { font-size: 0.95rem; font-weight: 600; color: var(--accent); margin-bottom: 0.75rem; }
        .doctor-details .description { font-size: 0.95rem; color: var(--text-sec); line-height: 1.8; flex-grow: 1; margin-bottom: 1rem; } /* تعديل هنا */
        
        .btn-book {
            width: 100%; padding: 0.85rem; border: none; border-radius: 16px;
            font-size: 1.05rem; font-weight: 700; font-family: 'Cairo', sans-serif;
            cursor: pointer; transition: all 0.3s ease; background: var(--grad);
            color: white; box-shadow: 0 4px 15px rgba(74, 157, 157, 0.3);
            margin-top: auto; /* تعديل هنا */
        }
        .btn-book:hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(74, 157, 157, 0.4); }
        
        .no-results { text-align: center; padding: 3rem; color: var(--text-sec); display: none; }
        .no-results i { font-size: 3.5rem; color: var(--primary); margin-bottom: 1rem; }

        @media (max-width: 600px) {
            .filters-container { flex-direction: column; align-items: stretch; }
            .doctor-main-info { flex-direction: column; align-items: center; text-align: center; }
            .doctor-details { text-align: center; }
        }

        /* ======================================== */
        /* --- 6. شريط التنقل السفلي --- */
        /* ======================================== */
        .bottom-nav {
            position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 28px); max-width: 460px; background: rgba(255,255,255,.9);
            backdrop-filter: blur(20px); border-radius: 24px; display: flex;
            justify-content: space-around; align-items: center; padding: 9px 6px;
            box-shadow: 0 8px 36px rgba(0,0,0,.1); z-index: 400;
            border: 1px solid rgba(130, 207, 207, 0.18);
        }
        .nav-item {
            text-decoration: none; display: flex; flex-direction: column; align-items: center;
            gap: 3px; color: var(--text-sec); transition: color .2s; padding: 4px 12px;
            border-radius: 14px; position: relative;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -5px; width: 20px; height: 3px;
            border-radius: 3px; background: var(--grad);
        }
    </style>
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
    </div>

    <header class="page-header">
        <div class="filters-container" id="filtersContainer">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث عن اسم الأخصائي...">
                <i class="icon fas fa-search"></i>
            </div>
            <div class="dropdown-filter">
                <button class="dropdown-btn" id="dropdownBtn">
                    <span id="filterLabel">كل التخصصات</span>
                    <i class="fas fa-chevron-down" style="font-size: 0.8rem;"></i>
                </button>
                <div class="dropdown-content" id="dropdownContent"></div>
            </div>
        </div>
    </header>

    <main class="doctors-list" id="doctorsList"></main>
    
    <div class="no-results" id="noResults">
        <i class="fas fa-frown-open"></i>
        <p>عذرًا، لم يتم العثور على نتائج تطابق بحثك.</p>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-house-medical"></i><span>الرئيسية</span></a>
        <a href="chats.html" class="nav-item"><i class="fas fa-comments"></i><span>محادثاتي</span></a>
        <a href="agenda.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>الأجندة</span></a>
        <a href="tools.html" class="nav-item"><i class="fas fa-spa"></i><span>الأدوات</span></a>
    </nav>

    <script>
        const HOME_APP = (() => {
            'use strict';

            const specialties = {
                'all': 'كل التخصصات', 'psychiatrist': 'طبيب نفسي', 'psychologist': 'أخصائي نفسي',
                'family_counselor': 'استشاري أسري وزواجي', 'child_psychology': 'علم نفس الأطفال والمراهقين',
                'addiction_counselor': 'استشاري إدمان', 'cbt': 'معالج سلوكي معرفي', 'trauma_therapist': 'معالج صدمات نفسية'
            };

            const doctorsData = [
                { id: 'dr_ahmed_saleh', name: 'د. أحمد صالح', specialty: 'cbt', image: 'https://randomuser.me/api/portraits/men/32.jpg', description: 'متخصص في العلاج المعرفي السلوكي (CBT) لمشاكل القلق والاكتئاب.' },
                { id: 'dr_fatima_ali', name: 'د. فاطمة علي', specialty: 'family_counselor', image: 'https://randomuser.me/api/portraits/women/44.jpg', description: 'خبيرة في العلاقات الزوجية والأسرية. أساعد الأزواج والأسر على تحسين التواصل.' },
                { id: 'dr_youssef_khalid', name: 'د. يوسف خالد', specialty: 'child_psychology', image: 'https://randomuser.me/api/portraits/men/46.jpg', description: 'أعمل مع الأطفال والمراهقين لتعديل السلوكيات الصعبة مثل فرط الحركة.' },
                { id: 'dr_nour_hassan', name: 'د. نور حسن', specialty: 'psychologist', image: 'https://randomuser.me/api/portraits/women/31.jpg', description: 'أقدم الدعم النفسي للتعامل مع ضغوطات الحياة اليومية، ومشاكل تقدير الذات.' },
                { id: 'dr_mona_adel', name: 'د. منى عادل', specialty: 'trauma_therapist', image: 'https://randomuser.me/api/portraits/women/55.jpg', description: 'متخصصة في مساعدة الأفراد على تجاوز الصدمات النفسية والتجارب الصعبة (PTSD).' },
                { id: 'dr_karim_mansour', name: 'د. كريم منصور', specialty: 'psychiatrist', image: 'https://randomuser.me/api/portraits/men/58.jpg', description: 'طبيب نفسي مؤهل لتشخيص الاضطرابات النفسية ووصف العلاج الدوائي المناسب.' }
            ];

            const $ = id => document.getElementById(id);
            const elements = {
                searchInput: $('searchInput'), dropdownBtn: $('dropdownBtn'), dropdownContent: $('dropdownContent'),
                filterLabel: $('filterLabel'), doctorsList: $('doctorsList'), noResults: $('noResults')
            };

            let currentFilter = 'all';
            let currentSearchTerm = '';

            const renderDoctors = () => {
                elements.doctorsList.innerHTML = '';
                const filteredDoctors = doctorsData.filter(doctor => 
                    (currentFilter === 'all' || doctor.specialty === currentFilter) &&
                    doctor.name.toLowerCase().includes(currentSearchTerm.toLowerCase())
                );

                elements.noResults.style.display = filteredDoctors.length === 0 ? 'block' : 'none';

                filteredDoctors.forEach((doctor, index) => {
                    const card = document.createElement('div');
                    card.className = 'doctor-card';
                    card.style.animationDelay = `${index * 0.08}s`;
                    
                    // تم تعديل الـ HTML الداخلي ليتناسب مع Flexbox بشكل أفضل
                    card.innerHTML = `
                        <div class="doctor-main-info">
                            <img src="${doctor.image}" alt="${doctor.name}" class="doctor-image">
                            <div class="doctor-details">
                                <div>
                                    <h3>${doctor.name}</h3>
                                    <p class="specialty">${specialties[doctor.specialty]}</p>
                                    <p class="description">${doctor.description}</p>
                                </div>
                            </div>
                        </div>
                        <button class="btn-book" data-doctor-id="${doctor.id}">
                            <i class="fas fa-calendar-check" style="margin-left: 8px;"></i>احجز الآن
                        </button>
                    `;
                    elements.doctorsList.appendChild(card);
                });
            };
            
            const populateFilterDropdown = () => {
                elements.dropdownContent.innerHTML = '';
                for (const key in specialties) {
                    const item = document.createElement('a');
                    item.className = 'dropdown-item';
                    if (key === currentFilter) item.classList.add('active');
                    item.dataset.filter = key;
                    item.innerHTML = `<i class="fas fa-check-circle"></i> ${specialties[key]}`;
                    elements.dropdownContent.appendChild(item);
                }
            };

            const handleBooking = (event) => {
                if (event.target.classList.contains('btn-book')) {
                    const doctorId = event.target.dataset.doctorId;
                    // توجيه المستخدم لصفحة المحادثة مع تمرير كود الدكتور
                    window.location.href = `chats.html?doctor=${doctorId}`;
                }
            };

            const init = () => {
                populateFilterDropdown();
                renderDoctors();

                elements.searchInput.addEventListener('input', (e) => {
                    currentSearchTerm = e.target.value;
                    renderDoctors();
                });

                elements.dropdownBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    elements.dropdownContent.classList.toggle('show');
                });

                elements.dropdownContent.addEventListener('click', (e) => {
                    const item = e.target.closest('.dropdown-item');
                    if (item) {
                        currentFilter = item.dataset.filter;
                        elements.filterLabel.textContent = specialties[currentFilter];
                        populateFilterDropdown();
                        renderDoctors();
                        elements.dropdownContent.classList.remove('show');
                    }
                });
                
                window.addEventListener('click', () => {
                    if (elements.dropdownContent.classList.contains('show')) {
                        elements.dropdownContent.classList.remove('show');
                    }
                });

                // استخدام تفويض الأحداث للتعامل مع أزرار الحجز
                elements.doctorsList.addEventListener('click', handleBooking);
            };

            init();
        })();
    </script>
</body>
</html>
