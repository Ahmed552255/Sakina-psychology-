<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — الرئيسية</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --t50:#f0fafa; --t100:#d0eded; --t200:#a8dede;
            --t300:#98D8D8; --t500:#5aabab; --t700:#3d8a8a; --t900:#1f4f4f;
            --ink:#162828; --ink60:#4a6363; --ink30:#9ababa;
            --bg:#e4f0f0; --white:#ffffff;
            --danger:#d94f4f; --success:#38c08a; --warn:#eda84a;
            --sh-sm:0 2px 10px rgba(20,70,70,.07);
            --sh-md:0 6px 28px rgba(20,70,70,.11);
            --sh-lg:0 16px 52px rgba(20,70,70,.16);
            --r-sm:12px; --r-md:18px; --r-lg:24px; --r-xl:32px;
        }

        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html{font-size:16px;scroll-behavior:smooth;}
        body{
            font-family:'Cairo',sans-serif;
            background:var(--bg); color:var(--ink);
            min-height:100vh; overflow-x:hidden;
            padding-bottom:90px;
            position:relative;
        }

        /* ── ambient orbs ── */
        body::before{
            content:'';position:fixed;top:-100px;right:-100px;
            width:380px;height:380px;border-radius:50%;
            background:radial-gradient(circle,rgba(152,216,216,.28) 0%,transparent 70%);
            pointer-events:none;z-index:0;
        }
        body::after{
            content:'';position:fixed;bottom:-80px;left:-60px;
            width:300px;height:300px;border-radius:50%;
            background:radial-gradient(circle,rgba(61,138,138,.15) 0%,transparent 70%);
            pointer-events:none;z-index:0;
        }

        .shell{max-width:820px;margin:0 auto;padding:1.5rem 1.25rem;position:relative;z-index:1;}

        /* ── Page header ── */
        .page-head{
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;
        }
        .brand{font-size:1.6rem;font-weight:900;color:var(--t700);letter-spacing:-1px;}
        .brand span{color:var(--t300);}

        /* ── Search + filter row ── */
        .toolbar{display:flex;gap:.75rem;align-items:center;margin-bottom:1.75rem;flex-wrap:wrap;}

        .search-wrap{
            flex:1;position:relative;min-width:200px;
        }
        .search-wrap input{
            width:100%;height:50px;
            padding:0 3rem 0 1.25rem;
            border:1.5px solid var(--t100);border-radius:var(--r-lg);
            background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
            font-family:'Cairo',sans-serif;font-size:.95rem;color:var(--ink);
            outline:none;box-shadow:var(--sh-sm);
            transition:border-color .2s,box-shadow .2s,background .2s;
        }
        .search-wrap input:focus{
            border-color:var(--t500);background:var(--white);
            box-shadow:0 0 0 3px rgba(90,171,171,.18);
        }
        .search-wrap input::placeholder{color:var(--ink30);}
        .search-icon{
            position:absolute;top:50%;right:1rem;transform:translateY(-50%);
            color:var(--ink30);pointer-events:none;
        }

        /* specialty filter dropdown */
        .filter-wrap{position:relative;flex-shrink:0;}
        .filter-btn{
            display:flex;align-items:center;gap:.5rem;
            height:50px;padding:0 1.25rem;
            border:1.5px solid var(--t100);border-radius:var(--r-lg);
            background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
            font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:700;
            color:var(--ink60);cursor:pointer;box-shadow:var(--sh-sm);
            transition:border-color .2s,background .2s;white-space:nowrap;
        }
        .filter-btn:hover{border-color:var(--t500);background:var(--white);}
        .filter-chevron{transition:transform .2s;}
        .filter-btn.open .filter-chevron{transform:rotate(180deg);}

        .filter-dropdown{
            position:absolute;top:calc(100% + .5rem);left:0;
            background:var(--white);border-radius:var(--r-md);
            box-shadow:var(--sh-lg);border:1.5px solid var(--t100);
            padding:.4rem;min-width:230px;z-index:50;
            display:none;animation:dropIn .18s ease;
        }
        @keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
        .filter-dropdown.show{display:block;}
        .filter-item{
            display:flex;align-items:center;gap:.65rem;
            padding:.65rem 1rem;border-radius:var(--r-sm);
            font-size:.88rem;font-weight:600;color:var(--ink60);
            cursor:pointer;transition:background .15s,color .15s;
        }
        .filter-item:hover{background:var(--t50);color:var(--t900);}
        .filter-item.active{background:linear-gradient(135deg,var(--t700),var(--t500));color:var(--white);}
        .filter-item .fi{flex-shrink:0;}

        /* ── Doctor cards ── */
        .cards-grid{display:grid;gap:1.25rem;}

        .doc-card{
            background:rgba(255,255,255,.9);
            backdrop-filter:blur(16px);
            border:1.5px solid rgba(255,255,255,.9);
            border-radius:var(--r-xl);
            box-shadow:var(--sh-md);
            padding:1.4rem;
            display:flex;flex-direction:column;gap:1rem;
            transition:transform .25s,box-shadow .25s;
            animation:cardIn .35s ease forwards;opacity:0;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
        .doc-card:hover{transform:translateY(-5px);box-shadow:var(--sh-lg);}

        .doc-top{display:flex;gap:1.1rem;align-items:flex-start;}

        /* Avatar: shows base64 image OR initials */
        .doc-avatar{
            width:88px;height:88px;border-radius:20px;
            flex-shrink:0;object-fit:cover;
            border:3px solid var(--white);
            box-shadow:0 4px 14px rgba(20,70,70,.14);
            background:linear-gradient(135deg,var(--t500),var(--t700));
            display:flex;align-items:center;justify-content:center;
            font-size:1.6rem;font-weight:900;color:var(--white);
            overflow:hidden;
        }
        .doc-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

        .doc-info{flex:1;min-width:0;}
        .doc-name{font-size:1.1rem;font-weight:900;color:var(--t900);margin-bottom:.2rem;}
        .doc-spec{
            display:inline-flex;align-items:center;gap:.3rem;
            font-size:.78rem;font-weight:700;color:var(--t700);
            background:var(--t50);border:1px solid var(--t100);
            padding:.2rem .65rem;border-radius:99px;margin-bottom:.55rem;
        }
        .doc-bio{font-size:.87rem;color:var(--ink60);line-height:1.75;}

        /* Message button */
        .btn-msg{
            display:flex;align-items:center;justify-content:center;gap:.5rem;
            width:100%;padding:.75rem;
            background:linear-gradient(135deg,var(--t700),var(--t500));
            color:var(--white);border:none;border-radius:var(--r-md);
            font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;
            cursor:pointer;box-shadow:0 4px 14px rgba(61,138,138,.3);
            transition:transform .2s,box-shadow .2s;
        }
        .btn-msg:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(61,138,138,.4);}
        .btn-msg:active{transform:translateY(0);}

        /* ── Empty state ── */
        .empty-state{
            text-align:center;padding:3rem 1rem;
            color:var(--ink30);display:none;
        }
        .empty-state .e-icon{font-size:2.8rem;margin-bottom:.75rem;display:block;}
        .empty-state p{font-size:.95rem;}

        /* ── Skeleton loader ── */
        .skel-card{
            background:var(--white);border-radius:var(--r-xl);
            border:1.5px solid var(--t100);padding:1.4rem;
            display:flex;gap:1.1rem;align-items:flex-start;
        }
        .skel{background:var(--t100);border-radius:var(--r-sm);animation:shimmer 1.4s infinite;}
        @keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
        .skel-av{width:88px;height:88px;flex-shrink:0;border-radius:20px;}
        .skel-lines{flex:1;display:flex;flex-direction:column;gap:.6rem;padding-top:.4rem;}
        .skel-line{height:14px;border-radius:99px;}

        /* ── Sync pill ── */
        .sync-pill{
            display:inline-flex;align-items:center;gap:.4rem;
            font-size:.72rem;color:var(--ink60);padding:.3rem .8rem;
            border-radius:99px;background:var(--white);border:1px solid var(--t100);
            box-shadow:var(--sh-sm);margin-top:1rem;
        }
        .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--success);}
        .sync-dot.busy{background:var(--warn);animation:blink 1s infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

        /* ── Bottom nav ── */
        .bottom-nav{
            position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
            width:calc(100% - 28px);max-width:460px;
            background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
            border-radius:24px;display:flex;justify-content:space-around;align-items:center;
            padding:8px 6px;box-shadow:var(--sh-lg);z-index:400;
            border:1px solid rgba(152,216,216,.2);
        }
        .nav-item{
            text-decoration:none;display:flex;flex-direction:column;align-items:center;
            gap:3px;color:var(--ink30);transition:color .2s;padding:5px 14px;
            border-radius:14px;position:relative;font-size:.65rem;font-weight:700;
        }
        .nav-item.active{color:var(--t500);}
        .nav-item.active::after{
            content:'';position:absolute;bottom:-5px;width:18px;height:3px;
            border-radius:3px;background:linear-gradient(90deg,var(--t700),var(--t300));
        }

        @media(max-width:520px){
            .doc-top{flex-direction:column;align-items:center;}
            .doc-info{text-align:center;}
            .doc-spec{justify-content:center;}
        }
    </style>
</head>
<body>

<div class="shell">

    <!-- ── Header ── -->
    <header class="page-head">
        <div class="brand">سُ<span>كُون</span></div>
    </header>

    <!-- ── Toolbar ── -->
    <div class="toolbar">
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="ابحث باسم الأخصائي أو التخصص...">
            <span class="search-icon">
                <i data-feather="search" style="width:17px;height:17px"></i>
            </span>
        </div>

        <div class="filter-wrap">
            <button class="filter-btn" id="filterBtn">
                <i data-feather="sliders" style="width:15px;height:15px"></i>
                <span id="filterLabel">كل التخصصات</span>
                <i data-feather="chevron-down" style="width:14px;height:14px" class="filter-chevron"></i>
            </button>
            <div class="filter-dropdown" id="filterDropdown"></div>
        </div>
    </div>

    <!-- ── Cards ── -->
    <div class="cards-grid" id="cardsGrid">
        <!-- skeleton placeholders while loading -->
        <div class="skel-card" id="skel1">
            <div class="skel skel-av"></div>
            <div class="skel-lines">
                <div class="skel skel-line" style="width:55%"></div>
                <div class="skel skel-line" style="width:35%"></div>
                <div class="skel skel-line" style="width:90%"></div>
                <div class="skel skel-line" style="width:75%"></div>
            </div>
        </div>
        <div class="skel-card" id="skel2">
            <div class="skel skel-av"></div>
            <div class="skel-lines">
                <div class="skel skel-line" style="width:50%"></div>
                <div class="skel skel-line" style="width:30%"></div>
                <div class="skel skel-line" style="width:85%"></div>
                <div class="skel skel-line" style="width:65%"></div>
            </div>
        </div>
    </div>

    <div class="empty-state" id="emptyState">
        <span class="e-icon">🔍</span>
        <p>لم نجد أخصائيين يطابقون بحثك.</p>
    </div>

    <div class="sync-pill" id="syncPill">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">جاري التحميل...</span>
    </div>

</div><!-- /shell -->

<!-- ── Bottom nav ── -->
<nav class="bottom-nav">
    <a href="patient-home.html" class="nav-item active">
        <i data-feather="home" style="width:19px;height:19px"></i>
        <span>الرئيسية</span>
    </a>
    <a href="patient-chats.html" class="nav-item">
        <i data-feather="message-circle" style="width:19px;height:19px"></i>
        <span>محادثاتي</span>
    </a>
    <a href="patient-agenda.html" class="nav-item">
        <i data-feather="calendar" style="width:19px;height:19px"></i>
        <span>الأجندة</span>
    </a>
    <a href="patient-tools.html" class="nav-item">
        <i data-feather="wind" style="width:19px;height:19px"></i>
        <span>الأدوات</span>
    </a>
</nav>


<!-- ══════════════════════════ SCRIPT ══════════════════════════ -->
<script type="module">
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore,
             collection,
             onSnapshot }         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth,
             onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    feather.replace();

    // ── Firebase ─────────────────────────────────────────────────────────
    const app = initializeApp({
        apiKey:            "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain:        "sakina-937c4.firebaseapp.com",
        projectId:         "sakina-937c4",
        storageBucket:     "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId:             "1:25215790734:web:46c5d893d5818530b3a3df"
    });
    const db   = getFirestore(app);
    const auth = getAuth(app);

    // ── IndexedDB cache ───────────────────────────────────────────────────
    class IDB {
        constructor(){ this.db = null; }
        async init(){
            return new Promise((res,rej)=>{
                const r = indexedDB.open('SakoonPatientHomeDB',1);
                r.onerror = ()=>rej(r.error);
                r.onsuccess = ()=>{ this.db=r.result; res(); };
                r.onupgradeneeded = ({target})=>{
                    const d = target.result;
                    if(!d.objectStoreNames.contains('doctors'))
                        d.createObjectStore('doctors',{keyPath:'id'});
                };
            });
        }
        _tx(m='readonly'){ return this.db.transaction(['doctors'],m).objectStore('doctors'); }
        _p(r){ return new Promise((res,rej)=>{ r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
        getAll()  { return this._p(this._tx().getAll()).then(r=>r||[]); }
        put(d)    { return this._p(this._tx('readwrite').put(d)); }
        clear()   { return this._p(this._tx('readwrite').clear()); }
    }
    const idb = new IDB();

    // ── Specialty labels ─────────────────────────────────────────────────
    const SPEC = {
        all:               'كل التخصصات',
        psychiatrist:      'طبيب نفسي',
        psychologist:      'أخصائي نفسي',
        family_counselor:  'استشاري أسري وزواجي',
        child_psychology:  'علم نفس الأطفال والمراهقين',
        addiction_counselor:'استشاري إدمان',
        cbt:               'معالج سلوكي معرفي',
        trauma_therapist:  'معالج صدمات نفسية',
    };

    // ── Sync indicator ────────────────────────────────────────────────────
    const setSyncing = (busy,msg)=>{
        document.getElementById('syncDot').className = 'sync-dot'+(busy?' busy':'');
        document.getElementById('syncText').textContent = msg??(busy?'جاري المزامنة...':'محدَّث ✓');
    };

    // ── State ─────────────────────────────────────────────────────────────
    let allDoctors   = [];
    let filterSpec   = 'all';
    let searchTerm   = '';
    let patientUid   = null;

    // ── Build specialty filter dropdown ──────────────────────────────────
    const buildDropdown = () => {
        const dd = document.getElementById('filterDropdown');
        dd.innerHTML = '';
        // collect unique specialties from loaded doctors + 'all'
        const presentSpecs = new Set(allDoctors.map(d=>d.specialty||'').filter(Boolean));
        const keys = ['all', ...Object.keys(SPEC).filter(k=>k!=='all' && presentSpecs.has(k))];

        keys.forEach(key=>{
            const item = document.createElement('div');
            item.className = 'filter-item'+(filterSpec===key?' active':'');
            item.dataset.spec = key;
            item.innerHTML = `<i data-feather="check-circle" class="fi" style="width:13px;height:13px"></i>${SPEC[key]||key}`;
            dd.appendChild(item);
        });
        feather.replace();
    };

    // ── Render cards ─────────────────────────────────────────────────────
    const renderCards = () => {
        // remove skeletons once we have data
        ['skel1','skel2'].forEach(id=>{ const el=document.getElementById(id); if(el) el.remove(); });

        const filtered = allDoctors.filter(d=>{
            const matchSpec = filterSpec==='all' || d.specialty===filterSpec;
            const q = searchTerm.toLowerCase();
            const matchSearch = !q
                || (d.name||'').includes(q)
                || (d.specialty||'').includes(q)
                || (SPEC[d.specialty]||'').includes(q)
                || (d.bio||d.description||'').includes(q);
            return matchSpec && matchSearch;
        });

        const grid   = document.getElementById('cardsGrid');
        const empty  = document.getElementById('emptyState');
        grid.innerHTML = '';

        empty.style.display = filtered.length===0 ? 'block' : 'none';

        filtered.forEach((doc,i)=>{
            const card = document.createElement('div');
            card.className = 'doc-card';
            card.style.animationDelay = `${i*0.07}s`;

            // Avatar: base64 image OR initials
            const avatarHTML = doc.avatarB64
                ? `<div class="doc-avatar"><img src="${doc.avatarB64}" alt="${doc.name}"></div>`
                : `<div class="doc-avatar">${(doc.name||'د').trim().charAt(0)}</div>`;

            const specLabel = SPEC[doc.specialty] || doc.specialty || '';
            const bio       = doc.bio || doc.description || '';

            card.innerHTML = `
                <div class="doc-top">
                    ${avatarHTML}
                    <div class="doc-info">
                        <div class="doc-name">${doc.name||'—'}</div>
                        <div class="doc-spec">
                            <i data-feather="award" style="width:12px;height:12px"></i>
                            ${specLabel}
                        </div>
                        <div class="doc-bio">${bio}</div>
                    </div>
                </div>
                <button class="btn-msg" data-uid="${doc.uid||doc.id}">
                    <i data-feather="message-circle" style="width:17px;height:17px"></i>
                    راسل الآن
                </button>`;

            grid.appendChild(card);
        });

        feather.replace();
    };

    // ── Message button → conversation page ───────────────────────────────
    document.getElementById('cardsGrid').addEventListener('click', e=>{
        const btn = e.target.closest('.btn-msg');
        if(!btn) return;
        const doctorId = btn.dataset.uid;
        if(!doctorId) return;
        // Go to conversation; pass doctorId as patientId param
        // (the conversation page uses patientId from doctor's perspective,
        //  here we pass doctorId and patient is the current user)
        window.location.href = `patient-conversation.html?doctorId=${encodeURIComponent(doctorId)}`;
    });

    // ── Search ────────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e=>{
        searchTerm = e.target.value.trim();
        renderCards();
    });

    // ── Filter button toggle ──────────────────────────────────────────────
    const filterBtn      = document.getElementById('filterBtn');
    const filterDropdown = document.getElementById('filterDropdown');

    filterBtn.addEventListener('click', e=>{
        e.stopPropagation();
        const open = filterDropdown.classList.toggle('show');
        filterBtn.classList.toggle('open', open);
    });
    document.addEventListener('click',()=>{
        filterDropdown.classList.remove('show');
        filterBtn.classList.remove('open');
    });
    filterDropdown.addEventListener('click', e=>{
        const item = e.target.closest('.filter-item');
        if(!item) return;
        filterSpec = item.dataset.spec;
        document.getElementById('filterLabel').textContent = SPEC[filterSpec]||filterSpec;
        buildDropdown();
        renderCards();
        filterDropdown.classList.remove('show');
        filterBtn.classList.remove('open');
    });

    // ── Load from cache, then listen live ────────────────────────────────
    const bootstrap = async () => {
        await idb.init();

        // ① show cached doctors immediately
        const cached = await idb.getAll();
        if(cached.length){
            allDoctors = cached;
            buildDropdown();
            renderCards();
            setSyncing(false,'من الكاش');
        }

        // ② real-time listener on 'doctors' collection
        setSyncing(true,'جاري المزامنة...');

        onSnapshot(collection(db,'doctors'), async snap=>{
            setSyncing(true,'تحديث...');
            await idb.clear();
            allDoctors = [];

            for(const d of snap.docs){
                const data = d.data();
                const entry = {
                    id:          d.id,
                    uid:         data.uid || d.id,
                    name:        data.name        || '',
                    specialty:   data.specialty   || '',
                    bio:         data.bio         || data.description || '',
                    avatarB64:   data.avatarB64   || '',
                    updatedAt:   data.updatedAt?.seconds || 0
                };
                allDoctors.push(entry);
                await idb.put(entry);
            }

            buildDropdown();
            renderCards();
            setSyncing(false);
        }, err=>{
            console.error('Doctors listener:', err);
            setSyncing(false,'⚠️ لا يوجد اتصال — يُعرض من الكاش');
        });
    };

    // ── Auth (patient must be signed in) ─────────────────────────────────
    onAuthStateChanged(auth, user=>{
        if(user){
            patientUid = user.uid;
            bootstrap();
        } else {
            window.location.href = 'patient-login.html';
        }
    });
</script>
</body>
</html>
