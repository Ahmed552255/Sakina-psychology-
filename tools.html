
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — مساحتي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #98D8D8;
            --accent: #5aabab;
            --accent-dark: #3d8a8a;
            --bg: #eef6f6;
            --white: #fff;
            --paper: #fffef9;
            --ink: #2c3e50;
            --text-sec: #7f8c8d;
            --danger: #ff6b6b;
            --success: #4caf93;
            --warn: #f0a500;
            --grad: linear-gradient(135deg,#98D8D8,#5aabab);
            --grad-warm: linear-gradient(135deg,#f5e6d3,#e8c5a0);
            --shadow: 0 8px 32px rgba(90,171,171,.10);
            --shadow-lg: 0 20px 60px rgba(90,171,171,.18);
            --radius: 28px;
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-thumb{background:var(--primary);border-radius:10px;}
        body{
            background:var(--bg);
            font-family:'Segoe UI',system-ui,sans-serif;
            color:var(--ink);
            min-height:100vh;
            overflow-x:hidden;
            padding-bottom:130px;
        }

        /* ── AMBIENT BG ── */
        .bg-canvas{position:fixed;inset:0;z-index:-1;overflow:hidden;}
        .bg-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orbF 30s infinite alternate;}
        .bo1{width:55vw;height:55vw;background:radial-gradient(circle,rgba(152,216,216,.18) 0%,transparent 70%);top:-20%;right:-15%;animation-duration:28s;}
        .bo2{width:40vw;height:40vw;background:radial-gradient(circle,rgba(245,230,211,.35) 0%,transparent 70%);bottom:-10%;left:-10%;animation-duration:36s;animation-direction:alternate-reverse;}
        .bo3{width:28vw;height:28vw;background:radial-gradient(circle,rgba(90,171,171,.1) 0%,transparent 70%);top:45%;left:35%;animation-duration:50s;}
        @keyframes orbF{from{transform:translate(0,0) scale(1)}to{transform:translate(3%,5%) scale(1.07)}}

        /* ── HEADER ── */
        .page-header{
            text-align:center;padding:52px 20px 24px;
            position:relative;
        }
        .page-header .logo-badge{
            display:inline-flex;align-items:center;gap:10px;
            background:rgba(255,255,255,.75);backdrop-filter:blur(12px);
            border:1px solid rgba(152,216,216,.25);
            border-radius:20px;padding:10px 22px;
            box-shadow:var(--shadow);margin-bottom:16px;
        }
        .logo-badge .li{width:32px;height:32px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;}
        .logo-badge .lt{font-size:18px;font-weight:900;color:var(--accent-dark);}
        .logo-badge .lt span{color:var(--primary);}
        .page-header h1{font-size:2.6rem;font-weight:200;color:var(--accent);letter-spacing:5px;margin-bottom:8px;}
        .page-header p{font-size:13px;color:var(--text-sec);max-width:340px;margin:0 auto;line-height:1.7;}

        /* ── TABS ── */
        .tabs{display:flex;gap:7px;justify-content:center;margin:0 20px 24px;flex-wrap:wrap;}
        .tab{padding:9px 20px;border-radius:20px;border:1.5px solid rgba(152,216,216,.3);background:rgba(255,255,255,.7);color:var(--text-sec);font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit;backdrop-filter:blur(6px);}
        .tab.active{background:var(--grad);color:#fff;border-color:transparent;font-weight:700;box-shadow:0 4px 14px rgba(90,171,171,.32);}
        .tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}

        /* ── TAB PANELS ── */
        .t-panel{display:none;animation:fadeUp .38s ease;}
        .t-panel.active{display:block;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

        .wrap{max-width:860px;margin:0 auto;padding:0 18px;}

        /* ── DUMP PANEL ── */
        .dump-card{
            background:rgba(255,255,255,.85);
            backdrop-filter:blur(20px);
            border-radius:var(--radius);
            border:1px solid rgba(255,255,255,.9);
            box-shadow:var(--shadow);
            padding:32px 28px 24px;
            transition:box-shadow .4s,transform .4s;
        }
        .dump-card:focus-within{box-shadow:var(--shadow-lg);transform:scale(1.008);}

        .dump-mood-row{display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
        .mood-btn{
            padding:7px 16px;border-radius:20px;border:1.5px solid rgba(152,216,216,.28);
            background:transparent;font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit;
            display:flex;align-items:center;gap:6px;color:var(--text-sec);
        }
        .mood-btn:hover,.mood-btn.picked{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(90,171,171,.3);}

        .char-count{text-align:left;font-size:11px;color:var(--text-sec);margin-top:4px;padding:0 4px;}

        #dumpText{
            width:100%;min-height:220px;background:transparent;
            border:none;outline:none;
            font-size:1.15rem;line-height:1.9;color:var(--ink);resize:none;
            font-family:inherit;transition:all 1.5s;
        }
        #dumpText::placeholder{color:rgba(90,171,171,.5);}

        .vapor-effect{transform:translateY(-40px) scale(.9);filter:blur(30px);opacity:0 !important;pointer-events:none;}

        .fire-canvas{
            position:fixed;inset:0;z-index:9998;pointer-events:none;
            display:none;
        }

        .dump-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px;}
        .da-btn{
            display:flex;align-items:center;gap:7px;
            padding:11px 22px;border-radius:16px;border:none;
            font-size:13px;font-weight:700;cursor:pointer;
            font-family:inherit;transition:all .2s;
        }
        .da-btn.vapor{background:var(--ink);color:#fff;box-shadow:0 4px 14px rgba(44,62,80,.2);}
        .da-btn.vapor:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(44,62,80,.3);}
        .da-btn.analyze{background:rgba(152,216,216,.15);color:var(--accent-dark);border:1.5px solid rgba(152,216,216,.3);}
        .da-btn.analyze:hover{background:var(--grad);color:#fff;border-color:transparent;}
        .da-btn.inspire{background:rgba(240,165,0,.1);color:#a06800;border:1.5px solid rgba(240,165,0,.25);}
        .da-btn.inspire:hover{background:#f0a500;color:#fff;border-color:transparent;}
        .da-btn.breathe{background:rgba(76,175,147,.1);color:#2d6b58;border:1.5px solid rgba(76,175,147,.25);}
        .da-btn.breathe:hover{background:var(--success);color:#fff;border-color:transparent;}

        /* streak & stats */
        .stats-row{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;}
        .stat-chip{flex:1;min-width:100px;background:rgba(255,255,255,.8);border-radius:18px;padding:14px 12px;text-align:center;box-shadow:var(--shadow);border:1px solid rgba(152,216,216,.12);}
        .stat-chip .sv{font-size:1.5rem;font-weight:800;color:var(--accent);}
        .stat-chip .sl{font-size:11px;color:var(--text-sec);margin-top:2px;}

        /* ── WORD CLOUD ── */
        .wc-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);}
        .wc-modal-bg.open{opacity:1;pointer-events:auto;}
        .wc-box{background:#fff;border-radius:var(--radius);padding:28px;width:90%;max-width:460px;box-shadow:var(--shadow-lg);transform:scale(.93);transition:transform .3s;}
        .wc-modal-bg.open .wc-box{transform:scale(1);}
        .wc-title{font-size:16px;font-weight:700;color:var(--accent-dark);margin-bottom:16px;display:flex;justify-content:space-between;}
        .wc-close{background:none;border:none;color:var(--text-sec);font-size:18px;cursor:pointer;}
        .word-cloud{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:8px 0;}
        .word-cloud span{transition:.2s;cursor:default;}
        .word-cloud span:hover{color:var(--primary);transform:scale(1.12);}

        /* ── BREATHE OVERLAY ── */
        .breathe-overlay{position:fixed;inset:0;z-index:700;background:linear-gradient(135deg,#1a2a3a,#0f1e2e);display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
        .breathe-overlay.show{display:flex;animation:fadeUp .4s ease;}
        .breathe-circle{
            width:180px;height:180px;border-radius:50%;
            background:radial-gradient(circle,rgba(152,216,216,.4),rgba(90,171,171,.1));
            border:2px solid rgba(152,216,216,.4);
            display:flex;align-items:center;justify-content:center;
            font-size:1.2rem;color:#fff;font-weight:300;
            animation:breatheAnim 8s ease-in-out infinite;
        }
        @keyframes breatheAnim{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.4);opacity:1}}
        .breathe-label{color:rgba(255,255,255,.6);font-size:13px;}
        .breathe-close{position:absolute;top:24px;left:24px;background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}

        /* ── JOURNAL (MEMORIES) ── */
        .memory-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
        .mem-search{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.85);border-radius:14px;padding:8px 14px;border:1.5px solid transparent;transition:border .2s;box-shadow:var(--shadow);}
        .mem-search:focus-within{border-color:var(--primary);}
        .mem-search input{border:none;background:none;outline:none;font-size:13px;color:var(--ink);font-family:inherit;width:160px;}
        .mem-search i{color:var(--text-sec);font-size:13px;}
        .mem-filter{display:flex;gap:6px;}
        .mf-btn{font-size:11px;padding:5px 12px;border-radius:12px;border:1.5px solid rgba(152,216,216,.3);background:transparent;color:var(--text-sec);cursor:pointer;transition:all .2s;font-family:inherit;}
        .mf-btn.active{background:var(--grad);color:#fff;border-color:transparent;font-weight:700;}

        .mem-add-btn{
            display:flex;align-items:center;gap:8px;
            padding:11px 22px;border-radius:16px;border:none;
            background:var(--grad);color:#fff;font-size:13px;font-weight:700;
            cursor:pointer;font-family:inherit;
            box-shadow:0 4px 16px rgba(90,171,171,.35);
            transition:transform .18s,box-shadow .18s;
        }
        .mem-add-btn:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(90,171,171,.46);}

        .memory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;}

        .mem-card{
            background:#fff;border-radius:22px;overflow:hidden;
            box-shadow:var(--shadow);
            transition:transform .28s,box-shadow .28s;
            cursor:pointer;position:relative;
            animation:fadeUp .38s ease both;
        }
        .mem-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg);}
        .mem-card-img{width:100%;height:170px;object-fit:cover;display:block;}
        .mem-card-no-img{width:100%;height:120px;background:linear-gradient(135deg,rgba(152,216,216,.15),rgba(90,171,171,.08));display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
        .mem-card-body{padding:16px 18px 18px;}
        .mem-card-date{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1.5px;margin-bottom:6px;}
        .mem-card-text{font-size:14px;line-height:1.7;color:#444;font-family:'Georgia',serif;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
        .mem-card-mood{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.9);border-radius:10px;padding:3px 9px;font-size:12px;backdrop-filter:blur(6px);}
        .mem-card-del{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:8px;border:none;background:rgba(255,107,107,.15);color:var(--danger);font-size:12px;cursor:pointer;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;}
        .mem-card:hover .mem-card-del{opacity:1;}
        .mem-card-del:hover{background:var(--danger);color:#fff;}

        .mem-empty{text-align:center;padding:60px 20px;color:var(--text-sec);}
        .mem-empty i{font-size:48px;color:#c8e6e6;display:block;margin-bottom:14px;}
        .mem-empty p{font-size:14px;line-height:1.7;}

        /* ── ADD MEMORY MODAL ── */
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.26);z-index:600;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(5px);}
        .modal-bg.open{opacity:1;pointer-events:auto;}
        .modal-sheet{background:#fff;border-radius:28px 28px 0 0;padding:24px 22px 40px;width:100%;max-width:520px;transform:translateY(100%);transition:transform .38s cubic-bezier(.25,.46,.45,.94);overflow-y:auto;max-height:90vh;}
        .modal-bg.open .modal-sheet{transform:translateY(0);}
        .sheet-handle{width:38px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 18px;}
        .sheet-title{font-size:17px;font-weight:800;color:var(--accent-dark);margin-bottom:4px;}
        .sheet-sub{font-size:13px;color:var(--text-sec);margin-bottom:18px;}

        .form-label{font-size:12px;font-weight:700;color:var(--text-sec);margin-bottom:4px;display:block;}
        .form-input,.form-textarea{width:100%;padding:12px 16px;border-radius:14px;border:1.5px solid #e0ecec;outline:none;font-size:14px;font-family:inherit;background:#f8fdfd;color:var(--ink);transition:border .2s;margin-bottom:12px;}
        .form-input:focus,.form-textarea:focus{border-color:var(--primary);background:#fff;}
        .form-textarea{resize:vertical;min-height:80px;}

        .mood-select-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
        .ms-opt{padding:7px 14px;border-radius:20px;border:1.5px solid rgba(152,216,216,.28);background:transparent;font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;}
        .ms-opt.picked{background:var(--grad);color:#fff;border-color:transparent;}

        .img-upload-zone{border:2px dashed rgba(152,216,216,.4);border-radius:16px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:14px;}
        .img-upload-zone:hover{border-color:var(--accent);background:rgba(152,216,216,.04);}
        .img-upload-zone i{font-size:26px;color:var(--primary);margin-bottom:6px;}
        .img-upload-zone p{font-size:13px;color:var(--text-sec);}
        #imgPreviewThumb{width:100%;border-radius:12px;margin-top:10px;display:none;object-fit:cover;max-height:160px;}

        .sheet-cta{width:100%;padding:14px;border-radius:16px;border:none;background:var(--grad);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(90,171,171,.35);transition:transform .18s;}
        .sheet-cta:hover{transform:translateY(-2px);}

        /* ── MEMORY DETAIL MODAL ── */
        .detail-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:700;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(8px);}
        .detail-bg.open{opacity:1;pointer-events:auto;}
        .detail-box{background:#fff;border-radius:var(--radius);width:90%;max-width:480px;overflow:hidden;transform:scale(.93);transition:transform .3s;max-height:90vh;overflow-y:auto;}
        .detail-bg.open .detail-box{transform:scale(1);}
        .detail-img{width:100%;max-height:220px;object-fit:cover;display:block;}
        .detail-body{padding:22px 24px 28px;}
        .detail-date{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1.5px;margin-bottom:8px;}
        .detail-text{font-size:16px;line-height:1.8;color:#444;font-family:'Georgia',serif;}
        .detail-close{position:absolute;top:12px;left:12px;width:34px;height:34px;border-radius:10px;border:none;background:rgba(255,255,255,.9);color:var(--ink);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1);}
        .detail-box{position:relative;}

        /* ── JOURNAL EXPORT ── */
        .export-bar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:16px;flex-wrap:wrap;}
        .exp-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:14px;border:1.5px solid rgba(152,216,216,.3);background:rgba(255,255,255,.8);color:var(--accent-dark);font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit;}
        .exp-btn:hover{background:var(--grad);color:#fff;border-color:transparent;}

        /* ── TOAST ── */
        #toasts{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
        .toast{display:flex;align-items:center;gap:8px;background:rgba(44,62,80,.93);color:#fff;padding:10px 22px;border-radius:25px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.18);backdrop-filter:blur(10px);animation:tIn .3s ease,tOut .3s ease 2.7s forwards;white-space:nowrap;}
        .toast.ok{background:rgba(76,175,147,.94);}
        .toast.err{background:rgba(255,107,107,.94);}
        .toast.warn{background:rgba(240,165,0,.94);}
        @keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(10px)}}

        /* ── BOTTOM NAV ── */
        .bnav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:460px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-radius:24px;display:flex;justify-content:space-around;align-items:center;padding:9px 6px;box-shadow:0 8px 36px rgba(0,0,0,.1);z-index:400;border:1px solid rgba(152,216,216,.18);}
        .navi{text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-sec);transition:color .2s;padding:4px 12px;border-radius:14px;position:relative;}
        .navi.active{color:var(--accent);}
        .navi i{font-size:20px;}
        .navi span{font-size:10px;font-weight:600;}
        .navi.active::after{content:'';position:absolute;bottom:-5px;width:20px;height:3px;border-radius:3px;background:var(--grad);}

        /* ── PARTICLE FIRE ── */
        @keyframes particleUp{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="bg-orb bo1"></div>
    <div class="bg-orb bo2"></div>
    <div class="bg-orb bo3"></div>
</div>

<div id="toasts"></div>
<canvas id="fireCanvas" style="position:fixed;inset:0;z-index:9998;pointer-events:none;display:none"></canvas>

<!-- BREATHE OVERLAY -->
<div class="breathe-overlay" id="breatheOverlay">
    <button class="breathe-close" onclick="T.closeBreathe()"><i class="fas fa-times"></i></button>
    <div class="breathe-circle" id="breatheCircle">شهيق</div>
    <div class="breathe-label" id="breatheLabel">خذ نفساً عميقاً...</div>
    <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px">4 ثوانٍ شهيق · 4 احتباس · 6 زفير</div>
</div>

<!-- WORD CLOUD MODAL -->
<div class="wc-modal-bg" id="wcModal">
    <div class="wc-box">
        <div class="wc-title">
            <span><i class="fas fa-brain" style="color:var(--primary);margin-left:7px"></i>جوهر أفكارك</span>
            <button class="wc-close" onclick="T.closeWC()"><i class="fas fa-times"></i></button>
        </div>
        <div class="word-cloud" id="wcContent"></div>
        <p id="wcSentiment" style="text-align:center;margin-top:14px;font-size:13px;color:var(--text-sec);"></p>
    </div>
</div>

<!-- ADD MEMORY MODAL -->
<div class="modal-bg" id="addModal">
    <div class="modal-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">✨ تخليد لحظة</div>
        <div class="sheet-sub">ما الشيء الجميل الذي تريد العودة إليه لاحقاً؟</div>

        <label class="form-label">اللحظة *</label>
        <textarea class="form-textarea" id="mText" placeholder="اكتب ذكراك هنا..."></textarea>

        <label class="form-label">كيف كنت تشعر؟</label>
        <div class="mood-select-row" id="memMoodRow">
            <button class="ms-opt" data-mood="سعيد 😊" onclick="T.pickMemMood(this)">سعيد 😊</button>
            <button class="ms-opt" data-mood="ممتن 🙏" onclick="T.pickMemMood(this)">ممتن 🙏</button>
            <button class="ms-opt" data-mood="هادئ 🌿" onclick="T.pickMemMood(this)">هادئ 🌿</button>
            <button class="ms-opt" data-mood="متحمس ✨" onclick="T.pickMemMood(this)">متحمس ✨</button>
            <button class="ms-opt" data-mood="محب ❤️" onclick="T.pickMemMood(this)">محب ❤️</button>
        </div>

        <label class="form-label">التاريخ</label>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const T = (() => {
    'use strict';

    // ── Firebase (optional cloud sync) ───────────────────
    let db = null;
    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
    } catch(e) { console.warn('Firebase unavailable, using localStorage only.'); }

    const PID = localStorage.getItem('sokoon_patient_id') || 'local';

    // ── DB ────────────────────────────────────────────────
    const STORE = 'sokoon_tools_v2';
    function load() { try { return JSON.parse(localStorage.getItem(STORE)) || {memories:[], dumpCount:0, streak:0, lastDump:null}; } catch(e){ return {memories:[],dumpCount:0,streak:0,lastDump:null};} }
    function save(data) { localStorage.setItem(STORE, JSON.stringify(data)); }
    let DB = load();

    // ── Toast ─────────────────────────────────────────────
    function toast(msg, type='info') {
        const ic={ok:'fa-check-circle',err:'fa-times-circle',warn:'fa-exclamation-circle',info:'fa-info-circle'};
        const t=document.createElement('div');
        t.className=`toast ${type}`;
        t.innerHTML=`<i class="fas ${ic[type]||ic.info}"></i> ${msg}`;
        document.getElementById('toasts').appendChild(t);
        setTimeout(()=>t.remove(),3300);
    }

    // ── Prompts ───────────────────────────────────────────
    const NEG_PROMPTS=[
        'ما الذي يثقل كاهلك اليوم؟','صف شعوراً صعباً مررت به مؤخراً.',
        'ما الحوار الداخلي الذي يزعجك؟','اكتب عن خوف يسيطر عليك.',
        'ما الشيء الذي تتمنى تغييره الآن؟','ما الذي يسرق منك طاقتك؟',
        'اكتب لشخص أزعجك دون إرسال الرسالة.',
    ];
    const POS_PROMPTS=[
        'صف شيئاً صغيراً جعلك تبتسم اليوم.',
        'ما الإنجاز الذي تفتخر به هذا الأسبوع؟',
        'اكتب عن شخص تشعر بالامتنان لوجوده.',
        'صف مكاناً تشعر فيه بالسلام التام.',
        'ما هو أجمل شيء حدث لك هذا الشهر؟',
        'اكتب عن لحظة شعرت فيها بالقوة.',
        'ما الهدية الجميلة التي أعطاك إياها الحياة؟',
    ];

    const STOP = new Set(['في','من','على','إلى','عن','و','أنا','هو','هي','هذا','هذه','ذلك','أن','كان','يكون','كل','لا','ما','مع','به','له','جداً','جدا','أو','لكن','كما','ثم','حتى']);

    // ── State ─────────────────────────────────────────────
    let dumpMood = null, memMood = null;
    let memFilter = 'all', memSearch = '';
    let breatheInterval = null;

    // ── DOM ───────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const dumpText = $('dumpText');

    // char counter
    dumpText.addEventListener('input', () => { $('charCount').textContent = dumpText.value.length; });

    // ── Tabs ──────────────────────────────────────────────
    function switchTab(name, btn) {
        document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.t-panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        $(`tab-${name}`).classList.add('active');
        if(name==='memories') renderMemories();
        if(name==='dump') renderStats();
    }

    // ── Mood pick ─────────────────────────────────────────
    function pickDumpMood(btn) {
        document.querySelectorAll('#dumpMoodRow .mood-btn').forEach(b=>b.classList.remove('picked'));
        btn.classList.add('picked');
        dumpMood = btn.dataset.m;
    }
    function pickMemMood(btn) {
        document.querySelectorAll('#memMoodRow .ms-opt').forEach(b=>b.classList.remove('picked'));
        btn.classList.add('picked');
        memMood = btn.dataset.mood;
    }

    // ── VAPORIZE ──────────────────────────────────────────
    function vaporize() {
        const text = dumpText.value.trim();
        if(!text){ toast('اكتب شيئاً أولاً لتحريره','warn'); return; }

        // Particle fire effect
        spawnFireParticles();

        dumpText.classList.add('vapor-effect');
        setTimeout(()=>{
            dumpText.value='';
            $('charCount').textContent='0';
            dumpText.classList.remove('vapor-effect');
            dumpMood=null;
            document.querySelectorAll('#dumpMoodRow .mood-btn').forEach(b=>b.classList.remove('picked'));

            // Update stats
            const today=new Date().toDateString();
            if(DB.lastDump !== today) {
                DB.streak = DB.lastDump === new Date(Date.now()-86400000).toDateString() ? DB.streak+1 : 1;
            }
            DB.dumpCount++;
            DB.lastDump=today;
            save(DB);
            renderStats();

            // Sync to Firestore (metadata only, no content for privacy)
            if(db && PID!=='local'){
                db.collection('patients').doc(PID).collection('dumpLogs').add({
                    mood: dumpMood, timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    wordCount: text.split(/\s+/).length,
                }).catch(()=>{});
            }

            toast('تمّ إطلاق سراحه... أنت أخف الآن 🌬️','ok');
        }, 1400);
    }

    // ── Fire particles ────────────────────────────────────
    function spawnFireParticles() {
        const canvas = $('fireCanvas');
        canvas.width=window.innerWidth; canvas.height=window.innerHeight;
        canvas.style.display='block';
        const ctx=canvas.getContext('2d');
        const particles=[];
        const rect=$('dumpCard').getBoundingClientRect();
        const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
        for(let i=0;i<80;i++){
            particles.push({
                x:cx+((Math.random()-.5)*rect.width*.8),
                y:cy+((Math.random()-.5)*rect.height*.4),
                vx:(Math.random()-.5)*4,vy:-(Math.random()*6+2),
                life:1,size:Math.random()*12+4,
                color:`hsl(${Math.random()*40+10},90%,${Math.random()*30+50}%)`
            });
        }
        let frame=0;
        const anim=()=>{
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p=>{
                p.x+=p.vx; p.y+=p.vy; p.vy-=.1; p.life-=.025;
                ctx.globalAlpha=Math.max(0,p.life);
                ctx.fillStyle=p.color;
                ctx.beginPath();
                ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
                ctx.fill();
            });
            frame++;
            if(frame<60) requestAnimationFrame(anim);
            else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
        };
        requestAnimationFrame(anim);
    }

    // ── Analyze ───────────────────────────────────────────
    function analyze() {
        const text=dumpText.value.trim();
        if(!text){toast('اكتب شيئاً للتحليل','warn');return;}
        const words=text.split(/\s+/).filter(w=>w.length>2&&!STOP.has(w));
        const freq={};
        words.forEach(w=>{freq[w]=(freq[w]||0)+1;});
        const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,18);

        let html='<div class="word-cloud">';
        top.forEach(([w,c])=>{
            const fs=Math.min(13+(c*5),42);
            const op=Math.min(.4+c*.12,1);
            html+=`<span style="font-size:${fs}px;opacity:${op};color:hsl(${(w.charCodeAt(0)*37)%360},55%,45%)">${w}</span>`;
        });
        html+='</div>';
        $('wcContent').innerHTML=html;

        // Simple positive/negative heuristic
        const neg=['قلق','حزن','خوف','غضب','إرهاق','ضغط','مشكلة','ألم','صعب'];
        const pos=['سعيد','جميل','أمل','نجاح','شكر','محبة','فرح','هدوء','راحة'];
        let negScore=0,posScore=0;
        words.forEach(w=>{if(neg.some(n=>w.includes(n)))negScore++;if(pos.some(p=>w.includes(p)))posScore++;});
        const sentiment = posScore>negScore?'يبدو أن كلماتك تحمل طاقة إيجابية ✨':negScore>posScore?'أرى بعض الثقل في كلماتك — هذا طبيعي 🤍':'أفكارك متوازنة — الوعي بذاتك هو الخطوة الأولى 🌿';
        $('wcSentiment').textContent=sentiment;
        $('wcModal').classList.add('open');
    }
    function closeWC(){$('wcModal').classList.remove('open');}

    // ── Prompts ───────────────────────────────────────────
    function dumpPrompt(){dumpText.placeholder=NEG_PROMPTS[Math.floor(Math.random()*NEG_PROMPTS.length)];toast('إليك سؤال للتأمل...','info');}
    function joyPrompt(){$('mText').value=POS_PROMPTS[Math.floor(Math.random()*POS_PROMPTS.length)];}

    // ── Breathe ───────────────────────────────────────────
    function openBreathe(){
        $('breatheOverlay').classList.add('show');
        let phase=0,count=0;
        const phases=[{l:'شهيق',d:4},{l:'احتباس',d:4},{l:'زفير',d:6}];
        $('breatheCircle').textContent=phases[0].l;
        $('breatheLabel').textContent='4 ثوانٍ...';
        clearInterval(breatheInterval);
        breatheInterval=setInterval(()=>{
            count++;
            if(count>=phases[phase].d){count=0;phase=(phase+1)%3;}
            const p=phases[phase];
            $('breatheCircle').textContent=p.l;
            $('breatheLabel').textContent=`${p.d-count} ثوانٍ...`;
        },1000);
    }
    function closeBreathe(){clearInterval(breatheInterval);$('breatheOverlay').classList.remove('show');}

    // ── Stats ─────────────────────────────────────────────
    function renderStats(){
        const good=DB.memories.length;
        $('statsRow').innerHTML=[
            {v:DB.dumpCount||0,   l:'تفريغ منجز'},
            {v:DB.streak||0,       l:'أيام متتالية 🔥'},
            {v:good,               l:'ذكرى محفوظة'},
        ].map(s=>`<div class="stat-chip"><div class="sv">${s.v}</div><div class="sl">${s.l}</div></div>`).join('');
    }

    // ── Add memory ────────────────────────────────────────
    function openAddModal(){
        $('mText').value=''; $('mTitle').value=''; $('mDate').valueAsDate=new Date();
        memMood=null;
        document.querySelectorAll('#memMoodRow .ms-opt').forEach(b=>b.classList.remove('picked'));
        $('imgPreviewThumb').style.display='none';
        $('mImg').value='';
        $('addModal').classList.add('open');
    }

    $('mImg').addEventListener('change',async(e)=>{
        const f=e.target.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=ev=>{
            const img=$('imgPreviewThumb');
            img.src=ev.target.result; img.style.display='block';
        };
        r.readAsDataURL(f);
    });

    async function saveMemory(){
        const text=$('mText').value.trim();
        if(!text){toast('اكتب ذكراك أولاً','err');return;}
        const date=$('mDate').value||new Date().toISOString().split('T')[0];
        let img=null;
        const f=$('mImg').files[0];
        if(f){ img=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(f);}); }

        const entry={
            id:Date.now(), text, date, mood:memMood||null,
            title:$('mTitle').value.trim()||null, image:img||null,
            createdAt:new Date().toISOString(),
        };
        DB.memories.unshift(entry);
        save(DB);

        // Sync to Firestore
        if(db && PID!=='local'){
            const safeEntry={...entry, image:null}; // don't store images in Firestore
            db.collection('patients').doc(PID).collection('memories').doc(String(entry.id)).set(safeEntry).catch(()=>{});
        }

        $('addModal').classList.remove('open');
        renderMemories();
        toast('تم حفظ اللحظة في كتابك الجميل 📔','ok');
        renderStats();
    }

    // ── Render memories ───────────────────────────────────
    function renderMemories(){
        let list=[...DB.memories];
        if(memFilter!=='all') list=list.filter(m=>m.mood&&m.mood.includes(memFilter));
        if(memSearch.trim()) list=list.filter(m=>(m.text+' '+(m.title||'')).toLowerCase().includes(memSearch.toLowerCase()));
        list.sort((a,b)=>new Date(b.date)-new Date(a.date));

        const grid=$('memGrid');
        grid.innerHTML='';
        if(!list.length){
            grid.innerHTML=`<div class="mem-empty" style="grid-column:1/-1"><i class="fas fa-book-open"></i><p>${memFilter==='all'?'لم تبدأ بكتابة قصتك الجميلة بعد...<br>ابدأ بتدوين أول لحظة مميزة.':'لا توجد ذكريات بهذه الحالة المزاجية.'}</p></div>`;
            return;
        }
        list.forEach((m,i)=>{
            const dateStr=new Date(m.date+'T00:00:00').toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
            const card=document.createElement('div');
            card.className='mem-card'; card.style.animationDelay=`${i*.06}s`;
            card.innerHTML=`
                ${m.image?`<img class="mem-card-img" src="${m.image}" alt="ذكرى">`:`<div class="mem-card-no-img">${m.mood||'📖'}</div>`}
                ${m.mood?`<div class="mem-card-mood">${m.mood}</div>`:''}
                <button class="mem-card-del" onclick="T.deleteMemory(${m.id},event)" title="حذف" aria-label="حذف"><i class="fas fa-times"></i></button>
                <div class="mem-card-body">
                    ${m.title?`<div style="font-size:12px;font-weight:700;color:var(--accent-dark);margin-bottom:4px">${m.title}</div>`:''}
                    <div class="mem-card-date">${dateStr}</div>
                    <p class="mem-card-text">${m.text}</p>
                </div>`;
            card.addEventListener('click',()=>openDetail(m));
            grid.appendChild(card);
        });
    }

    function deleteMemory(id, e){
        e.stopPropagation();
        if(!confirm('هل تريد حذف هذه الذكرى؟')) return;
        DB.memories=DB.memories.filter(m=>m.id!==id);
        save(DB);
        renderMemories(); renderStats();
        if(db && PID!=='local') db.collection('patients').doc(PID).collection('memories').doc(String(id)).delete().catch(()=>{});
        toast('تم حذف الذكرى','ok');
    }

    function setMemFilter(f,btn){
        memFilter=f;
        document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderMemories();
    }
    function filterMem(q){memSearch=q;renderMemories();}

    // ── Detail modal ──────────────────────────────────────
    function openDetail(m){
        const dateStr=new Date(m.date+'T00:00:00').toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
        const img=$('detailImg');
        if(m.image){img.src=m.image;img.style.display='block';}else{img.style.display='none';}
        $('detailDate').textContent=dateStr;
        $('detailText').textContent=m.text;
        $('detailMood').textContent=m.mood||'';
        $('detailModal').classList.add('open');
    }
    function closeDetail(){$('detailModal').classList.remove('open');}

    // ── Export PDF ────────────────────────────────────────
    async function exportPDF(){
        if(!DB.memories.length){toast('لا توجد ذكريات للتصدير','warn');return;}
        toast('جاري إنشاء الكتاب...','info');
        const {jsPDF}=window.jspdf;
        const doc=new jsPDF();
        doc.setR2L(true);
        doc.setFontSize(24);
        doc.setTextColor(90,171,171);
        doc.text('كتاب حياتي — سُكُون',105,22,{align:'center'});
        doc.setFontSize(12);
        doc.setTextColor(180,180,180);
        doc.text(new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'}),105,30,{align:'center'});
        let y=44;
        const sorted=[...DB.memories].sort((a,b)=>new Date(b.date)-new Date(a.date));
        sorted.forEach((m,i)=>{
            if(y>260){doc.addPage();y=20;}
            const dateStr=new Date(m.date+'T00:00:00').toLocaleDateString('ar-EG',{month:'long',day:'numeric',year:'numeric'});
            doc.setFontSize(11);doc.setTextColor(90,171,171);
            doc.text(dateStr+' '+( m.mood||''),200,y,{align:'right'});
            y+=8;
            if(m.title){doc.setFontSize(14);doc.setTextColor(44,62,80);doc.text(m.title,200,y,{align:'right'});y+=8;}
            doc.setFontSize(13);doc.setTextColor(80,80,80);
            const lines=doc.splitTextToSize(m.text,165);
            doc.text(lines,200,y,{align:'right'});
            y+=lines.length*7+6;
            if(m.image&&y<200){
                try{doc.addImage(m.image,'JPEG',15,y,70,50);y+=56;}catch(e){}
            }
            doc.setDrawColor(220,240,240);doc.line(10,y,200,y);y+=10;
        });
        doc.save('كتاب-حياتي-سكون.pdf');
        toast('تم تصدير الكتاب ✓','ok');
    }

    function exportJSON(){
        const blob=new Blob([JSON.stringify(DB.memories,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='sokoon-memories-backup.json';a.click();
        URL.revokeObjectURL(a.href);
        toast('تم تنزيل النسخة الاحتياطية ✓','ok');
    }

    // ── Close modals on backdrop ──────────────────────────
    document.querySelectorAll('.modal-bg,.wc-modal-bg,.detail-bg').forEach(m=>{
        m.addEventListener('click',e=>{if(e.target===m) m.classList.remove('open');});
    });
    document.addEventListener('keydown',e=>{
        if(e.key==='Escape'){
            ['addModal','wcModal','detailModal'].forEach(id=>$(id)?.classList.remove('open'));
            closeBreathe();
        }
    });

    // ── Init ──────────────────────────────────────────────
    $('mDate').valueAsDate=new Date();
    renderStats();

    return {
        switchTab,pickDumpMood,pickMemMood,
        vaporize,analyze,closeWC,dumpPrompt,joyPrompt,
        openBreathe,closeBreathe,
        openAddModal,saveMemory,deleteMemory,
        filterMem,setMemFilter,
        openDetail,closeDetail,
        exportPDF,exportJSON,
    };
})();
</script>
</body>
                </html>
