<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>سُكُون · محادثاتي</title>

    <!-- تحميل الخط مع العرض الفوري -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== إعدادات التصميم (كما هي دون تغيير) ==================== */
        :root {
            --bg-primary: #f6faf9;
            --bg-secondary: #eef5f4;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --primary-50: #e6f3f3;
            --primary-100: #cce7e7;
            --primary-200: #99cfcf;
            --primary-300: #66b8b8;
            --primary-400: #3da0a0;
            --primary-500: #2a8888;
            --primary-600: #1f6f6f;
            --primary-700: #165656;
            --primary-800: #0d3d3d;
            --primary-900: #062424;
            
            --text-primary: #1a2e2e;
            --text-secondary: #3d5a5a;
            --text-tertiary: #6b8a8a;
            --text-on-primary: #ffffff;
            
            --danger: #d94f4f;
            --success: #2ecc71;
            --warning: #f4b740;
            
            --shadow-xs: 0 2px 4px rgba(22, 86, 86, 0.04);
            --shadow-sm: 0 6px 16px rgba(22, 86, 86, 0.06);
            --shadow-md: 0 12px 28px rgba(22, 86, 86, 0.08);
            --shadow-lg: 0 20px 40px rgba(22, 86, 86, 0.12);
            --shadow-focus: 0 0 0 3px rgba(42, 136, 136, 0.15);
            
            --radius-card: 28px;
            --radius-element: 18px;
            --radius-full: 9999px;
            
            --transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            color-scheme: light;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0a1818;
                --bg-secondary: #0f2222;
                --surface: rgba(18, 30, 30, 0.85);
                --surface-solid: #142424;
                --text-primary: #e3f0f0;
                --text-secondary: #b3d1d1;
                --text-tertiary: #7aa3a3;
                --shadow-xs: 0 2px 4px rgba(0, 0, 0, 0.2);
                --shadow-sm: 0 6px 16px rgba(0, 0, 0, 0.25);
                --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
                color-scheme: dark;
            }
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 95px;
            line-height: 1.5;
            position: relative;
            transition: background 0.2s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20vh;
            right: -10vw;
            width: 80vw;
            height: 80vw;
            max-width: 600px;
            max-height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(42, 136, 136, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 1.75rem 1.25rem;
            position: relative;
            z-index: 2;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .logo-main {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--primary-600);
            line-height: 1;
        }

        .logo-sub {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--primary-300);
            margin-right: 2px;
        }

        .page-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--primary-100);
            box-shadow: var(--shadow-xs);
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            height: 56px;
            padding: 0 48px 0 20px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid var(--primary-100);
            border-radius: var(--radius-element);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            box-shadow: var(--shadow-xs);
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary-400);
            background: var(--surface-solid);
            box-shadow: var(--shadow-focus);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            pointer-events: none;
            width: 20px;
            height: 20px;
        }

        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            content-visibility: auto;
            contain-intrinsic-size: auto 100px;
        }

        .chat-wrapper {
            position: relative;
        }

        .chat-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 1rem 1.2rem;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s, box-shadow 0.2s;
            cursor: pointer;
            animation: cardFadeIn 0.3s ease forwards;
            opacity: 0;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-card:active {
            transform: scale(0.985);
            box-shadow: var(--shadow-md);
        }

        .chat-card.unread {
            border-right: 4px solid var(--primary-400);
        }

        .avatar-wrapper {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            box-shadow: var(--shadow-sm);
            border: 2.5px solid var(--surface-solid);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            loading: lazy;
        }

        .chat-content {
            flex: 1;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .doctor-name {
            font-weight: 800;
            font-size: 1rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        .chat-time {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            white-space: nowrap;
        }

        .chat-preview {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .last-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .unread-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--primary-400);
            box-shadow: 0 0 8px var(--primary-300);
            margin-right: 8px;
            flex-shrink: 0;
            visibility: hidden;
        }

        .chat-card.unread .unread-dot {
            visibility: visible;
        }

        .options-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-tertiary);
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .options-btn:hover {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .options-menu {
            position: absolute;
            top: calc(100% - 8px);
            left: 16px;
            background: var(--surface-solid);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--primary-100);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 8px;
            min-width: 200px;
            z-index: 1000;
            list-style: none;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: opacity 0.18s, transform 0.18s, visibility 0.18s;
        }

        .options-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s;
        }

        .menu-item:hover {
            background: var(--primary-50);
            color: var(--primary-700);
        }

        .menu-item.danger {
            color: var(--danger);
        }

        .menu-item.danger:hover {
            background: rgba(217, 79, 79, 0.08);
        }

        .skeleton-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 1rem 1.2rem;
            background: var(--surface);
            border-radius: var(--radius-card);
            border: 1.5px solid var(--primary-100);
            margin-bottom: 14px;
        }

        .skeleton-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary-100);
            animation: pulse 1.5s infinite ease-in-out;
        }

        .skeleton-lines {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skeleton-line {
            height: 14px;
            background: var(--primary-100);
            border-radius: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-tertiary);
            display: none;
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
            padding: 8px 16px;
            background: var(--surface);
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--primary-100);
            box-shadow: var(--shadow-xs);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-400);
            transition: background 0.2s;
        }

        .sync-dot.syncing {
            background: var(--warning);
            animation: blink 1.2s infinite;
        }

        .sync-dot.online {
            background: var(--success);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .confirm-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(10, 30, 30, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s;
        }

        .confirm-backdrop.show {
            opacity: 1;
            visibility: visible;
        }

        .confirm-dialog {
            background: var(--surface-solid);
            border-radius: var(--radius-card);
            border: 1.5px solid var(--primary-100);
            box-shadow: var(--shadow-lg);
            padding: 2rem 1.75rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
            transform: scale(0.92);
            transition: transform 0.3s cubic-bezier(0.32, 1, 0.5, 1);
        }

        .confirm-backdrop.show .confirm-dialog {
            transform: scale(1);
        }

        .confirm-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .confirm-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .confirm-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }

        .confirm-actions {
            display: flex;
            gap: 12px;
        }

        .confirm-btn {
            flex: 1;
            padding: 12px;
            border-radius: 18px;
            border: none;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .confirm-btn.cancel {
            background: var(--primary-50);
            color: var(--text-secondary);
            border: 1.5px solid var(--primary-100);
        }

        .confirm-btn.confirm {
            background: var(--danger);
            color: white;
        }

        .confirm-btn.confirm.mute-action {
            background: var(--primary-600);
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--primary-800);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
            box-shadow: var(--shadow-md);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 500px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 36px;
            display: flex;
            justify-content: space-around;
            padding: 10px 8px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 400;
        }

        .nav-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 18px;
            border-radius: 30px;
            color: var(--text-tertiary);
            font-weight: 600;
            font-size: 0.7rem;
            transition: var(--transition);
        }

        .nav-link.active {
            color: var(--primary-600);
            background: var(--primary-50);
        }

        .icon {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .icon-sm {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 1.25rem 1rem;
            }
            .chat-card {
                padding: 0.9rem 1rem;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="logo-area">
            <span class="logo-main">سُ</span>
            <span class="logo-sub">كُون</span>
        </div>
        <div class="page-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <span>مشفّرة</span>
        </div>
    </header>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث باسم الأخصائي..." autocomplete="off">
        <span class="search-icon">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </span>
    </div>

    <div id="skeletonContainer">
        <!-- سيتم إخفاؤه تلقائياً عند ظهور المحتوى -->
    </div>

    <div class="chats-list" id="chatsList"></div>

    <div class="empty-state" id="emptyState">
        <div class="empty-icon">🍃</div>
        <h3 style="margin-bottom: 8px;">مساحتك هادئة الآن</h3>
        <p>ابدأ محادثة مع أحد الأخصائيين عندما تشعر بالاستعداد.</p>
    </div>

    <div class="sync-indicator" id="syncIndicator">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncMessage">تحميل البيانات...</span>
    </div>
</div>

<nav class="bottom-nav">
    <a href="patient-home.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>الرئيسية</span>
    </a>
    <a href="patient-chats.html" class="nav-link active">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
        <span>محادثاتي</span>
    </a>
    <a href="patient-agenda.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>الأجندة</span>
    </a>
    <a href="patient-tools.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M2 12h6M22 12h-6M12 2v6M12 22v-6M4.93 4.93l4.24 4.24M14.83 14.83l4.24 4.24M14.83 9.17l4.24-4.24M14.83 9.17l3.53-3.53M4.93 19.07l4.24-4.24"></path>
        </svg>
        <span>أدوات</span>
    </a>
</nav>

<div class="confirm-backdrop" id="confirmBackdrop">
    <div class="confirm-dialog">
        <span class="confirm-icon" id="confirmIcon">🗑️</span>
        <div class="confirm-title" id="confirmTitle"></div>
        <div class="confirm-message" id="confirmMsg"></div>
        <div class="confirm-actions">
            <button class="confirm-btn cancel" id="confirmCancel">إلغاء</button>
            <button class="confirm-btn confirm" id="confirmOk">تأكيد</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    // ==================== استيراد الإعدادات من ملف خارجي ====================
    import { firebaseConfig } from './firebase-config.js';
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);

    // ==================== تخزين محلي مضغوط ====================
    const STORAGE = {
        CONVERSATIONS: (uid) => `sc_c_${uid}`,
        DOCTOR: (docId) => `sc_d_${docId}`
    };

    const cache = {
        saveConversations(uid, convos) {
            try {
                const compact = convos.map(c => ({
                    i: c.id,           // id
                    d: c.doctorId,     // doctorId
                    n: c.doctorName,   // doctorName
                    a: c.doctorAvatar, // doctorAvatar
                    m: c.lastMessage,  // lastMessage
                    t: c.lastMessageTime,
                    u: c.unread ? 1 : 0,
                    k: c.muted ? 1 : 0
                }));
                localStorage.setItem(STORAGE.CONVERSATIONS(uid), JSON.stringify(compact));
            } catch (e) {
                // إذا فشل التخزين، نحذف القديم
                localStorage.removeItem(STORAGE.CONVERSATIONS(uid));
            }
        },
        loadConversations(uid) {
            const raw = localStorage.getItem(STORAGE.CONVERSATIONS(uid));
            if (!raw) return [];
            try {
                const compact = JSON.parse(raw);
                return compact.map(c => ({
                    id: c.i,
                    doctorId: c.d,
                    doctorName: c.n || '',
                    doctorAvatar: c.a || '',
                    lastMessage: c.m || '',
                    lastMessageTime: c.t || Date.now(),
                    unread: c.u === 1,
                    muted: c.k === 1
                }));
            } catch {
                return [];
            }
        },
        saveDoctor(doc) {
            try {
                localStorage.setItem(STORAGE.DOCTOR(doc.id), JSON.stringify({
                    n: doc.name || '',
                    p: doc.photoURL || ''
                }));
            } catch (e) {}
        },
        getDoctor(docId) {
            const raw = localStorage.getItem(STORAGE.DOCTOR(docId));
            if (!raw) return null;
            try {
                const d = JSON.parse(raw);
                return { id: docId, name: d.n, photoURL: d.p };
            } catch {
                return null;
            }
        }
    };

    // ==================== أدوات مساعدة ====================
    const toast = (msg, type = '') => {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type}`;
        setTimeout(() => el.classList.remove('show'), 3000);
    };

    const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        const now = new Date();
        const diff = Math.floor((now - d) / 1000);
        if (diff < 60) return 'الآن';
        if (diff < 3600) return `${Math.floor(diff / 60)} د`;
        if (diff < 86400) return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        if (diff < 172800) return 'أمس';
        return d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'short' });
    };

    const escapeHtml = (s) => s ? String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) : '';
    const escapeAttr = (s) => String(s).replace(/"/g, '&quot;');

    const setSyncStatus = (status, msg) => {
        const dot = document.getElementById('syncDot');
        const text = document.getElementById('syncMessage');
        dot.className = 'sync-dot';
        if (status === 'syncing') dot.classList.add('syncing');
        else if (status === 'online') dot.classList.add('online');
        text.textContent = msg;
    };

    const showConfirm = ({ icon, title, message, confirmClass, onConfirm }) => {
        document.getElementById('confirmIcon').textContent = icon || '⚠️';
        document.getElementById('confirmTitle').textContent = title || '';
        document.getElementById('confirmMsg').textContent = message || '';
        const ok = document.getElementById('confirmOk');
        ok.className = `confirm-btn confirm ${confirmClass || ''}`;
        const backdrop = document.getElementById('confirmBackdrop');
        backdrop.classList.add('show');
        const close = () => backdrop.classList.remove('show');
        document.getElementById('confirmCancel').onclick = close;
        ok.onclick = () => { close(); onConfirm && onConfirm(); };
        backdrop.onclick = e => { if (e.target === backdrop) close(); };
    };

    // ==================== الحالة ====================
    let uid = null;
    let conversations = [];
    let searchTerm = '';
    const mutedSet = new Set();
    let renderPending = false;

    const removeSkeleton = () => {
        const skel = document.getElementById('skeletonContainer');
        if (skel) skel.innerHTML = '';
    };

    const performRender = () => {
        const list = document.getElementById('chatsList');
        const empty = document.getElementById('emptyState');
        const query = searchTerm.toLowerCase().trim();
        
        const filtered = conversations.filter(c => 
            !query || (c.doctorName || '').toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            list.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        const frag = document.createDocumentFragment();
        filtered.forEach((c, idx) => {
            const wrap = document.createElement('div');
            wrap.className = 'chat-wrapper';
            
            const card = document.createElement('div');
            card.className = 'chat-card' + (c.unread ? ' unread' : '');
            card.style.animationDelay = `${idx * 0.03}s`;
            card.dataset.convId = c.id;
            
            const av = c.doctorAvatar
                ? `<img src="${escapeAttr(c.doctorAvatar)}" alt="" class="avatar-img" loading="lazy">`
                : (c.doctorName || 'د').charAt(0).toUpperCase();
            
            card.innerHTML = `
                <div class="avatar-wrapper">${av}</div>
                <div class="chat-content">
                    <div class="chat-header">
                        <span class="doctor-name">${escapeHtml(c.doctorName || 'أخصائي')}</span>
                        <span class="chat-time">${formatTime(c.lastMessageTime)}</span>
                    </div>
                    <div class="chat-preview">
                        <span class="last-message">${c.muted ? '🔕 ' : ''}${escapeHtml(c.lastMessage || 'ابدأ المحادثة...')}</span>
                        <span class="unread-dot"></span>
                    </div>
                </div>
                <button class="options-btn" data-conv-id="${c.id}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
                    </svg>
                </button>
            `;
            
            const menu = document.createElement('ul');
            menu.className = 'options-menu';
            menu.innerHTML = `
                <li class="menu-item" data-action="mute" data-conv-id="${c.id}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        ${c.muted 
                            ? '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>'
                            : '<path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"></path>'}
                    </svg>
                    <span>${c.muted ? 'إلغاء الكتم' : 'كتم الإشعارات'}</span>
                </li>
                <li class="menu-item danger" data-action="delete" data-conv-id="${c.id}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    <span>حذف المحادثة</span>
                </li>
            `;
            
            wrap.appendChild(card);
            wrap.appendChild(menu);
            frag.appendChild(wrap);
        });
        
        list.innerHTML = '';
        list.appendChild(frag);
        renderPending = false;
    };

    const scheduleRender = () => {
        if (renderPending) return;
        renderPending = true;
        requestAnimationFrame(performRender);
    };

    // ==================== جلب بيانات الطبيب ====================
    const fetchDoctor = async (docId) => {
        let doc = cache.getDoctor(docId);
        if (doc) return doc;
        try {
            const snap = await get(ref(database, `doctors/${docId}`));
            if (snap.exists()) {
                const d = snap.val();
                doc = { id: docId, name: d.name || '', photoURL: d.photoURL || '' };
                cache.saveDoctor(doc);
                return doc;
            }
        } catch (e) {}
        return { id: docId, name: '', photoURL: '' };
    };

    // ==================== المزامنة الحية ====================
    const startSync = () => {
        const convRef = ref(database, 'conversations');
        onValue(convRef, async (snap) => {
            setSyncStatus('syncing', 'تحديث...');
            const fresh = [];
            if (snap.exists()) {
                const data = snap.val();
                for (const id in data) {
                    const c = data[id];
                    if (c.patientId !== uid) continue;
                    const doc = await fetchDoctor(c.doctorId);
                    fresh.push({
                        id,
                        doctorId: c.doctorId,
                        doctorName: doc.name,
                        doctorAvatar: doc.photoURL,
                        lastMessage: c.lastMessage || '',
                        lastMessageTime: c.lastMessageTime || c.createdAt || Date.now(),
                        unread: c.unreadPatient || false,
                        muted: mutedSet.has(id)
                    });
                }
            }
            conversations = fresh;
            cache.saveConversations(uid, fresh);
            scheduleRender();
            setSyncStatus('online', 'محدّثة ✓');
        }, (err) => {
            console.warn('مزامنة:', err);
            setSyncStatus('syncing', 'غير متصل');
        });
    };

    // ==================== الأحداث ====================
    const setupEvents = () => {
        const list = document.getElementById('chatsList');
        const search = document.getElementById('searchInput');
        
        search.addEventListener('input', e => {
            searchTerm = e.target.value;
            scheduleRender();
        });
        
        list.addEventListener('click', e => {
            const optsBtn = e.target.closest('.options-btn');
            if (optsBtn) {
                e.stopPropagation();
                const menu = optsBtn.closest('.chat-wrapper').querySelector('.options-menu');
                document.querySelectorAll('.options-menu.show').forEach(m => m.classList.remove('show'));
                menu.classList.add('show');
                return;
            }
            
            const item = e.target.closest('.menu-item');
            if (item) {
                e.stopPropagation();
                const convId = item.dataset.convId;
                const action = item.dataset.action;
                item.closest('.options-menu').classList.remove('show');
                const conv = conversations.find(c => c.id === convId);
                if (!conv) return;
                
                if (action === 'mute') {
                    conv.muted = !conv.muted;
                    conv.muted ? mutedSet.add(convId) : mutedSet.delete(convId);
                    cache.saveConversations(uid, conversations);
                    scheduleRender();
                    toast(conv.muted ? '🔕 كتم الإشعارات' : '🔔 إلغاء الكتم', 'success');
                } else if (action === 'delete') {
                    showConfirm({
                        icon: '🗑️',
                        title: 'حذف المحادثة',
                        message: `سيتم حذف المحادثة مع ${conv.doctorName || 'الأخصائي'} نهائياً.`,
                        onConfirm: async () => {
                            try { await remove(ref(database, `conversations/${convId}`)); } catch {}
                            conversations = conversations.filter(c => c.id !== convId);
                            cache.saveConversations(uid, conversations);
                            scheduleRender();
                            toast('تم الحذف', 'success');
                        }
                    });
                }
                return;
            }
            
            document.querySelectorAll('.options-menu.show').forEach(m => m.classList.remove('show'));
            
            const card = e.target.closest('.chat-card');
            if (card) {
                const convId = card.dataset.convId;
                const conv = conversations.find(c => c.id === convId);
                if (conv) {
                    if (conv.unread) {
                        conv.unread = false;
                        scheduleRender();
                    }
                    window.location.href = `conversation.html?doctorId=${encodeURIComponent(conv.doctorId)}`;
                }
            }
        });
        
        document.addEventListener('click', () => {
            document.querySelectorAll('.options-menu.show').forEach(m => m.classList.remove('show'));
        });
    };

    // ==================== بدء التطبيق ====================
    const init = async (user) => {
        uid = user.uid;
        
        // عرض المخزن محلياً فوراً
        const cached = cache.loadConversations(uid);
        if (cached.length) {
            conversations = cached;
            cached.forEach(c => { if (c.muted) mutedSet.add(c.id); });
            scheduleRender();
            setSyncStatus('online', 'من الذاكرة المحلية');
        }
        
        removeSkeleton();
        setupEvents();
        startSync();
    };

    onAuthStateChanged(auth, user => {
        if (user) init(user);
        else window.location.href = 'patient-login.html';
    });

    if (!CSS.supports('backdrop-filter', 'blur(10px)')) {
        document.documentElement.style.setProperty('--surface', 'rgba(255, 255, 255, 0.98)');
    }
</script>
<script type="module" src="patient-call-listener.js"></script>
</body>
