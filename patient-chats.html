<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>سُكُون · محادثاتي</title>

    <!-- تحميل الخط مع استراتيجية العرض الفوري (font-display: swap) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== إعدادات متقدمة للأداء والجمال ==================== */
        :root {
            /* لوحة ألوان نفسية مريحة */
            --bg-primary: #f6faf9;
            --bg-secondary: #eef5f4;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --primary-50: #e6f3f3;
            --primary-100: #cce7e7;
            --primary-200: #99cfcf;
            --primary-300: #66b8b8;
            --primary-400: #3da0a0;
            --primary-500: #2a8888;
            --primary-600: #1f6f6f;
            --primary-700: #165656;
            --primary-800: #0d3d3d;
            --primary-900: #062424;
            
            --text-primary: #1a2e2e;
            --text-secondary: #3d5a5a;
            --text-tertiary: #6b8a8a;
            --text-on-primary: #ffffff;
            
            --danger: #d94f4f;
            --success: #2ecc71;
            --warning: #f4b740;
            
            --shadow-xs: 0 2px 4px rgba(22, 86, 86, 0.04);
            --shadow-sm: 0 6px 16px rgba(22, 86, 86, 0.06);
            --shadow-md: 0 12px 28px rgba(22, 86, 86, 0.08);
            --shadow-lg: 0 20px 40px rgba(22, 86, 86, 0.12);
            --shadow-focus: 0 0 0 3px rgba(42, 136, 136, 0.15);
            
            --radius-card: 28px;
            --radius-element: 18px;
            --radius-full: 9999px;
            
            --transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            
            color-scheme: light;
        }

        /* الوضع الليلي التلقائي */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0a1818;
                --bg-secondary: #0f2222;
                --surface: rgba(18, 30, 30, 0.85);
                --surface-solid: #142424;
                --text-primary: #e3f0f0;
                --text-secondary: #b3d1d1;
                --text-tertiary: #7aa3a3;
                --shadow-xs: 0 2px 4px rgba(0, 0, 0, 0.2);
                --shadow-sm: 0 6px 16px rgba(0, 0, 0, 0.25);
                --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
                color-scheme: dark;
            }
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 95px;
            line-height: 1.5;
            position: relative;
            transition: background 0.2s ease;
        }

        /* خلفية زخرفية ناعمة */
        body::before {
            content: '';
            position: fixed;
            top: -20vh;
            right: -10vw;
            width: 80vw;
            height: 80vw;
            max-width: 600px;
            max-height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(42, 136, 136, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 1.75rem 1.25rem;
            position: relative;
            z-index: 2;
        }

        /* ==================== رأس الصفحة ==================== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .logo-main {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--primary-600);
            line-height: 1;
        }

        .logo-sub {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--primary-300);
            margin-right: 2px;
        }

        .page-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--primary-100);
            box-shadow: var(--shadow-xs);
        }

        /* ==================== شريط البحث ==================== */
        .search-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            height: 56px;
            padding: 0 48px 0 20px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid var(--primary-100);
            border-radius: var(--radius-element);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            box-shadow: var(--shadow-xs);
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary-400);
            background: var(--surface-solid);
            box-shadow: var(--shadow-focus);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            pointer-events: none;
            width: 20px;
            height: 20px;
        }

        /* ==================== قائمة المحادثات ==================== */
        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            content-visibility: auto;
            contain-intrinsic-size: auto 100px;
        }

        .chat-wrapper {
            position: relative;
            /* مهم: لا نضع overflow: hidden حتى لا نخفي القائمة */
        }

        .chat-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 1rem 1.2rem;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s, box-shadow 0.2s;
            cursor: pointer;
            animation: cardFadeIn 0.3s ease forwards;
            opacity: 0;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-card:active {
            transform: scale(0.985);
            box-shadow: var(--shadow-md);
        }

        .chat-card.unread {
            border-right: 4px solid var(--primary-400);
        }

        .avatar-wrapper {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            box-shadow: var(--shadow-sm);
            border: 2.5px solid var(--surface-solid);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            loading: lazy;
        }

        .chat-content {
            flex: 1;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .doctor-name {
            font-weight: 800;
            font-size: 1rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        .chat-time {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            white-space: nowrap;
        }

        .chat-preview {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .last-message {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .unread-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--primary-400);
            box-shadow: 0 0 8px var(--primary-300);
            margin-right: 8px;
            flex-shrink: 0;
            visibility: hidden;
        }

        .chat-card.unread .unread-dot {
            visibility: visible;
        }

        .options-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-tertiary);
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .options-btn:hover {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        /* قائمة الخيارات المنسدلة */
        .options-menu {
            position: absolute;
            top: calc(100% - 8px);
            left: 16px;
            background: var(--surface-solid);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--primary-100);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 8px;
            min-width: 200px;
            z-index: 1000; /* تأكيد الظهور فوق كل شيء */
            list-style: none;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: opacity 0.18s, transform 0.18s, visibility 0.18s;
        }

        .options-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s;
        }

        .menu-item:hover {
            background: var(--primary-50);
            color: var(--primary-700);
        }

        .menu-item.danger {
            color: var(--danger);
        }

        .menu-item.danger:hover {
            background: rgba(217, 79, 79, 0.08);
        }

        /* ==================== حالات التحميل والخطأ ==================== */
        .skeleton-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 1rem 1.2rem;
            background: var(--surface);
            border-radius: var(--radius-card);
            border: 1.5px solid var(--primary-100);
            margin-bottom: 14px;
        }

        .skeleton-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary-100);
            animation: pulse 1.5s infinite ease-in-out;
        }

        .skeleton-lines {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .skeleton-line {
            height: 14px;
            background: var(--primary-100);
            border-radius: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-tertiary);
            display: none;
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        /* ==================== شريط المزامنة ==================== */
        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
            padding: 8px 16px;
            background: var(--surface);
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--primary-100);
            box-shadow: var(--shadow-xs);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-400);
            transition: background 0.2s;
        }

        .sync-dot.syncing {
            background: var(--warning);
            animation: blink 1.2s infinite;
        }

        .sync-dot.online {
            background: var(--success);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ==================== مربع حوار التأكيد ==================== */
        .confirm-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(10, 30, 30, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s;
        }

        .confirm-backdrop.show {
            opacity: 1;
            visibility: visible;
        }

        .confirm-dialog {
            background: var(--surface-solid);
            border-radius: var(--radius-card);
            border: 1.5px solid var(--primary-100);
            box-shadow: var(--shadow-lg);
            padding: 2rem 1.75rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
            transform: scale(0.92);
            transition: transform 0.3s cubic-bezier(0.32, 1, 0.5, 1);
        }

        .confirm-backdrop.show .confirm-dialog {
            transform: scale(1);
        }

        .confirm-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .confirm-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .confirm-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.75rem;
        }

        .confirm-actions {
            display: flex;
            gap: 12px;
        }

        .confirm-btn {
            flex: 1;
            padding: 12px;
            border-radius: 18px;
            border: none;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .confirm-btn.cancel {
            background: var(--primary-50);
            color: var(--text-secondary);
            border: 1.5px solid var(--primary-100);
        }

        .confirm-btn.confirm {
            background: var(--danger);
            color: white;
        }

        .confirm-btn.confirm.mute-action {
            background: var(--primary-600);
        }

        /* ==================== Toast ==================== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--primary-800);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
            box-shadow: var(--shadow-md);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        /* ==================== شريط التنقل السفلي ==================== */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 500px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 36px;
            display: flex;
            justify-content: space-around;
            padding: 10px 8px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 400;
        }

        .nav-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 18px;
            border-radius: 30px;
            color: var(--text-tertiary);
            font-weight: 600;
            font-size: 0.7rem;
            transition: var(--transition);
        }

        .nav-link.active {
            color: var(--primary-600);
            background: var(--primary-50);
        }

        /* أيقونات SVG */
        .icon {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .icon-sm {
            width: 18px;
            height: 18px;
        }

        /* تجاوب */
        @media (max-width: 480px) {
            .app-container {
                padding: 1.25rem 1rem;
            }
            .chat-card {
                padding: 0.9rem 1rem;
            }
        }
    </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
    // ==================== استيراد Firebase ====================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        databaseURL: "https://sakina-937c4-default-rtdb.firebaseio.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };
    
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);

    // ==================== إدارة التخزين المحلي (IndexedDB) ====================
    class LocalCache {
        constructor() {
            this.db = null;
        }
        
        async init() {
            if (this.db) return;
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('SakoonChatsCache', 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    this.db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('conversations')) {
                        db.createObjectStore('conversations', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('doctors')) {
                        db.createObjectStore('doctors', { keyPath: 'id' });
                    }
                };
            });
        }
        
        async getAllConversations() {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('conversations', 'readonly');
                const store = tx.objectStore('conversations');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => resolve([]);
            });
        }
        
        async saveConversations(conversations) {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('conversations', 'readwrite');
                const store = tx.objectStore('conversations');
                store.clear();
                conversations.forEach(c => store.put(c));
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
        
        async removeConversation(id) {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('conversations', 'readwrite');
                const store = tx.objectStore('conversations');
                store.delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
        
        async getDoctor(id) {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('doctors', 'readonly');
                const store = tx.objectStore('doctors');
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => resolve(null);
            });
        }
        
        async saveDoctor(doctor) {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('doctors', 'readwrite');
                const store = tx.objectStore('doctors');
                store.put(doctor);
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
    }

    const cache = new LocalCache();

    // ==================== دوال مساعدة ====================
    const toast = (message, type = '') => {
        const el = document.getElementById('toast');
        el.textContent = message;
        el.className = `toast show ${type}`;
        setTimeout(() => el.classList.remove('show'), 3000);
    };

    const formatTime = (timestamp) => {
        if (!timestamp) return '';
        const date = new Date(timestamp);
        const now = new Date();
        const diffSec = Math.floor((now - date) / 1000);
        if (diffSec < 60) return 'الآن';
        if (diffSec < 3600) return `${Math.floor(diffSec / 60)} د`;
        if (diffSec < 86400) return date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        if (diffSec < 172800) return 'أمس';
        return date.toLocaleDateString('ar-EG', { day: 'numeric', month: 'short' });
    };

    const escapeHtml = (str) => {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    };
    const escapeAttr = (str) => String(str).replace(/"/g, '&quot;');

    // إظهار/إخفاء مؤشر المزامنة
    const setSyncStatus = (status, message) => {
        const dot = document.getElementById('syncDot');
        const msg = document.getElementById('syncMessage');
        dot.className = 'sync-dot';
        if (status === 'syncing') dot.classList.add('syncing');
        else if (status === 'online') dot.classList.add('online');
        msg.textContent = message;
    };

    // مربع حوار التأكيد
    const showConfirm = ({ icon, title, message, confirmClass, onConfirm }) => {
        document.getElementById('confirmIcon').textContent = icon || '⚠️';
        document.getElementById('confirmTitle').textContent = title || '';
        document.getElementById('confirmMsg').textContent = message || '';
        const okBtn = document.getElementById('confirmOk');
        okBtn.className = `confirm-btn confirm ${confirmClass || ''}`;
        const backdrop = document.getElementById('confirmBackdrop');
        backdrop.classList.add('show');
        
        const close = () => backdrop.classList.remove('show');
        document.getElementById('confirmCancel').onclick = close;
        okBtn.onclick = () => {
            close();
            onConfirm && onConfirm();
        };
        backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
    };

    // ==================== الحالة العامة ====================
    let currentUserId = null;
    let conversations = [];
    let searchQuery = '';
    const mutedSet = new Set(); // مجموعة المحادثات المكتومة مؤقتاً

    // إخفاء الهيكل العظمي
    const removeSkeleton = () => {
        const skel = document.getElementById('skeletonContainer');
        if (skel) skel.remove();
    };

    // عرض القائمة
    const renderChats = () => {
        removeSkeleton();
        const listEl = document.getElementById('chatsList');
        const emptyEl = document.getElementById('emptyState');
        const query = searchQuery.toLowerCase().trim();
        
        const filtered = conversations.filter(c => 
            !query || (c.doctorName || '').toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            listEl.innerHTML = '';
            emptyEl.style.display = 'block';
            return;
        }
        emptyEl.style.display = 'none';

        const fragment = document.createDocumentFragment();
        
        filtered.forEach((conv, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'chat-wrapper';
            
            const card = document.createElement('div');
            card.className = 'chat-card' + (conv.unread ? ' unread' : '');
            card.style.animationDelay = `${index * 0.05}s`;
            card.dataset.convId = conv.id;
            
            const avatarContent = conv.doctorAvatar 
                ? `<img src="${escapeAttr(conv.doctorAvatar)}" alt="${escapeAttr(conv.doctorName)}" class="avatar-img" loading="lazy">`
                : (conv.doctorName || 'د').charAt(0).toUpperCase();
            
            card.innerHTML = `
                <div class="avatar-wrapper">${avatarContent}</div>
                <div class="chat-content">
                    <div class="chat-header">
                        <span class="doctor-name">${escapeHtml(conv.doctorName || 'أخصائي')}</span>
                        <span class="chat-time">${formatTime(conv.lastMessageTime)}</span>
                    </div>
                    <div class="chat-preview">
                        <span class="last-message">${conv.muted ? '🔕 ' : ''}${escapeHtml(conv.lastMessage || 'ابدأ المحادثة...')}</span>
                        <span class="unread-dot"></span>
                    </div>
                </div>
                <button class="options-btn" data-conv-id="${conv.id}" title="خيارات">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle>
                    </svg>
                </button>
            `;
            
            const menu = document.createElement('ul');
            menu.className = 'options-menu';
            menu.innerHTML = `
                <li class="menu-item" data-action="mute" data-conv-id="${conv.id}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        ${conv.muted 
                            ? '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>'
                            : '<path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"></path>'}
                    </svg>
                    <span>${conv.muted ? 'إلغاء الكتم' : 'كتم الإشعارات'}</span>
                </li>
                <li class="menu-item danger" data-action="delete" data-conv-id="${conv.id}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    <span>حذف المحادثة</span>
                </li>
            `;
            
            wrapper.appendChild(card);
            wrapper.appendChild(menu);
            fragment.appendChild(wrapper);
        });
        
        listEl.innerHTML = '';
        listEl.appendChild(fragment);
    };

    // جلب بيانات الطبيب (من الكاش أولاً ثم Firebase)
    const fetchDoctorData = async (doctorId) => {
        // من الكاش
        let doc = await cache.getDoctor(doctorId);
        if (doc) return doc;
        
        // من Firebase
        try {
            const snap = await get(ref(database, `doctors/${doctorId}`));
            if (snap.exists()) {
                const data = snap.val();
                doc = {
                    id: doctorId,
                    name: data.name || '',
                    specialty: data.specialty || '',
                    photoURL: data.photoURL || ''
                };
                await cache.saveDoctor(doc);
                return doc;
            }
        } catch (e) {
            console.warn('تعذر جلب بيانات الطبيب:', e);
        }
        return { id: doctorId, name: '', specialty: '', photoURL: '' };
    };

    // ==================== المزامنة مع Firebase ====================
    const startRealtimeSync = () => {
        const convsRef = ref(database, 'conversations');
        
        onValue(convsRef, async (snapshot) => {
            setSyncStatus('syncing', 'جاري تحديث المحادثات...');
            
            const freshConversations = [];
            if (snapshot.exists()) {
                const data = snapshot.val();
                
                for (const convId in data) {
                    const conv = data[convId];
                    // فلترة للمريض الحالي فقط
                    if (conv.patientId !== currentUserId) continue;
                    
                    const muted = mutedSet.has(convId);
                    
                    // جلب بيانات الطبيب
                    const doctor = await fetchDoctorData(conv.doctorId);
                    
                    const enriched = {
                        id: convId,
                        doctorId: conv.doctorId,
                        doctorName: doctor.name,
                        doctorAvatar: doctor.photoURL,
                        lastMessage: conv.lastMessage || '',
                        lastMessageTime: conv.lastMessageTime || conv.createdAt || Date.now(),
                        unread: conv.unreadPatient || false,
                        muted
                    };
                    
                    freshConversations.push(enriched);
                }
            }
            
            // تحديث الحالة والكاش
            conversations = freshConversations;
            await cache.saveConversations(freshConversations);
            
            renderChats();
            setSyncStatus('online', 'المحادثات محدثة ✓');
        }, (error) => {
            console.error('خطأ في المزامنة:', error);
            setSyncStatus('syncing', 'غير متصل - عرض البيانات المخزنة');
        });
    };

    // ==================== معالجة الأحداث ====================
    const setupEventListeners = () => {
        const list = document.getElementById('chatsList');
        const searchInput = document.getElementById('searchInput');
        
        // البحث
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderChats();
        });
        
        // النقر على البطاقات والأزرار
        list.addEventListener('click', (e) => {
            // زر الخيارات
            const optionsBtn = e.target.closest('.options-btn');
            if (optionsBtn) {
                e.stopPropagation();
                const wrapper = optionsBtn.closest('.chat-wrapper');
                const menu = wrapper.querySelector('.options-menu');
                // إغلاق أي قائمة مفتوحة أخرى
                document.querySelectorAll('.options-menu.show').forEach(m => m.classList.remove('show'));
                menu.classList.add('show');
                return;
            }
            
            // عنصر في القائمة
            const menuItem = e.target.closest('.menu-item');
            if (menuItem) {
                e.stopPropagation();
                const convId = menuItem.dataset.convId;
                const action = menuItem.dataset.action;
                const wrapper = menuItem.closest('.chat-wrapper');
                wrapper.querySelector('.options-menu').classList.remove('show');
                
                const conv = conversations.find(c => c.id === convId);
                if (!conv) return;
                
                if (action === 'mute') {
                    const newMuted = !conv.muted;
                    conv.muted = newMuted;
                    if (newMuted) mutedSet.add(convId);
                    else mutedSet.delete(convId);
                    // تحديث الكاش
                    cache.saveConversations(conversations);
                    renderChats();
                    toast(newMuted ? '🔕 تم كتم الإشعارات' : '🔔 تم إلغاء الكتم', 'success');
                }
                
                if (action === 'delete') {
                    showConfirm({
                        icon: '🗑️',
                        title: 'حذف المحادثة',
                        message: `سيتم حذف محادثتك مع ${conv.doctorName || 'الأخصائي'} نهائياً.`,
                        onConfirm: async () => {
                            try {
                                await remove(ref(database, `conversations/${convId}`));
                            } catch (err) {
                                console.warn('فشل حذف المحادثة من Firebase:', err);
                            }
                            // حذف من الحالة والكاش
                            conversations = conversations.filter(c => c.id !== convId);
                            await cache.removeConversation(convId);
                            renderChats();
                            toast('تم حذف المحادثة', 'success');
                        }
                    });
                }
                return;
            }
            
            // إغلاق القوائم المفتوحة عند النقر خارجها
            document.querySelectorAll('.options-menu.show').forEach(m => m.classList.remove('show'));
            
            // النقر على بطاقة المحادثة للانتقال
            const card = e.target.closest('.chat-card');
            if (card) {
                const convId = card.dataset.convId;
                const conv = conversations.find(c => c.id === convId);
                if (conv) {
                    // ✅ تحسين تجربة المستخدم: إخفاء علامة "غير مقروء" فوراً
                    if (conv.unread) {
                        conv.unread = false;
                        // تحديث العرض المحلي فوراً
                        renderChats();
                    }
                    // الانتقال إلى صفحة المحادثة
                    window.location.href = `conversation.html?doctorId=${encodeURIComponent(conv.doctorId)}`;
                }
            }
        });
        
        // إغلاق القوائم عند النقر خارجها
        document.addEventListener('click', () => {
            document.querySelectorAll('.options-menu.show').forEach(m => m.classList.remove('show'));
        });
    };

    // ==================== بدء التشغيل ====================
    const init = async (user) => {
        currentUserId = user.uid;
        
        // تحميل الكاش أولاً للعرض الفوري
        const cached = await cache.getAllConversations();
        if (cached.length) {
            conversations = cached;
            cached.forEach(c => { if (c.muted) mutedSet.add(c.id); });
            renderChats();
            setSyncStatus('online', 'تم التحميل من الذاكرة المحلية');
        }
        
        setupEventListeners();
        startRealtimeSync();
    };

    // التحقق من حالة المستخدم
    onAuthStateChanged(auth, (user) => {
        if (user) {
            init(user);
        } else {
            window.location.href = 'patient-login.html';
        }
    });

    // دعم الأجهزة التي لا تدعم backdrop-filter
    if (!CSS.supports('backdrop-filter', 'blur(10px)')) {
        document.documentElement.style.setProperty('--surface', 'rgba(255, 255, 255, 0.98)');
    }
</script>
