<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>سُكُون | رحلة العناية النفسية</title>

    <!-- تحميل الخط مع استراتيجية العرض الفوري -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== نفس التصميم السابق (بدون تغيير) ==================== */
        :root {
            --bg-primary: #f6faf9;
            --bg-secondary: #eef5f4;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --primary-50: #e6f3f3;
            --primary-100: #cce7e7;
            --primary-200: #99cfcf;
            --primary-300: #66b8b8;
            --primary-400: #3da0a0;
            --primary-500: #2a8888;
            --primary-600: #1f6f6f;
            --primary-700: #165656;
            --primary-800: #0d3d3d;
            --primary-900: #062424;
            
            --text-primary: #1a2e2e;
            --text-secondary: #3d5a5a;
            --text-tertiary: #6b8a8a;
            --text-on-primary: #ffffff;
            
            --shadow-xs: 0 2px 4px rgba(22, 86, 86, 0.04);
            --shadow-sm: 0 6px 16px rgba(22, 86, 86, 0.06);
            --shadow-md: 0 12px 28px rgba(22, 86, 86, 0.08);
            --shadow-lg: 0 20px 40px rgba(22, 86, 86, 0.12);
            --shadow-focus: 0 0 0 3px rgba(42, 136, 136, 0.15);
            
            --radius-card: 28px;
            --radius-element: 18px;
            --radius-full: 9999px;
            
            --transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            color-scheme: light;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0a1818;
                --bg-secondary: #0f2222;
                --surface: rgba(18, 30, 30, 0.85);
                --surface-solid: #142424;
                --text-primary: #e3f0f0;
                --text-secondary: #b3d1d1;
                --text-tertiary: #7aa3a3;
                --shadow-xs: 0 2px 4px rgba(0, 0, 0, 0.2);
                --shadow-sm: 0 6px 16px rgba(0, 0, 0, 0.25);
                --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
                color-scheme: dark;
            }
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 95px;
            line-height: 1.5;
            position: relative;
            transition: background 0.2s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20vh;
            right: -10vw;
            width: 80vw;
            height: 80vw;
            max-width: 600px;
            max-height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(42, 136, 136, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 1.75rem 1.25rem;
            position: relative;
            z-index: 2;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .logo-main {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--primary-600);
            line-height: 1;
        }

        .logo-sub {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--primary-300);
            margin-right: 2px;
        }

        .header-wave {
            width: 80px;
            height: 24px;
            opacity: 0.4;
            color: var(--primary-200);
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            align-items: center;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        .search-input {
            width: 100%;
            height: 56px;
            padding: 0 48px 0 20px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid var(--primary-100);
            border-radius: var(--radius-element);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            box-shadow: var(--shadow-xs);
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary-400);
            background: var(--surface-solid);
            box-shadow: var(--shadow-focus);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            pointer-events: none;
            width: 20px;
            height: 20px;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 56px;
            padding: 0 20px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid var(--primary-100);
            border-radius: var(--radius-element);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            box-shadow: var(--shadow-xs);
            transition: var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-btn:hover {
            border-color: var(--primary-300);
            background: var(--surface-solid);
        }

        .filter-btn.active {
            border-color: var(--primary-400);
            background: var(--primary-50);
        }

        .filter-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            background: var(--surface-solid);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--primary-100);
            padding: 8px;
            min-width: 240px;
            z-index: 100;
            display: none;
            transform-origin: top left;
            animation: dropdownFade 0.18s ease;
        }

        @keyframes dropdownFade {
            from { opacity: 0; transform: scale(0.95) translateY(-8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .filter-dropdown.show {
            display: block;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s;
        }

        .filter-option:hover {
            background: var(--primary-50);
            color: var(--primary-700);
        }

        .filter-option.active {
            background: var(--primary-500);
            color: white;
        }

        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            content-visibility: auto;
            contain-intrinsic-size: auto 200px;
        }

        .doctor-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            transition: transform 0.15s, box-shadow 0.2s;
            will-change: transform;
        }

        @media (prefers-reduced-motion: no-preference) {
            .doctor-card:active {
                transform: scale(0.985);
                box-shadow: var(--shadow-md);
            }
        }

        .card-header {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        .avatar-wrapper {
            width: 96px;
            height: 96px;
            flex-shrink: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            box-shadow: var(--shadow-md);
            border: 3px solid var(--surface-solid);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            loading: lazy;
        }

        .doctor-info {
            flex: 1;
            min-width: 0;
        }

        .doctor-name {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .specialty-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary-50);
            color: var(--primary-700);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid var(--primary-100);
            margin-bottom: 8px;
        }

        .doctor-bio {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, var(--primary-600), var(--primary-500));
            color: white;
            border: none;
            border-radius: 18px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(42, 136, 136, 0.25);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .action-button:active {
            transform: scale(0.97);
            box-shadow: 0 4px 10px rgba(42, 136, 136, 0.3);
        }

        .skeleton-card {
            background: var(--surface);
            border-radius: var(--radius-card);
            padding: 1.5rem;
            display: flex;
            gap: 1.2rem;
            border: 1.5px solid var(--primary-100);
        }

        .skeleton-avatar {
            width: 96px;
            height: 96px;
            border-radius: 24px;
            background: var(--primary-100);
            animation: pulse 1.5s infinite ease-in-out;
        }

        .skeleton-lines {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 8px;
        }

        .skeleton-line {
            height: 16px;
            background: var(--primary-100);
            border-radius: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-tertiary);
            display: none;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
            padding: 8px 16px;
            background: var(--surface);
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--primary-100);
            box-shadow: var(--shadow-xs);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-400);
            transition: background 0.2s;
        }

        .sync-dot.syncing {
            background: #f4b740;
            animation: blink 1.2s infinite;
        }

        .sync-dot.online {
            background: #2ecc71;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 500px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 36px;
            display: flex;
            justify-content: space-around;
            padding: 10px 8px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 500;
        }

        .nav-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 18px;
            border-radius: 30px;
            color: var(--text-tertiary);
            font-weight: 600;
            font-size: 0.7rem;
            transition: var(--transition);
        }

        .nav-link.active {
            color: var(--primary-600);
            background: var(--primary-50);
        }

        .icon {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .icon-sm {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 1.25rem 1rem;
            }
            .doctor-card {
                padding: 1.2rem;
            }
            .avatar-wrapper {
                width: 80px;
                height: 80px;
                border-radius: 20px;
            }
            .doctor-name {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="logo">
            <span class="logo-main">سُ</span>

        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث باسم الأخصائي..." autocomplete="off" aria-label="بحث">
            <span class="search-icon">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">

            <button class="filter-btn" id="filterBtn">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">

<script type="module">
    // ==================== استيراد الإعدادات من ملف خارجي ====================
    import { firebaseConfig } from './firebase-config.js';
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    // تهيئة Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);

    // ==================== إدارة التخزين المحلي عالي الأداء ====================
    const STORAGE_KEY = 'sakoon_doctors_cache_v1';
    const LAST_SYNC_KEY = 'sakoon_last_sync';
    
    const cache = {
        save(doctors) {
            try {
                // نخزن فقط الحقول الضرورية لتقليل الحجم
                const compact = doctors.map(d => ({
                    i: d.id,
                    u: d.authUid || d.id,
                    n: d.name || '',
                    s: d.specialty || '',
                    b: (d.quickBlurb || '').substring(0, 100),
                    p: d.photoURL || ''
                }));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(compact));
                localStorage.setItem(LAST_SYNC_KEY, Date.now());
            } catch (e) {
                // في حال تجاوز السعة، نحذف البيانات القديمة
                localStorage.removeItem(STORAGE_KEY);
            }
        },
        load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return [];
                const compact = JSON.parse(raw);
                // إعادة بناء الكائنات بالشكل المتوقع
                return compact.map(d => ({
                    id: d.i,
                    authUid: d.u,
                    name: d.n,
                    specialty: d.s,
                    quickBlurb: d.b,
                    photoURL: d.p
                }));
            } catch {
                return [];
            }
        },
        getLastSync() {
            return parseInt(localStorage.getItem(LAST_SYNC_KEY) || '0');
        }
    };

    // ==================== الدوال المساعدة ====================
    const specialtyLabels = {
        'psychiatrist': 'طبيب نفسي',
        'psychologist': 'أخصائي نفسي',
        'family_counselor': 'استشاري أسري',
        'child_psychology': 'علم نفس الأطفال',
        'addiction_counselor': 'استشاري إدمان',
        'cbt': 'معالج سلوكي معرفي',
        'trauma_therapist': 'معالج صدمات'
    };
    const getSpecialtyName = (key) => specialtyLabels[key] || key || 'معالج';

    // عناصر DOM
    const grid = document.getElementById('cardsGrid');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const filterBtn = document.getElementById('filterBtn');
    const filterDropdown = document.getElementById('filterDropdown');
    const filterLabel = document.getElementById('filterLabel');
    const syncDot = document.getElementById('syncDot');
    const syncMessage = document.getElementById('syncMessage');

    let allDoctors = [];
    let filterSpecialty = 'all';
    let searchQuery = '';
    let currentUser = null;

    // ضبط مؤشر المزامنة
    function setSyncStatus(status, msg) {
        syncDot.className = 'sync-dot';
        if (status === 'syncing') syncDot.classList.add('syncing');
        else if (status === 'online') syncDot.classList.add('online');
        syncMessage.textContent = msg;
    }

    // خنق (throttle) للبحث
    let renderScheduled = false;
    function scheduleRender() {
        if (renderScheduled) return;
        renderScheduled = true;
        requestAnimationFrame(() => {
            performRender();
            renderScheduled = false;
        });
    }

    // تنفيذ عرض البطاقات
    function performRender() {
        const query = searchQuery.toLowerCase().trim();
        const filtered = allDoctors.filter(doc => {
            if (filterSpecialty !== 'all' && doc.specialty !== filterSpecialty) return false;
            if (!query) return true;
            return (doc.name || '').toLowerCase().includes(query) ||
                   getSpecialtyName(doc.specialty).includes(query);
        });

        if (filtered.length === 0) {
            grid.innerHTML = '';
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';

        const fragment = document.createDocumentFragment();
        filtered.forEach(doc => {
            const card = createDoctorCard(doc);
            fragment.appendChild(card);
        });
        
        grid.innerHTML = '';
        grid.appendChild(fragment);
    }

    // إنشاء بطاقة طبيب (لتقليل تكرار الكود)
    function createDoctorCard(doc) {
        const card = document.createElement('div');
        card.className = 'doctor-card';
        
        const avatarHtml = doc.photoURL
            ? `<div class="avatar-wrapper"><img src="${escapeAttr(doc.photoURL)}" alt="${escapeAttr(doc.name)}" class="avatar-img" loading="lazy"></div>`
            : `<div class="avatar-wrapper">${(doc.name || 'د').charAt(0).toUpperCase()}</div>`;
        
        const specLabel = getSpecialtyName(doc.specialty);
        const bio = (doc.quickBlurb || '').substring(0, 120);
        
        card.innerHTML = `
            <div class="card-header">
                ${avatarHtml}
                <div class="doctor-info">
                    <div class="doctor-name">${escapeHtml(doc.name || '—')}</div>
                    <div class="specialty-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="8" r="4"></circle><path d="M5 20v-2a7 7 0 0 1 14 0v2"></path>
                        </svg>
                        ${escapeHtml(specLabel)}
                    </div>
                    <div class="doctor-bio">${escapeHtml(bio)}${bio.length > 100 ? '...' : ''}</div>
                </div>
            </div>
            <button class="action-button" data-doctor-id="${escapeAttr(doc.authUid || doc.id)}" data-patient-id="${escapeAttr(currentUser?.uid || '')}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                </svg>
                راسل الآن
            </button>
        `;
        return card;
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }
    function escapeAttr(text) {
        return String(text).replace(/"/g, '&quot;');
    }

    // بناء قائمة التخصصات
    function buildFilterDropdown() {
        const specs = [...new Set(allDoctors.map(d => d.specialty).filter(Boolean))];
        const items = ['all', ...specs];
        
        filterDropdown.innerHTML = '';
        items.forEach(spec => {
            const div = document.createElement('div');
            div.className = 'filter-option' + (filterSpecialty === spec ? ' active' : '');
            div.dataset.spec = spec;
            div.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    ${spec === 'all' 
                        ? '<circle cx="12" cy="12" r="10"></circle><path d="M12 8v8M8 12h8"></path>'
                        : '<polyline points="20 6 9 17 4 12"></polyline>'}
                </svg>
                ${spec === 'all' ? 'كل التخصصات' : getSpecialtyName(spec)}
            `;
            filterDropdown.appendChild(div);
        });
    }

    // ==================== المزامنة مع Firebase ====================
    function startRealtimeSync() {
        const doctorsRef = ref(database, 'doctors');
        
        onValue(doctorsRef, (snapshot) => {
            setSyncStatus('syncing', 'جاري تحديث البيانات...');
            
            const fresh = [];
            snapshot.forEach(child => {
                const data = child.val();
                if (data.status !== 'blocked') {
                    fresh.push({
                        id: child.key,
                        authUid: data.authUid || child.key,
                        name: data.name || '',
                        specialty: data.specialty || '',
                        quickBlurb: data.quickBlurb || '',
                        photoURL: data.photoURL || '',
                        email: data.email || '',
                        phone: data.phone || '',
                        status: data.status || 'active'
                    });
                }
            });
            
            // تحديث الكاش والذاكرة
            cache.save(fresh);
            allDoctors = fresh;
            
            buildFilterDropdown();
            scheduleRender();
            setSyncStatus('online', 'بيانات محدثة ✓');
        }, (error) => {
            console.warn('خطأ في المزامنة:', error);
            setSyncStatus('syncing', 'غير متصل - عرض البيانات المخزنة');
        });
    }

    // ==================== التهيئة ====================
    async function initialize() {
        // تحميل البيانات المخزنة فوراً
        const cached = cache.load();
        if (cached.length) {
            allDoctors = cached;
            buildFilterDropdown();
            scheduleRender();
            setSyncStatus('online', 'تم التحميل من الذاكرة المحلية');
        } else {
            // عرض skeletons (موجودة مبدئياً في HTML)
            setSyncStatus('syncing', 'تحميل أول مرة...');
        }
        
        startRealtimeSync();
    }

    // ==================== إعداد الأحداث ====================
    function setupListeners() {
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            scheduleRender();
        });
        
        filterBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            filterDropdown.classList.toggle('show');
            filterBtn.classList.toggle('active');
        });
        
        document.addEventListener('click', () => {
            filterDropdown.classList.remove('show');
            filterBtn.classList.remove('active');
        });
        
        filterDropdown.addEventListener('click', (e) => {
            const option = e.target.closest('.filter-option');
            if (!option) return;
            filterSpecialty = option.dataset.spec;
            filterLabel.textContent = filterSpecialty === 'all' ? 'كل التخصصات' : getSpecialtyName(filterSpecialty);
            buildFilterDropdown();
            scheduleRender();
            filterDropdown.classList.remove('show');
            filterBtn.classList.remove('active');
        });
        
        grid.addEventListener('click', (e) => {
            const btn = e.target.closest('.action-button');
            if (!btn) return;
            const doctorId = btn.dataset.doctorId;
            const patientId = btn.dataset.patientId;
            window.location.href = `conversation.html?doctorId=${encodeURIComponent(doctorId)}&patientId=${encodeURIComponent(patientId)}`;
        });
    }

    // ==================== بدء التشغيل ====================
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            setupListeners();
            initialize();
        } else {
            window.location.href = 'patient-login.html';
        }
    });

    // دعم الأجهزة القديمة
    if (!CSS.supports('backdrop-filter', 'blur(10px)')) {
        document.documentElement.style.setProperty('--surface', 'rgba(255, 255, 255, 0.98)');
    }
</script>
