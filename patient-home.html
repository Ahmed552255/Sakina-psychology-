<script type="module">
    // ==================== إعدادات Firebase ====================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        databaseURL: "https://sakina-937c4-default-rtdb.firebaseio.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);

    // ==================== طبقة تخزين متطورة (Memory + IndexedDB) ====================
    const memoryCache = new Map();
    
    class TurboCache {
        constructor() {
            this.db = null;
            this.ready = false;
            this.initPromise = this.init();
        }
        async init() {
            if (this.ready) return;
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('SakoonTurboCache', 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    this.db = request.result;
                    this.ready = true;
                    resolve();
                };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('doctors')) {
                        db.createObjectStore('doctors', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('meta')) {
                        db.createObjectStore('meta', { keyPath: 'key' });
                    }
                };
            });
        }
        async getDoctors() {
            await this.initPromise;
            return new Promise((resolve) => {
                const tx = this.db.transaction('doctors', 'readonly');
                const store = tx.objectStore('doctors');
                const req = store.getAll();
                req.onsuccess = () => {
                    const data = req.result || [];
                    // تخزين في الذاكرة للقراءة الفورية
                    data.forEach(d => memoryCache.set(d.id, d));
                    resolve(data);
                };
                req.onerror = () => resolve([]);
            });
        }
        async saveDoctors(doctors) {
            await this.initPromise;
            return new Promise((resolve) => {
                const tx = this.db.transaction('doctors', 'readwrite');
                const store = tx.objectStore('doctors');
                store.clear();
                doctors.forEach(d => {
                    store.put(d);
                    memoryCache.set(d.id, d);
                });
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
    }
    const turboCache = new TurboCache();

    // ==================== دوال مساعدة ====================
    const specialtyLabels = {
        'psychiatrist': 'طبيب نفسي',
        'psychologist': 'أخصائي نفسي',
        'family_counselor': 'استشاري أسري',
        'child_psychology': 'علم نفس الأطفال',
        'addiction_counselor': 'استشاري إدمان',
        'cbt': 'معالج سلوكي معرفي',
        'trauma_therapist': 'معالج صدمات'
    };
    const getSpecialtyName = (key) => specialtyLabels[key] || key || 'معالج';

    // عناصر DOM
    const grid = document.getElementById('cardsGrid');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const filterBtn = document.getElementById('filterBtn');
    const filterDropdown = document.getElementById('filterDropdown');
    const filterLabel = document.getElementById('filterLabel');
    const syncDot = document.getElementById('syncDot');
    const syncMessage = document.getElementById('syncMessage');

    let allDoctors = [];
    let filterSpecialty = 'all';
    let searchQuery = '';
    let currentUser = null;

    function setSyncStatus(status, msg) {
        syncDot.className = '';
        if (status === 'syncing') syncDot.classList.add('syncing');
        else if (status === 'online') syncDot.classList.add('online');
        syncMessage.textContent = msg;
    }

    // عرض البطاقات على دفعات (تحسين الأداء)
    function renderCards() {
        const query = searchQuery.toLowerCase().trim();
        const filtered = allDoctors.filter(doc => {
            if (filterSpecialty !== 'all' && doc.specialty !== filterSpecialty) return false;
            if (!query) return true;
            return (doc.name || '').toLowerCase().includes(query) ||
                   getSpecialtyName(doc.specialty).includes(query);
        });

        if (filtered.length === 0) {
            grid.innerHTML = '';
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';

        // عرض أول 6 عناصر فقط لتحسين الرسم الأولي
        const firstBatch = filtered.slice(0, 6);
        const fragment = document.createDocumentFragment();
        
        firstBatch.forEach(doc => {
            fragment.appendChild(createCardElement(doc));
        });
        
        grid.innerHTML = '';
        grid.appendChild(fragment);
        
        // عرض الباقي لاحقاً باستخدام requestIdleCallback
        if (filtered.length > 6) {
            const remaining = filtered.slice(6);
            const renderRemaining = () => {
                const frag = document.createDocumentFragment();
                remaining.forEach(doc => frag.appendChild(createCardElement(doc)));
                grid.appendChild(frag);
            };
            if ('scheduler' in window && 'postTask' in scheduler) {
                scheduler.postTask(renderRemaining, { priority: 'background' });
            } else if (window.requestIdleCallback) {
                requestIdleCallback(renderRemaining);
            } else {
                setTimeout(renderRemaining, 100);
            }
        }
    }

    function createCardElement(doc) {
        const card = document.createElement('div');
        card.className = 'doctor-card';
        
        const avatarContent = doc.photoURL 
            ? `<img src="${escapeAttr(doc.photoURL)}" alt="${escapeAttr(doc.name)}" class="avatar-img" loading="lazy" decoding="async" fetchpriority="low">`
            : (doc.name || 'د').charAt(0).toUpperCase();
        
        const avatarHtml = `<div class="avatar-wrapper">${avatarContent}</div>`;
        const specLabel = getSpecialtyName(doc.specialty);
        const bio = (doc.quickBlurb || '').substring(0, 120);
        
        card.innerHTML = `
            <div style="display:flex;gap:1.2rem;align-items:center;">
                ${avatarHtml}
                <div style="flex:1;">
                    <div class="doctor-name">${escapeHtml(doc.name || '—')}</div>
                    <div class="specialty-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/>
                        </svg>
                        ${escapeHtml(specLabel)}
                    </div>
                    <div class="doctor-bio">${escapeHtml(bio)}${bio.length > 100 ? '...' : ''}</div>
                </div>
            </div>
            <button class="action-button" data-doctor-id="${escapeAttr(doc.authUid || doc.id)}" data-patient-id="${escapeAttr(currentUser?.uid || '')}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                </svg>
                راسل الآن
            </button>
        `;
        return card;
    }

    function escapeHtml(t) { return t ? String(t).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) : ''; }
    function escapeAttr(t) { return String(t).replace(/"/g, '&quot;'); }

    function buildDropdown() {
        const specs = [...new Set(allDoctors.map(d => d.specialty).filter(Boolean))];
        const items = ['all', ...specs];
        filterDropdown.innerHTML = '';
        items.forEach(spec => {
            const div = document.createElement('div');
            div.className = 'filter-option' + (filterSpecialty === spec ? ' active' : '');
            div.dataset.spec = spec;
            div.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    ${spec === 'all' ? '<circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>' : '<polyline points="20 6 9 17 4 12"/>'}
                </svg>
                ${spec === 'all' ? 'كل التخصصات' : getSpecialtyName(spec)}
            `;
            filterDropdown.appendChild(div);
        });
    }

    // المزامنة مع Firebase
    function startSync() {
        const doctorsRef = ref(database, 'doctors');
        onValue(doctorsRef, async (snapshot) => {
            setSyncStatus('syncing', 'تحديث...');
            const fresh = [];
            snapshot.forEach(c => {
                const d = c.val();
                if (d.status !== 'blocked') {
                    fresh.push({
                        id: c.key,
                        authUid: d.authUid || c.key,
                        name: d.name || '',
                        specialty: d.specialty || '',
                        quickBlurb: d.quickBlurb || '',
                        photoURL: d.photoURL || '',
                        email: d.email || '',
                        phone: d.phone || ''
                    });
                }
            });
            await turboCache.saveDoctors(fresh);
            allDoctors = fresh;
            buildDropdown();
            renderCards();
            setSyncStatus('online', 'محدثة الآن ✓');
        }, (err) => {
            console.warn(err);
            setSyncStatus('syncing', 'غير متصل - البيانات المخزنة');
        });
    }

    // التهيئة
    async function init() {
        // قراءة فورية من الذاكرة (إن وجدت)
        const memData = Array.from(memoryCache.values());
        if (memData.length) {
            allDoctors = memData;
            buildDropdown();
            renderCards();
            setSyncStatus('online', 'بيانات فورية');
        } else {
            const cached = await turboCache.getDoctors();
            if (cached.length) {
                allDoctors = cached;
                buildDropdown();
                renderCards();
                setSyncStatus('online', 'من الذاكرة المحلية');
            } else {
                setSyncStatus('syncing', 'تحميل أول مرة...');
            }
        }
        startSync();
    }

    // الأحداث
    function setupEvents() {
        searchInput.addEventListener('input', e => { searchQuery = e.target.value; renderCards(); });
        filterBtn.addEventListener('click', e => { e.stopPropagation(); filterDropdown.classList.toggle('show'); filterBtn.classList.toggle('active'); });
        document.addEventListener('click', () => { filterDropdown.classList.remove('show'); filterBtn.classList.remove('active'); });
        filterDropdown.addEventListener('click', e => {
            const opt = e.target.closest('.filter-option');
            if (!opt) return;
            filterSpecialty = opt.dataset.spec;
            filterLabel.textContent = filterSpecialty === 'all' ? 'كل التخصصات' : getSpecialtyName(filterSpecialty);
            buildDropdown();
            renderCards();
            filterDropdown.classList.remove('show');
            filterBtn.classList.remove('active');
        });
        grid.addEventListener('click', e => {
            const btn = e.target.closest('.action-button');
            if (!btn) return;
            const dId = btn.dataset.doctorId;
            const pId = btn.dataset.patientId;
            window.location.href = `conversation.html?doctorId=${encodeURIComponent(dId)}&patientId=${encodeURIComponent(pId)}`;
        });
    }

    onAuthStateChanged(auth, user => {
        if (user) {
            currentUser = user;
            setupEvents();
            init();
        } else {
            window.location.href = 'patient-login.html';
        }
    });
</script>

<!-- Service Worker بسيط للتخزين المؤقت (يجب إنشاء ملف sw.js) -->
<script>
    // إنشاء sw.js بشكل ديناميكي إذا لم يكن موجوداً (للتبسيط)
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE_NAME = 'sakoon-v1';
            const urlsToCache = [
                '/',
                '/patient-home.html',
                '/patient-chats.html',
                '/patient-agenda.html',
                '/patient-tools.html',
                '/conversation.html',
                '/patient-call-listener.js'
            ];
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
            });
            self.addEventListener('fetch', e => {
                e.respondWith(
                    caches.match(e.request).then(resp => resp || fetch(e.request))
                );
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
