<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — الرئيسية</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --t50:#f0fafa; --t100:#d0eded; --t200:#a8dede;
            --t300:#98D8D8; --t500:#5aabab; --t700:#3d8a8a; --t900:#1f4f4f;
            --ink:#162828; --ink60:#4a6363; --ink30:#9ababa;
            --bg:#e4f0f0; --white:#ffffff;
            --danger:#d94f4f; --success:#38c08a; --warn:#eda84a;
            --sh-sm:0 2px 10px rgba(20,70,70,.07);
            --sh-md:0 6px 28px rgba(20,70,70,.11);
            --sh-lg:0 16px 52px rgba(20,70,70,.16);
            --r-sm:12px; --r-md:18px; --r-lg:24px; --r-xl:32px;
        }

        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html{font-size:16px;scroll-behavior:smooth;}
        body{
            font-family:'Cairo',sans-serif;
            background:var(--bg); color:var(--ink);
            min-height:100vh; overflow-x:hidden;
            padding-bottom:90px;
            position:relative;
        }

        body::before{
            content:'';position:fixed;top:-100px;right:-100px;
            width:380px;height:380px;border-radius:50%;
            background:radial-gradient(circle,rgba(152,216,216,.28) 0%,transparent 70%);
            pointer-events:none;z-index:0;
        }
        body::after{
            content:'';position:fixed;bottom:-80px;left:-60px;
            width:300px;height:300px;border-radius:50%;
            background:radial-gradient(circle,rgba(61,138,138,.15) 0%,transparent 70%);
            pointer-events:none;z-index:0;
        }

        .shell{max-width:820px;margin:0 auto;padding:1.5rem 1.25rem;position:relative;z-index:1;}

        .page-head{
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;
        }
        .brand{font-size:1.6rem;font-weight:900;color:var(--t700);letter-spacing:-1px;}
        .brand span{color:var(--t300);}

        .toolbar{display:flex;gap:.75rem;align-items:center;margin-bottom:1.75rem;flex-wrap:wrap;}

        .search-wrap{
            flex:1;position:relative;min-width:200px;
        }
        .search-wrap input{
            width:100%;height:50px;
            padding:0 3rem 0 1.25rem;
            border:1.5px solid var(--t100);border-radius:var(--r-lg);
            background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
            font-family:'Cairo',sans-serif;font-size:.95rem;color:var(--ink);
            outline:none;box-shadow:var(--sh-sm);
            transition:border-color .2s,box-shadow .2s,background .2s;
        }
        .search-wrap input:focus{
            border-color:var(--t500);background:var(--white);
            box-shadow:0 0 0 3px rgba(90,171,171,.18);
        }
        .search-wrap input::placeholder{color:var(--ink30);}
        .search-icon{
            position:absolute;top:50%;right:1rem;transform:translateY(-50%);
            color:var(--ink30);pointer-events:none;
        }

        .filter-wrap{position:relative;flex-shrink:0;}
        .filter-btn{
            display:flex;align-items:center;gap:.5rem;
            height:50px;padding:0 1.25rem;
            border:1.5px solid var(--t100);border-radius:var(--r-lg);
            background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
            font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:700;
            color:var(--ink60);cursor:pointer;box-shadow:var(--sh-sm);
            transition:border-color .2s,background .2s;white-space:nowrap;
        }
        .filter-btn:hover{border-color:var(--t500);background:var(--white);}
        .filter-chevron{transition:transform .2s;}
        .filter-btn.open .filter-chevron{transform:rotate(180deg);}

        .filter-dropdown{
            position:absolute;top:calc(100% + .5rem);left:0;
            background:var(--white);border-radius:var(--r-md);
            box-shadow:var(--sh-lg);border:1.5px solid var(--t100);
            padding:.4rem;min-width:230px;z-index:50;
            display:none;animation:dropIn .18s ease;
        }
        @keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
        .filter-dropdown.show{display:block;}
        .filter-item{
            display:flex;align-items:center;gap:.65rem;
            padding:.65rem 1rem;border-radius:var(--r-sm);
            font-size:.88rem;font-weight:600;color:var(--ink60);
            cursor:pointer;transition:background .15s,color .15s;
        }
        .filter-item:hover{background:var(--t50);color:var(--t900);}
        .filter-item.active{background:linear-gradient(135deg,var(--t700),var(--t500));color:var(--white);}
        .filter-item .fi{flex-shrink:0;}

        .cards-grid{display:grid;gap:1.25rem;}

        .doc-card{
            background:rgba(255,255,255,.9);
            backdrop-filter:blur(16px);
            border:1.5px solid rgba(255,255,255,.9);
            border-radius:var(--r-xl);
            box-shadow:var(--sh-md);
            padding:1.4rem;
            display:flex;flex-direction:column;gap:1rem;
            transition:transform .2s,box-shadow .2s;
            will-change:transform;
        }
        .doc-card:active{transform:scale(0.98);}

        .doc-top{display:flex;gap:1.1rem;align-items:flex-start;}

        .doc-avatar{
            width:88px;height:88px;border-radius:20px;
            flex-shrink:0;object-fit:cover;
            border:3px solid var(--white);
            box-shadow:0 4px 14px rgba(20,70,70,.14);
            background:linear-gradient(135deg,var(--t500),var(--t700));
            display:flex;align-items:center;justify-content:center;
            font-size:1.6rem;font-weight:900;color:var(--white);
            overflow:hidden;
        }
        .doc-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

        .doc-info{flex:1;min-width:0;}
        .doc-name{font-size:1.1rem;font-weight:900;color:var(--t900);margin-bottom:.2rem;}
        .doc-spec{
            display:inline-flex;align-items:center;gap:.3rem;
            font-size:.78rem;font-weight:700;color:var(--t700);
            background:var(--t50);border:1px solid var(--t100);
            padding:.2rem .65rem;border-radius:99px;margin-bottom:.55rem;
        }
        .doc-bio{
            font-size:.87rem;color:var(--ink60);
            line-height:1.5;
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }

        .btn-msg{
            display:flex;align-items:center;justify-content:center;gap:.5rem;
            width:100%;padding:.75rem;
            background:linear-gradient(135deg,var(--t700),var(--t500));
            color:var(--white);border:none;border-radius:var(--r-md);
            font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;
            cursor:pointer;box-shadow:0 4px 14px rgba(61,138,138,.3);
            transition:transform .15s,box-shadow .15s;
        }
        .btn-msg:active{transform:scale(0.96);}

        .empty-state{
            text-align:center;padding:3rem 1rem;
            color:var(--ink30);display:none;
        }
        .empty-state .e-icon{font-size:2.8rem;margin-bottom:.75rem;display:block;}
        .empty-state p{font-size:.95rem;}

        .skel-card{
            background:var(--white);border-radius:var(--r-xl);
            border:1.5px solid var(--t100);padding:1.4rem;
            display:flex;gap:1.1rem;align-items:flex-start;
        }
        .skel{background:var(--t100);border-radius:var(--r-sm);animation:shimmer 1s infinite;}
        @keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.8}}
        .skel-av{width:88px;height:88px;flex-shrink:0;border-radius:20px;}
        .skel-lines{flex:1;display:flex;flex-direction:column;gap:.6rem;padding-top:.4rem;}
        .skel-line{height:14px;border-radius:99px;}

        .sync-pill{
            display:inline-flex;align-items:center;gap:.4rem;
            font-size:.72rem;color:var(--ink60);padding:.3rem .8rem;
            border-radius:99px;background:var(--white);border:1px solid var(--t100);
            box-shadow:var(--sh-sm);margin-top:1rem;
        }
        .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--success);}
        .sync-dot.busy{background:var(--warn);animation:blink 1s infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

        .bottom-nav{
            position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
            width:calc(100% - 28px);max-width:460px;
            background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
            border-radius:24px;display:flex;justify-content:space-around;align-items:center;
            padding:8px 6px;box-shadow:var(--sh-lg);z-index:400;
            border:1px solid rgba(152,216,216,.2);
        }
        .nav-item{
            text-decoration:none;display:flex;flex-direction:column;align-items:center;
            gap:3px;color:var(--ink30);transition:color .2s;padding:5px 14px;
            border-radius:14px;position:relative;font-size:.65rem;font-weight:700;
        }
        .nav-item.active{color:var(--t500);}
        .nav-item.active::after{
            content:'';position:absolute;bottom:-5px;width:18px;height:3px;
            border-radius:3px;background:linear-gradient(90deg,var(--t700),var(--t300));
        }

        @media(max-width:520px){
            .doc-top{flex-direction:column;align-items:center;}
            .doc-info{text-align:center;}
            .doc-spec{justify-content:center;}
        }

        /* تحسين للأجهزة الضعيفة */
        @media (prefers-reduced-motion: reduce) {
            .skel{animation:none;opacity:0.6;}
            .doc-card{transition:none;}
        }
    </style>
</head>
<body>

<div class="shell">

        <div class="filter-wrap">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    feather.replace();

    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        databaseURL: "https://sakina-937c4-default-rtdb.firebaseio.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };
    
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);

    // ========== إدارة التخزين المحلي (IndexedDB) محسنة وسريعة ==========
    class LocalDB {
        constructor() {
            this.db = null;
            this.ready = false;
        }
        
        async init() {
            if(this.ready) return;
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('SakoonDoctorsCache', 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    this.db = request.result;
                    this.ready = true;
                    resolve();
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if(!db.objectStoreNames.contains('doctors')) {
                        db.createObjectStore('doctors', { keyPath: 'id' });
                    }
                    if(!db.objectStoreNames.contains('metadata')) {
                        db.createObjectStore('metadata', { keyPath: 'key' });
                    }
                };
            });
        }
        
        async getAllDoctors() {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('doctors', 'readonly');
                const store = tx.objectStore('doctors');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => resolve([]);
            });
        }
        
        async saveDoctors(doctors) {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('doctors', 'readwrite');
                const store = tx.objectStore('doctors');
                store.clear();
                doctors.forEach(doc => store.put(doc));
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
        
        async getLastSync() {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('metadata', 'readonly');
                const store = tx.objectStore('metadata');
                const request = store.get('lastSync');
                request.onsuccess = () => resolve(request.result?.value || 0);
                request.onerror = () => resolve(0);
            });
        }
        
        async setLastSync(time) {
            await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('metadata', 'readwrite');
                const store = tx.objectStore('metadata');
                store.put({ key: 'lastSync', value: time });
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
    }
    
    const localDB = new LocalDB();
    
    // قائمة التخصصات
    const getSpecialtyLabel = (specialty) => {
        const labels = {
            'psychiatrist': 'طبيب نفسي',
            'psychologist': 'أخصائي نفسي',
            'family_counselor': 'استشاري أسري وزواجي',
            'child_psychology': 'علم نفس الأطفال والمراهقين',
            'addiction_counselor': 'استشاري إدمان',
            'cbt': 'معالج سلوكي معرفي',
            'trauma_therapist': 'معالج صدمات نفسية'
        };
        return labels[specialty] || specialty || 'معالج نفسي';
    };
    
    // عناصر DOM
    const grid = document.getElementById('cardsGrid');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const filterBtn = document.getElementById('filterBtn');
    const filterDropdown = document.getElementById('filterDropdown');
    const filterLabel = document.getElementById('filterLabel');
    const syncDot = document.getElementById('syncDot');
    const syncText = document.getElementById('syncText');
    
    let allDoctors = [];
    let filterSpec = 'all';
    let searchTerm = '';
    let currentUser = null;
    let syncTimeout = null;
    
    const setSyncing = (busy, msg) => {
        if(syncTimeout) clearTimeout(syncTimeout);
        if(syncDot) syncDot.className = 'sync-dot' + (busy ? ' busy' : '');
        if(syncText) syncText.textContent = msg || (busy ? 'جاري المزامنة...' : 'محدَّث ✓');
        if(!busy) {
            syncTimeout = setTimeout(() => {
                if(syncText && syncText.textContent === 'محدَّث ✓') {
                    syncText.textContent = 'جاهز';
                }
            }, 2000);
        }
    };
    
    // عرض البطاقات مع تحسين الأداء
    const renderCards = () => {
        // فلترة سريعة
        const searchLower = searchTerm.toLowerCase();
        const filtered = allDoctors.filter(doc => {
            if(filterSpec !== 'all' && doc.specialty !== filterSpec) return false;
            if(!searchTerm) return true;
            return (doc.name && doc.name.toLowerCase().includes(searchLower)) ||
                   (doc.specialty && doc.specialty.toLowerCase().includes(searchLower)) ||
                   (getSpecialtyLabel(doc.specialty).includes(searchLower));
        });
        
        if(filtered.length === 0) {
            if(grid) grid.innerHTML = '';
            if(emptyState) emptyState.style.display = 'block';
            return;
        }
        
        if(emptyState) emptyState.style.display = 'none';
        
        // استخدام DocumentFragment لتحسين الأداء
        const fragment = document.createDocumentFragment();
        
        filtered.forEach(doc => {
            const card = document.createElement('div');
            card.className = 'doc-card';
            
            const hasPhoto = doc.photoURL && doc.photoURL.length > 100;
            const avatarHTML = hasPhoto
                ? `<div class="doc-avatar"><img src="${doc.photoURL}" alt="${doc.name}" loading="lazy"></div>`
                : `<div class="doc-avatar">${(doc.name || 'د').charAt(0)}</div>`;
            
            const specLabel = getSpecialtyLabel(doc.specialty);
            const bio = doc.quickBlurb || '';
            const doctorId = doc.authUid || doc.id;
            const patientId = currentUser?.uid || '';
            
            card.innerHTML = `
                <div class="doc-top">
                    ${avatarHTML}
                    <div class="doc-info">
                        <div class="doc-name">${escapeHtml(doc.name || '—')}</div>
                        <div class="doc-spec">
                            <i data-feather="award" style="width:12px;height:12px"></i>
                            ${escapeHtml(specLabel)}
                        </div>
                        <div class="doc-bio">${escapeHtml(bio.substring(0, 100))}${bio.length > 100 ? '...' : ''}</div>
                    </div>
                </div>
                <button class="btn-msg" data-doctor-id="${escapeHtml(doctorId)}" data-patient-id="${escapeHtml(patientId)}">
                    <i data-feather="message-circle" style="width:17px;height:17px"></i>
                    راسل الآن
                </button>
            `;
            fragment.appendChild(card);
        });
        
        if(grid) {
            grid.innerHTML = '';
            grid.appendChild(fragment);
        }
        
        // تحديث الأيقونات
        if(typeof feather !== 'undefined') feather.replace();
    };
    
    const escapeHtml = (str) => {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    };
    
    // بناء قائمة التصفية
    const buildDropdown = () => {
        if(!filterDropdown) return;
        const presentSpecs = new Set(allDoctors.map(d => d.specialty).filter(Boolean));
        const specs = ['all', ...Array.from(presentSpecs)];
        
        filterDropdown.innerHTML = '';
        specs.forEach(spec => {
            const item = document.createElement('div');
            item.className = 'filter-item' + (filterSpec === spec ? ' active' : '');
            item.dataset.spec = spec;
            const label = spec === 'all' ? 'كل التخصصات' : getSpecialtyLabel(spec);
            item.innerHTML = `<i data-feather="check-circle" class="fi" style="width:13px;height:13px"></i>${label}`;
            filterDropdown.appendChild(item);
        });
        if(typeof feather !== 'undefined') feather.replace();
    };
    
    // تحديث البيانات من التخزين المحلي ثم من السحابة
    const updateFromLocal = async () => {
        const cached = await localDB.getAllDoctors();
        if(cached && cached.length > 0) {
            allDoctors = cached;
            buildDropdown();
            renderCards();
            setSyncing(false, 'من الكاش ✓');
            return true;
        }
        return false;
    };
    
    // الاستماع للتغييرات من Realtime Database
    const startFirebaseSync = () => {
        const doctorsRef = ref(database, 'doctors');
        
        onValue(doctorsRef, async (snapshot) => {
            setSyncing(true, 'تحديث...');
            
            const freshList = [];
            snapshot.forEach((child) => {
                const data = child.val();
                // فقط الأطباء النشطين
                if(data.status !== 'blocked') {
                    freshList.push({
                        id: child.key,
                        authUid: data.authUid || child.key,
                        name: data.name || '',
                        specialty: data.specialty || '',
                        quickBlurb: data.quickBlurb || '',
                        photoURL: data.photoURL || '',
                        email: data.email || '',
                        phone: data.phone || '',
                        status: data.status || 'active'
                    });
                }
            });
            
            // حفظ في التخزين المحلي
            await localDB.saveDoctors(freshList);
            await localDB.setLastSync(Date.now());
            
            // تحديث المتغيرات وإعادة العرض
            allDoctors = freshList;
            buildDropdown();
            renderCards();
            setSyncing(false, 'مزامنة فورية ✓');
            
        }, (error) => {
            console.error('خطأ في المزامنة:', error);
            setSyncing(false, '⚠️ غير متصل');
        });
    };
    
    // إعداد مستمعي الأحداث
    const setupEventListeners = () => {
        // بحث
        if(searchInput) {
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value.trim();
                renderCards();
            });
        }
        
        // زر التصفية
        if(filterBtn) {
            filterBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if(filterDropdown) {
                    filterDropdown.classList.toggle('show');
                    filterBtn.classList.toggle('open');
                }
            });
        }
        
        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', () => {
            if(filterDropdown) filterDropdown.classList.remove('show');
            if(filterBtn) filterBtn.classList.remove('open');
        });
        
        // اختيار عنصر من القائمة
        if(filterDropdown) {
            filterDropdown.addEventListener('click', (e) => {
                const item = e.target.closest('.filter-item');
                if(!item) return;
                filterSpec = item.dataset.spec;
                if(filterLabel) {
                    filterLabel.textContent = filterSpec === 'all' ? 'كل التخصصات' : getSpecialtyLabel(filterSpec);
                }
                buildDropdown();
                renderCards();
                if(filterDropdown) filterDropdown.classList.remove('show');
                if(filterBtn) filterBtn.classList.remove('open');
            });
        }
        
        // زر المراسلة (delegation)
        if(grid) {
            grid.addEventListener('click', (e) => {
                const btn = e.target.closest('.btn-msg');
                if(!btn) return;
                e.preventDefault();
                
                const doctorId = btn.dataset.doctorId;
                const patientId = btn.dataset.patientId;
                
                if(doctorId && patientId) {
                    window.location.href = `conversation.html?doctorId=${encodeURIComponent(doctorId)}&patientId=${encodeURIComponent(patientId)}`;
                } else if(doctorId) {
                    window.location.href = `conversation.html?doctorId=${encodeURIComponent(doctorId)}`;
                }
            });
        }
    };
    
    // تهيئة التطبيق
    const init = async () => {
        setupEventListeners();
        
        // تحميل من الكاش أولاً (عرض فوري)
        const hasCache = await updateFromLocal();
        if(!hasCache) {
            setSyncing(true, 'جاري التحميل...');
        }
        
        // بدء المزامنة مع Firebase
        startFirebaseSync();
    };
    
    // التحقق من حالة المصادقة
    onAuthStateChanged(auth, (user) => {
        if(user) {
            currentUser = user;
            init();
        } else {
            window.location.href = 'patient-login.html';
        }
    });
</script>
    <script type="module" src="patient-call-listener.js"></script>
</body>
</html>
