<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>سُكُون · محادثة</title>

    <!-- تحميل الخط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== إعدادات الألوان والمتغيرات ==================== */
        :root {
            --bg-primary: #f6faf9;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --primary-50: #e6f3f3;
            --primary-100: #cce7e7;
            --primary-200: #99cfcf;
            --primary-300: #66b8b8;
            --primary-400: #3da0a0;
            --primary-500: #2a8888;
            --primary-600: #1f6f6f;
            --primary-700: #165656;
            --primary-800: #0d3d3d;
            --primary-900: #062424;
            
            --text-primary: #1a2e2e;
            --text-secondary: #3d5a5a;
            --text-tertiary: #6b8a8a;
            --text-on-primary: #ffffff;
            
            --danger: #d94f4f;
            --success: #2ecc71;
            --warning: #f4b740;
            
            --shadow-xs: 0 2px 4px rgba(22, 86, 86, 0.04);
            --shadow-sm: 0 6px 16px rgba(22, 86, 86, 0.06);
            --shadow-md: 0 12px 28px rgba(22, 86, 86, 0.08);
            --shadow-lg: 0 20px 40px rgba(22, 86, 86, 0.12);
            --shadow-focus: 0 0 0 3px rgba(42, 136, 136, 0.15);
            
            --radius-bubble: 24px;
            --radius-element: 18px;
            --radius-full: 9999px;
            
            --transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            color-scheme: light;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0a1818;
                --surface: rgba(18, 30, 30, 0.85);
                --surface-solid: #142424;
                --text-primary: #e3f0f0;
                --text-secondary: #b3d1d1;
                --text-tertiary: #7aa3a3;
                --shadow-xs: 0 2px 4px rgba(0, 0, 0, 0.2);
                --shadow-sm: 0 6px 16px rgba(0, 0, 0, 0.25);
                --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
                color-scheme: dark;
            }
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: background 0.2s ease;
        }

        /* خلفية زخرفية */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle at 0% 0%, rgba(42, 136, 136, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(61, 138, 138, 0.06) 0%, transparent 50%);
        }

        /* ==================== رأس المحادثة (ثابت) ==================== */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--primary-100);
            box-shadow: var(--shadow-xs);
            z-index: 100;
            flex-shrink: 0;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--surface-solid);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .back-btn:active {
            transform: scale(0.94);
            background: var(--primary-50);
        }

        .avatar-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            box-shadow: var(--shadow-sm);
            border: 2.5px solid var(--surface-solid);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
            flex-shrink: 0;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }

        .doctor-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-subtitle {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ==================== منطقة الرسائل (قابلة للتمرير فقط) ==================== */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            z-index: 2;
            overscroll-behavior: contain;
            content-visibility: auto;
            contain-intrinsic-size: auto 100vh;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--primary-200);
            border-radius: 10px;
        }

        /* فاصل التاريخ */
        .date-separator {
            display: flex;
            justify-content: center;
            margin: 20px 0 10px;
        }

        .date-badge {
            background: var(--surface);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            border: 1px solid var(--primary-100);
            box-shadow: var(--shadow-xs);
        }

        /* ==================== فقاعات الرسائل (معكوسة) ==================== */
        .message-row {
            display: flex;
            margin-bottom: 2px;
            animation: messageAppear 0.2s ease-out;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* المريض (المستخدم) على اليسار */
        .message-row.patient {
            justify-content: flex-start;
        }

        /* الطبيب على اليمين */
        .message-row.doctor {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 82%;
            position: relative;
        }

        /* فقاعة المريض (يسار) – خلفية فاتحة وذيل أعلى اليمين */
        .message-row.patient .message-bubble {
            background: var(--surface-solid);
            color: var(--text-primary);
            border-radius: 4px var(--radius-bubble) var(--radius-bubble) var(--radius-bubble);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--primary-100);
        }

        /* فقاعة الطبيب (يمين) – خلفية متدرجة وذيل أعلى اليسار */
        .message-row.doctor .message-bubble {
            background: linear-gradient(145deg, var(--primary-600), var(--primary-500));
            color: white;
            border-radius: var(--radius-bubble) 4px var(--radius-bubble) var(--radius-bubble);
            box-shadow: var(--shadow-md);
        }

        .message-content {
            padding: 14px 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            word-break: break-word;
        }

        /* تذييل الرسالة (بدون وقت، فقط علامة صح للمريض) */
        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 16px 8px;
            font-size: 0.7rem;
        }

        .message-row.patient .message-footer {
            color: var(--text-tertiary);
        }

        .message-row.doctor .message-footer {
            /* الطبيب ليس له تذييل حاليًا */
            display: none;
        }

        /* حالات التحميل والفراغ */
        .loading-state, .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            color: var(--text-tertiary);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--primary-100);
            border-top-color: var(--primary-500);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        /* ==================== شريط الإدخال (ثابت) ==================== */
        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            padding: 12px 16px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--primary-100);
            flex-shrink: 0;
            z-index: 100;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            min-height: 48px;
            max-height: 130px;
            padding: 12px 18px;
            background: var(--surface-solid);
            border: 1.5px solid var(--primary-100);
            border-radius: 24px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            resize: none;
            line-height: 1.5;
            transition: var(--transition);
            box-shadow: var(--shadow-xs);
        }

        .message-input:focus {
            border-color: var(--primary-400);
            box-shadow: var(--shadow-focus);
        }

        .message-input::placeholder {
            color: var(--text-tertiary);
        }

        .send-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, var(--primary-600), var(--primary-500));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .send-button:active {
            transform: scale(0.94);
        }

        .send-button.sending {
            opacity: 0.7;
            pointer-events: none;
        }

        /* ==================== Toast ==================== */
        .toast {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--primary-800);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: var(--danger);
        }

        /* أيقونات SVG */
        .icon {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* تجاوب */
        @media (max-width: 480px) {
            .chat-header { padding: 10px 12px; }
            .message-bubble { max-width: 88%; }
            .message-content { padding: 12px 16px; font-size: 0.9rem; }
            .input-bar { padding: 10px 12px; }
        }
    </style>
</head>
<body>

<!-- رأس المحادثة (ثابت) -->
<header class="chat-header">
    <button class="back-btn" id="backBtn" aria-label="رجوع">
        <svg class="icon" viewBox="0 0 24 24">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </button>
    <div class="avatar-wrapper" id="doctorAvatar">د</div>
    <div class="header-info">
        <div class="doctor-name" id="doctorName">جاري التحميل...</div>
        <div class="header-subtitle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
            <span>محادثة مباشرة</span>
        </div>
    </div>
</header>

<!-- منطقة الرسائل (الجزء القابل للتمرير فقط) -->
<main class="messages-container" id="messagesContainer">
    <div class="loading-state">
        <div class="spinner"></div>
        <div>جاري تحميل المحادثة...</div>
    </div>
</main>

<!-- شريط الإدخال (ثابت) -->
<footer class="input-bar">
    <div class="input-wrapper">
        <textarea class="message-input" id="messageInput" placeholder="اكتب رسالتك..." rows="1"></textarea>
    </div>
    <button class="send-button" id="sendButton" aria-label="إرسال">
        <svg class="icon" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
    </button>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
    // ==================== استيراد Firebase ====================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, update, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        databaseURL: "https://sakina-937c4-default-rtdb.firebaseio.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };
    
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);

    // ==================== إدارة التخزين المحلي ====================
    class MessageCache {
        constructor() { this.db = null; }
        async init() {
            if (this.db) return;
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('SakoonMessagesCache', 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { this.db = request.result; resolve(); };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('messages')) db.createObjectStore('messages', { keyPath: 'convId' });
                    if (!db.objectStoreNames.contains('doctors')) db.createObjectStore('doctors', { keyPath: 'id' });
                };
            });
        }
        async getMessages(convId) {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('messages', 'readonly');
                const req = tx.objectStore('messages').get(convId);
                req.onsuccess = () => resolve(req.result?.messages || []);
                req.onerror = () => resolve([]);
            });
        }
        async saveMessages(convId, messages) {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('messages', 'readwrite');
                tx.objectStore('messages').put({ convId, messages });
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
        async getDoctor(id) {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('doctors', 'readonly');
                const req = tx.objectStore('doctors').get(id);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => resolve(null);
            });
        }
        async saveDoctor(doctor) {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('doctors', 'readwrite');
                tx.objectStore('doctors').put(doctor);
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
    }

    const cache = new MessageCache();

    // ==================== دوال مساعدة ====================
    const toast = (msg, err = false) => {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${err ? 'error' : ''}`;
        setTimeout(() => el.classList.remove('show'), 3000);
    };

    const formatDateLabel = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        const today = new Date(); today.setHours(0,0,0,0);
        d.setHours(0,0,0,0);
        const diff = Math.floor((today - d) / 86400000);
        if (diff === 0) return 'اليوم';
        if (diff === 1) return 'أمس';
        if (diff < 7) return d.toLocaleDateString('ar-EG', { weekday: 'long' });
        return d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
    };

    const escapeHtml = (t) => {
        if (!t) return '';
        return String(t).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])).replace(/\n/g, '<br>');
    };

    // ==================== الحالة ====================
    let currentUserId = null;
    let doctorId = null;
    let conversationId = null;
    let allMessages = [];
    let isNearBottom = true;

    const container = document.getElementById('messagesContainer');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendButton');
    const doctorNameEl = document.getElementById('doctorName');
    const doctorAvatarEl = document.getElementById('doctorAvatar');

    container.addEventListener('scroll', () => {
        const { scrollTop, scrollHeight, clientHeight } = container;
        isNearBottom = scrollHeight - scrollTop - clientHeight < 80;
    });

    const scrollToBottom = (force = false) => {
        if (force || isNearBottom) {
            requestAnimationFrame(() => container.scrollTop = container.scrollHeight);
        }
    };

    // ==================== عرض الرسائل (بدون وقت) ====================
    const renderMessages = (msgs) => {
        const fragment = document.createDocumentFragment();
        let lastDate = '';
        const sorted = [...msgs].sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
        
        sorted.forEach(msg => {
            const dateLabel = formatDateLabel(msg.timestamp);
            if (dateLabel && dateLabel !== lastDate) {
                lastDate = dateLabel;
                const sep = document.createElement('div');
                sep.className = 'date-separator';
                sep.innerHTML = `<div class="date-badge">${dateLabel}</div>`;
                fragment.appendChild(sep);
            }
            
            const isPatient = msg.senderId === currentUserId;
            const row = document.createElement('div');
            row.className = `message-row ${isPatient ? 'patient' : 'doctor'}`;
            row.dataset.msgId = msg.id;
            
            row.innerHTML = `
                <div class="message-bubble">
                    <div class="message-content">${escapeHtml(msg.text)}</div>
                    ${isPatient ? `
                        <div class="message-footer">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                    ` : ''}
                </div>
            `;
            fragment.appendChild(row);
        });
        
        container.innerHTML = '';
        container.appendChild(fragment);
        
        if (sorted.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <h3>لا توجد رسائل بعد</h3>
                    <p>ابدأ المحادثة مع طبيبك</p>
                </div>
            `;
        }
    };

    // ==================== تحميل الطبيب ====================
    const loadDoctor = async () => {
        try {
            let doc = await cache.getDoctor(doctorId);
            if (doc) updateDoctorUI(doc);
            const snap = await get(ref(database, `doctors/${doctorId}`));
            if (snap.exists()) {
                const data = snap.val();
                doc = { id: doctorId, name: data.name || 'أخصائي', photoURL: data.photoURL || '' };
                await cache.saveDoctor(doc);
                updateDoctorUI(doc);
            }
        } catch (e) { /* تجاهل */ }
    };
    
    const updateDoctorUI = (doc) => {
        doctorNameEl.textContent = doc.name || 'أخصائي نفسي';
        if (doc.photoURL) {
            doctorAvatarEl.innerHTML = `<img src="${doc.photoURL}" alt="${doc.name}" class="avatar-img">`;
        } else {
            doctorAvatarEl.textContent = (doc.name || 'د').charAt(0);
        }
    };

    // ==================== المحادثة ====================
    const getOrCreateConv = async () => {
        const refConv = ref(database, 'conversations');
        const snap = await get(refConv);
        if (snap.exists()) {
            const convs = snap.val();
            for (const id in convs) {
                if (convs[id].patientId === currentUserId && convs[id].doctorId === doctorId) {
                    conversationId = id;
                    return id;
                }
            }
        }
        const newRef = push(refConv);
        conversationId = newRef.key;
        await set(newRef, {
            patientId: currentUserId,
            doctorId: doctorId,
            createdAt: Date.now(),
            lastMessage: '',
            lastMessageTime: Date.now(),
            unreadPatient: false
        });
        return conversationId;
    };

    const listenToMessages = () => {
        if (!conversationId) return;
        const msgsRef = ref(database, `conversations/${conversationId}/messages`);
        
        cache.getMessages(conversationId).then(cached => {
            if (cached.length) {
                allMessages = cached;
                renderMessages(allMessages);
                scrollToBottom(true);
            }
        });
        
        onValue(msgsRef, async (snap) => {
            const fresh = [];
            if (snap.exists()) {
                snap.forEach(c => fresh.push({ id: c.key, ...c.val() }));
            }
            fresh.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
            allMessages = fresh;
            await cache.saveMessages(conversationId, fresh);
            renderMessages(allMessages);
            scrollToBottom();
        }, (err) => {
            console.warn('مزامنة:', err);
            toast('غير متصل - عرض الرسائل المخزنة');
        });
    };

    // ==================== إرسال ====================
    let sending = false;
    const sendMessage = async () => {
        const text = input.value.trim();
        if (!text || !conversationId || sending) return;
        sending = true;
        sendBtn.classList.add('sending');
        const msgText = text;
        input.value = '';
        input.style.height = 'auto';
        input.focus();
        try {
            const msgRef = push(ref(database, `conversations/${conversationId}/messages`));
            await set(msgRef, {
                text: msgText,
                senderId: currentUserId,
                senderRole: 'patient',
                timestamp: Date.now(),
                read: false
            });
            await update(ref(database, `conversations/${conversationId}`), {
                lastMessage: msgText,
                lastMessageTime: Date.now(),
                unreadPatient: false
            });
        } catch (e) {
            toast('فشل الإرسال', true);
            input.value = msgText;
        } finally {
            sending = false;
            sendBtn.classList.remove('sending');
            input.focus();
        }
    };

    // ==================== الأحداث ====================
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 130) + 'px';
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    sendBtn.addEventListener('click', sendMessage);
    sendBtn.addEventListener('mousedown', (e) => e.preventDefault());
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'patient-chats.html';
    });

    // ==================== بدء ====================
    const init = async (user) => {
        currentUserId = user.uid;
        doctorId = new URLSearchParams(window.location.search).get('doctorId');
        if (!doctorId) { toast('معرف الطبيب مفقود', true); return; }
        await loadDoctor();
        await getOrCreateConv();
        listenToMessages();
    };

    onAuthStateChanged(auth, (user) => {
        if (user) init(user);
        else window.location.href = 'patient-login.html';
    });

    if (!CSS.supports('backdrop-filter', 'blur(10px)')) {
        document.documentElement.style.setProperty('--surface', 'rgba(255, 255, 255, 0.98)');
    }
</script>
<script type="module" src="patient-call-listener.js"></script>
</body>
</html>
