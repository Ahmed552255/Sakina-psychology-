<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — محادثة</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --t50:#f0fafa; --t100:#d0eded; --t200:#a8dede;
            --t300:#98D8D8; --t500:#5aabab; --t700:#3d8a8a; --t900:#1f4f4f;
            --ink:#162828; --ink60:#4a6363; --ink30:#9ababa;
            --bg:#e4f0f0; --white:#ffffff;
            --danger:#d94f4f; --success:#38c08a; --warn:#eda84a;
            --sh-sm:0 2px 8px rgba(20,70,70,.07);
            --sh-md:0 6px 24px rgba(20,70,70,.11);
        }

        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html,body{height:100%;overflow:hidden;}
        body{
            font-family:'Cairo',sans-serif;
            background:var(--bg);color:var(--ink);
            display:flex;flex-direction:column;
            position:relative;
        }

        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(152,216,216,.12) 0%,transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(61,138,138,.08) 0%,transparent 50%);
        }

        .chat-header{
            display:flex;align-items:center;gap:.7rem;
            padding:.7rem 1rem;
            background:rgba(255,255,255,.88);backdrop-filter:blur(16px);
            border-bottom:1px solid var(--t100);
            box-shadow:var(--sh-sm);z-index:10;flex-shrink:0;
            position:relative;
        }

        .back-btn{
            width:36px;height:36px;border-radius:50%;border:none;
            background:none;display:flex;align-items:center;justify-content:center;
            cursor:pointer;color:var(--ink60);transition:background .2s;flex-shrink:0;
        }
        .back-btn:hover{background:var(--t50);}

        .doc-avatar{
            width:44px;height:44px;border-radius:50%;
            border:2px solid var(--t200);box-shadow:var(--sh-sm);
            background:linear-gradient(135deg,var(--t500),var(--t700));
            display:flex;align-items:center;justify-content:center;
            font-size:1.1rem;font-weight:900;color:var(--white);
            overflow:hidden;flex-shrink:0;
        }
        .doc-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

        .header-meta{flex:1;min-width:0;}
        .header-name{
            font-size:1rem;font-weight:800;color:var(--t900);
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
        }

        .msgs-area{
            flex:1;overflow-y:auto;
            padding:1.25rem 1rem 1rem;
            display:flex;flex-direction:column;gap:.35rem;
            position:relative;z-index:1;
        }
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-thumb{background:var(--t200);border-radius:99px;}

        .date-sep{
            align-self:center;
            font-size:.72rem;font-weight:700;color:var(--ink30);
            background:rgba(255,255,255,.7);border:1px solid var(--t100);
            padding:.22rem .85rem;border-radius:99px;
            margin:.75rem 0;
        }

        .bubble-wrap{
            display:flex;flex-direction:column;
            max-width:74%;
            animation:bubIn .2s ease forwards;
        }
        @keyframes bubIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .bubble-wrap.out{align-self:flex-end;align-items:flex-end;}
        .bubble-wrap.in{align-self:flex-start;align-items:flex-start;}

        .bubble{
            padding:.65rem 1rem;
            border-radius:18px;
            line-height:1.7;font-size:.92rem;
            word-break:break-word;
            position:relative;
        }
        .bubble-wrap.out .bubble{
            background:linear-gradient(135deg,var(--t700),var(--t500));
            color:var(--white);
            border-bottom-right-radius:4px;
            box-shadow:0 3px 10px rgba(61,138,138,.25);
        }
        .bubble-wrap.in .bubble{
            background:var(--white);color:var(--ink);
            border-bottom-left-radius:4px;
            border:1px solid var(--t100);
            box-shadow:var(--sh-sm);
        }

        .bubble-footer{
            display:flex;align-items:center;gap:.35rem;
            padding:0 .25rem;margin-top:.2rem;
        }
        .msg-time{font-size:.68rem;color:var(--ink30);}
        .bubble-wrap.out .msg-time{color:rgba(255,255,255,.5);}

        .input-bar{
            display:flex;align-items:flex-end;gap:.6rem;
            padding:.7rem 1rem;
            background:rgba(255,255,255,.88);backdrop-filter:blur(16px);
            border-top:1px solid var(--t100);
            flex-shrink:0;z-index:10;
        }

        .msg-input{
            flex:1;min-height:44px;max-height:120px;
            padding:.6rem 1rem;
            border:1.5px solid var(--t100);border-radius:22px;
            background:var(--t50);
            font-family:'Cairo',sans-serif;font-size:.93rem;color:var(--ink);
            outline:none;resize:none;line-height:1.5;
            transition:border-color .2s,background .2s,box-shadow .2s;
            overflow-y:auto;
        }
        .msg-input:focus{
            border-color:var(--t500);background:var(--white);
            box-shadow:0 0 0 3px rgba(90,171,171,.15);
        }

        .send-btn{
            width:44px;height:44px;border-radius:50%;
            border:none;
            background:linear-gradient(135deg,var(--t700),var(--t500));
            color:var(--white);
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;box-shadow:0 4px 12px rgba(61,138,138,.35);
            transition:transform .2s,box-shadow .2s;flex-shrink:0;
        }
        .send-btn:hover{transform:scale(1.08);}
        .send-btn:active{transform:scale(.95);}
        .send-btn:disabled{background:var(--t200);box-shadow:none;cursor:not-allowed;opacity:.6;}

        .toast{
            position:fixed;bottom:4.5rem;left:50%;
            transform:translateX(-50%) translateY(6px);
            background:var(--t900);color:var(--white);
            padding:.55rem 1.3rem;border-radius:99px;
            font-size:.83rem;font-weight:600;
            z-index:9999;opacity:0;pointer-events:none;
            transition:opacity .25s,transform .25s;white-space:nowrap;
        }
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .toast.err{background:var(--danger);}
        
        .loading{text-align:center;padding:2rem;color:var(--ink30);}
    </style>
</head>
<body>

<header class="chat-header">
    <button class="back-btn" id="backBtn">
        <i data-feather="arrow-right" style="width:20px;height:20px"></i>
    </button>
    <div class="doc-avatar" id="docAvatarEl">د</div>
    <div class="header-meta">
        <div class="header-name" id="headerName">جاري التحميل...</div>
    </div>
</header>

<main class="msgs-area" id="msgsArea">
    <div class="loading">جاري تحميل المحادثة...</div>
</main>

<footer class="input-bar">
    <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالتك..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
        <i data-feather="send" style="width:17px;height:17px"></i>
    </button>
</footer>

<div class="toast" id="toast"></div>

<script type="module">
    // استخدام Realtime Database (نفس قاعدة بيانات الصفحة الرئيسية)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, update, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    feather.replace();

    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        databaseURL: "https://sakina-937c4-default-rtdb.firebaseio.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);

    // المتغيرات
    let patientUid = null;
    let doctorId = null;
    let convId = null;
    let isAtBottom = true;
    let lastDate = '';

    const msgsArea = document.getElementById('msgsArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const toastEl = document.getElementById('toast');
    const headerName = document.getElementById('headerName');
    const docAvatarEl = document.getElementById('docAvatarEl');

    // Toast
    const showToast = (msg, isError = false) => {
        toastEl.textContent = msg;
        toastEl.className = `toast show ${isError ? 'err' : ''}`;
        setTimeout(() => toastEl.classList.remove('show'), 3000);
    };

    // تنسيق الوقت
    const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    };

    // تنسيق التاريخ
    const formatDate = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const msgDate = new Date(d);
        msgDate.setHours(0, 0, 0, 0);
        
        if (msgDate.getTime() === now.getTime()) return 'اليوم';
        
        const yesterday = new Date(now);
        yesterday.setDate(now.getDate() - 1);
        if (msgDate.getTime() === yesterday.getTime()) return 'أمس';
        
        return d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
    };

    // تهريب النص
    const escapeHtml = (str) => {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m])
                  .replace(/\n/g, '<br>');
    };

    // التمرير
    const scrollToBottom = () => {
        if (isAtBottom) {
            setTimeout(() => msgsArea.scrollTop = msgsArea.scrollHeight, 50);
        }
    };

    msgsArea.addEventListener('scroll', () => {
        isAtBottom = msgsArea.scrollHeight - msgsArea.scrollTop - msgsArea.clientHeight < 80;
    });

    // عرض رسالة
    const renderMessage = (msg) => {
        const isOut = msg.senderId === patientUid;
        const msgDate = formatDate(msg.timestamp);
        
        if (msgDate !== lastDate) {
            lastDate = msgDate;
            const sep = document.createElement('div');
            sep.className = 'date-sep';
            sep.textContent = msgDate;
            msgsArea.appendChild(sep);
        }

        const wrap = document.createElement('div');
        wrap.className = `bubble-wrap ${isOut ? 'out' : 'in'}`;
        wrap.dataset.id = msg.id;

        wrap.innerHTML = `
            <div class="bubble">${escapeHtml(msg.text)}</div>
            <div class="bubble-footer">
                <span class="msg-time">${formatTime(msg.timestamp)}</span>
                ${isOut ? '<span class="ticks"><i data-feather="check" style="width:12px;height:12px"></i></span>' : ''}
            </div>
        `;

        msgsArea.appendChild(wrap);
        feather.replace();
    };

    // تحميل معلومات الدكتور
    const loadDoctorInfo = async () => {
        try {
            console.log('جاري تحميل الدكتور:', doctorId);
            
            const doctorRef = ref(database, `doctors/${doctorId}`);
            const snapshot = await get(doctorRef);
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                console.log('بيانات الدكتور:', data);
                
                headerName.textContent = data.name || 'أخصائي نفسي';
                
                if (data.photoURL) {
                    docAvatarEl.innerHTML = `<img src="${data.photoURL}" alt="${data.name}">`;
                } else {
                    docAvatarEl.textContent = (data.name || 'د').charAt(0);
                }
            } else {
                console.log('الدكتور غير موجود في Realtime Database');
                headerName.textContent = 'أخصائي نفسي';
            }
        } catch (error) {
            console.error('خطأ في تحميل الدكتور:', error);
        }
    };

    // إنشاء أو استرجاع المحادثة
    const getOrCreateConversation = async () => {
        try {
            // البحث عن محادثة موجودة
            const convsRef = ref(database, 'conversations');
            const snapshot = await get(convsRef);
            
            if (snapshot.exists()) {
                const conversations = snapshot.val();
                // البحث عن محادثة بين المريض والدكتور
                for (const id in conversations) {
                    const conv = conversations[id];
                    if (conv.patientId === patientUid && conv.doctorId === doctorId) {
                        convId = id;
                        console.log('تم العثور على محادثة:', convId);
                        return convId;
                    }
                }
            }
            
            // إنشاء محادثة جديدة
            console.log('جاري إنشاء محادثة جديدة...');
            const newConvRef = push(ref(database, 'conversations'));
            convId = newConvRef.key;
            
            await set(newConvRef, {
                patientId: patientUid,
                doctorId: doctorId,
                createdAt: Date.now(),
                lastMessage: '',
                lastMessageTime: Date.now()
            });
            
            console.log('تم إنشاء محادثة جديدة:', convId);
            return convId;
            
        } catch (error) {
            console.error('خطأ في المحادثة:', error);
            throw error;
        }
    };

    // الاستماع للرسائل
    const listenToMessages = () => {
        if (!convId) return;
        
        console.log('الاستماع للرسائل في المحادثة:', convId);
        
        const msgsRef = ref(database, `conversations/${convId}/messages`);
        
        onValue(msgsRef, (snapshot) => {
            // إزالة رسالة التحميل
            const loading = msgsArea.querySelector('.loading');
            if (loading) loading.remove();
            
            // مسح الرسائل الحالية
            msgsArea.innerHTML = '';
            lastDate = '';
            
            if (snapshot.exists()) {
                const messages = [];
                snapshot.forEach((child) => {
                    messages.push({
                        id: child.key,
                        ...child.val()
                    });
                });
                
                // ترتيب حسب الوقت
                messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                
                // عرض الرسائل
                messages.forEach(msg => renderMessage(msg));
                
                console.log('تم عرض', messages.length, 'رسالة');
            } else {
                console.log('لا توجد رسائل بعد');
            }
            
            scrollToBottom();
        });
    };

    // إرسال رسالة
    const sendMessage = async () => {
        const text = msgInput.value.trim();
        if (!text || !convId || !patientUid) return;
        
        console.log('جاري إرسال:', text);
        
        sendBtn.disabled = true;
        msgInput.value = '';
        msgInput.style.height = 'auto';
        
        try {
            const msgRef = push(ref(database, `conversations/${convId}/messages`));
            
            await set(msgRef, {
                text: text,
                senderId: patientUid,
                senderRole: 'patient',
                timestamp: Date.now(),
                read: false
            });
            
            // تحديث آخر رسالة في المحادثة
            await update(ref(database, `conversations/${convId}`), {
                lastMessage: text,
                lastMessageTime: Date.now()
            });
            
            console.log('تم الإرسال بنجاح');
            
        } catch (error) {
            console.error('خطأ في الإرسال:', error);
            showToast('فشل إرسال الرسالة', true);
        } finally {
            sendBtn.disabled = false;
            msgInput.focus();
        }
    };

    // الأحداث
    msgInput.addEventListener('input', () => {
        msgInput.style.height = 'auto';
        msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
        sendBtn.disabled = !msgInput.value.trim();
    });

    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!sendBtn.disabled) sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'patient-chats.html';
    });

    // التهيئة
    const init = async (user) => {
        console.log('بدء التهيئة...');
        
        patientUid = user.uid;
        const params = new URLSearchParams(window.location.search);
        doctorId = params.get('doctorId');
        
        console.log('المريض:', patientUid);
        console.log('الدكتور:', doctorId);
        
        if (!doctorId) {
            showToast('معرف الدكتور مفقود', true);
            return;
        }
        
        try {
            await loadDoctorInfo();
            await getOrCreateConversation();
            listenToMessages();
            console.log('تم التهيئة بنجاح');
        } catch (error) {
            console.error('فشل التهيئة:', error);
            showToast('حدث خطأ', true);
        }
    };

    // التحقق من تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
        if (user) {
            init(user);
        } else {
            window.location.href = 'patient-login.html';
        }
    });
</script>
</body>
</html>
