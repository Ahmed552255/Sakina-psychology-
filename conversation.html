<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — محادثة</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --t50:#f0fafa; --t100:#d0eded; --t200:#a8dede;
            --t300:#98D8D8; --t500:#5aabab; --t700:#3d8a8a; --t900:#1f4f4f;
            --ink:#162828; --ink60:#4a6363; --ink30:#9ababa;
            --bg:#e4f0f0; --white:#ffffff;
            --danger:#d94f4f; --success:#38c08a; --warn:#eda84a;
            --sh-sm:0 2px 8px rgba(20,70,70,.07);
            --sh-md:0 6px 24px rgba(20,70,70,.11);
        }

        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        html,body{height:100%;overflow:hidden;}
        body{
            font-family:'Cairo',sans-serif;
            background:var(--bg);color:var(--ink);
            display:flex;flex-direction:column;
            position:relative;
        }

        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(152,216,216,.12) 0%,transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(61,138,138,.08) 0%,transparent 50%);
        }

        .chat-header{
            display:flex;align-items:center;gap:.7rem;
            padding:.7rem 1rem;
            background:rgba(255,255,255,.88);backdrop-filter:blur(16px);
            border-bottom:1px solid var(--t100);
            box-shadow:var(--sh-sm);z-index:10;flex-shrink:0;
            position:relative;
        }

        .back-btn{
            width:36px;height:36px;border-radius:50%;border:none;
            background:none;display:flex;align-items:center;justify-content:center;
            cursor:pointer;color:var(--ink60);transition:background .2s;flex-shrink:0;
        }
        .back-btn:hover{background:var(--t50);}

        .doc-avatar{
            width:44px;height:44px;border-radius:50%;
            border:2px solid var(--t200);box-shadow:var(--sh-sm);
            background:linear-gradient(135deg,var(--t500),var(--t700));
            display:flex;align-items:center;justify-content:center;
            font-size:1.1rem;font-weight:900;color:var(--white);
            overflow:hidden;flex-shrink:0;
        }
        .doc-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

        .header-meta{flex:1;min-width:0;}
        .header-name{
            font-size:1rem;font-weight:800;color:var(--t900);
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
        }
        .header-status{
            display:flex;align-items:center;gap:.35rem;
            font-size:.72rem;color:var(--ink30);
        }
        .status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);}
        .status-dot.offline{background:var(--ink30);}

        .msgs-area{
            flex:1;overflow-y:auto;
            padding:1.25rem 1rem 1rem;
            display:flex;flex-direction:column;gap:.35rem;
            position:relative;z-index:1;
        }
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-thumb{background:var(--t200);border-radius:99px;}

        .date-sep{
            align-self:center;
            font-size:.72rem;font-weight:700;color:var(--ink30);
            background:rgba(255,255,255,.7);border:1px solid var(--t100);
            padding:.22rem .85rem;border-radius:99px;
            margin:.75rem 0;
        }

        .bubble-wrap{
            display:flex;flex-direction:column;
            max-width:74%;
            animation:bubIn .2s ease forwards;
        }
        @keyframes bubIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .bubble-wrap.out{align-self:flex-end;align-items:flex-end;}
        .bubble-wrap.in {align-self:flex-start;align-items:flex-start;}

        .bubble{
            padding:.65rem 1rem;
            border-radius:18px;
            line-height:1.7;font-size:.92rem;
            word-break:break-word;
            position:relative;
        }
        .bubble-wrap.out .bubble{
            background:linear-gradient(135deg,var(--t700),var(--t500));
            color:var(--white);
            border-bottom-right-radius:4px;
            box-shadow:0 3px 10px rgba(61,138,138,.25);
        }
        .bubble-wrap.in .bubble{
            background:var(--white);color:var(--ink);
            border-bottom-left-radius:4px;
            border:1px solid var(--t100);
            box-shadow:var(--sh-sm);
        }

        .bubble-footer{
            display:flex;align-items:center;gap:.35rem;
            padding:0 .25rem;margin-top:.2rem;
        }
        .msg-time{font-size:.68rem;color:var(--ink30);}
        .bubble-wrap.out .msg-time{color:rgba(255,255,255,.5);}

        .ticks{display:flex;color:var(--ink30);}
        .ticks.read{color:var(--success);}

        .input-bar{
            display:flex;align-items:flex-end;gap:.6rem;
            padding:.7rem 1rem;
            background:rgba(255,255,255,.88);backdrop-filter:blur(16px);
            border-top:1px solid var(--t100);
            flex-shrink:0;z-index:10;
        }

        .msg-input{
            flex:1;min-height:44px;max-height:120px;
            padding:.6rem 1rem;
            border:1.5px solid var(--t100);border-radius:22px;
            background:var(--t50);
            font-family:'Cairo',sans-serif;font-size:.93rem;color:var(--ink);
            outline:none;resize:none;line-height:1.5;
            transition:border-color .2s,background .2s,box-shadow .2s;
            overflow-y:auto;
        }
        .msg-input:focus{
            border-color:var(--t500);background:var(--white);
            box-shadow:0 0 0 3px rgba(90,171,171,.15);
        }

        .send-btn{
            width:44px;height:44px;border-radius:50%;
            border:none;
            background:linear-gradient(135deg,var(--t700),var(--t500));
            color:var(--white);
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;box-shadow:0 4px 12px rgba(61,138,138,.35);
            transition:transform .2s,box-shadow .2s;flex-shrink:0;
        }
        .send-btn:hover{transform:scale(1.08);}
        .send-btn:active{transform:scale(.95);}
        .send-btn:disabled{background:var(--t200);box-shadow:none;cursor:not-allowed;opacity:.6;}

        .toast{
            position:fixed;bottom:4.5rem;left:50%;
            transform:translateX(-50%) translateY(6px);
            background:var(--t900);color:var(--white);
            padding:.55rem 1.3rem;border-radius:99px;
            font-size:.83rem;font-weight:600;
            z-index:9999;opacity:0;pointer-events:none;
            transition:opacity .25s,transform .25s;white-space:nowrap;
        }
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .toast.err{background:var(--danger);}
        
        .loading{text-align:center;padding:2rem;color:var(--ink30);}
    </style>
</head>
<body>

<header class="chat-header">
    <button class="back-btn" id="backBtn">
        <i data-feather="arrow-right" style="width:20px;height:20px"></i>
    </button>
    <div class="doc-avatar" id="docAvatarEl">د</div>
    <div class="header-meta">
        <div class="header-name" id="headerName">جاري التحميل...</div>
        <div class="header-status">
            <div class="status-dot offline" id="headerStatusDot"></div>
            <span id="headerStatusText">غير متصل</span>
        </div>
    </div>
</header>

<main class="msgs-area" id="msgsArea">
    <div class="loading">جاري تحميل المحادثة...</div>
</main>

<footer class="input-bar">
    <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالتك..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
        <i data-feather="send" style="width:17px;height:17px"></i>
    </button>
</footer>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
        getFirestore, collection, doc, query, orderBy, limit,
        onSnapshot, addDoc, updateDoc, getDocs, serverTimestamp, getDoc, where 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    feather.replace();

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Simple Cache
    class MsgCache {
        constructor() {
            this.db = null;
            this.ready = false;
        }
        
        async init() {
            if (this.ready) return;
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('ChatCache', 1);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => {
                    this.db = req.result;
                    this.ready = true;
                    resolve();
                };
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('messages')) {
                        db.createObjectStore('messages', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('doctor')) {
                        db.createObjectStore('doctor', { keyPath: 'id' });
                    }
                };
            });
        }
        
        async getMessages(convId) {
            if (!this.ready) await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('messages', 'readonly');
                const store = tx.objectStore('messages');
                const req = store.getAll();
                req.onsuccess = () => {
                    resolve(req.result.filter(m => m.convId === convId));
                };
                req.onerror = () => resolve([]);
            });
        }
        
        async saveMessage(msg) {
            if (!this.ready) await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('messages', 'readwrite');
                const store = tx.objectStore('messages');
                store.put(msg);
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
        
        async saveDoctor(doc) {
            if (!this.ready) await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('doctor', 'readwrite');
                const store = tx.objectStore('doctor');
                store.put(doc);
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
        
        async getDoctor(id) {
            if (!this.ready) await this.init();
            return new Promise((resolve) => {
                const tx = this.db.transaction('doctor', 'readonly');
                const store = tx.objectStore('doctor');
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        }
    }

    const cache = new MsgCache();

    // State
    let patientUid = null;
    let doctorId = null;
    let convId = null;
    let unsubMsgs = null;
    let isAtBottom = true;
    let lastDate = '';

    // DOM Elements
    const msgsArea = document.getElementById('msgsArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const toastEl = document.getElementById('toast');

    // Helpers
    const toast = (msg, isError = false) => {
        toastEl.textContent = msg;
        toastEl.className = `toast show ${isError ? 'err' : ''}`;
        setTimeout(() => toastEl.classList.remove('show'), 3000);
    };

    const escapeHtml = (str) => {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m])
                  .replace(/\n/g, '<br>');
    };

    const formatTime = (ts) => {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    };

    const formatDate = (ts) => {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        const now = new Date();
        now.setHours(0,0,0,0);
        const msgDate = new Date(d);
        msgDate.setHours(0,0,0,0);
        
        if (msgDate.getTime() === now.getTime()) return 'اليوم';
        const yesterday = new Date(now);
        yesterday.setDate(now.getDate() - 1);
        if (msgDate.getTime() === yesterday.getTime()) return 'أمس';
        return d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
    };

    const scrollToBottom = (force = false) => {
        if (force || isAtBottom) {
            setTimeout(() => msgsArea.scrollTop = msgsArea.scrollHeight, 50);
        }
    };

    msgsArea.addEventListener('scroll', () => {
        isAtBottom = msgsArea.scrollHeight - msgsArea.scrollTop - msgsArea.clientHeight < 80;
    });

    // Render message
    const renderMessage = (msg) => {
        const isOut = msg.senderId === patientUid;
        const msgDate = formatDate(msg.createdAt);
        
        // Date separator
        if (msgDate !== lastDate) {
            lastDate = msgDate;
            const sep = document.createElement('div');
            sep.className = 'date-sep';
            sep.textContent = msgDate;
            msgsArea.appendChild(sep);
        }

        const wrap = document.createElement('div');
        wrap.className = `bubble-wrap ${isOut ? 'out' : 'in'}`;
        wrap.dataset.id = msg.id;

        const ticksHtml = isOut ? `
            <span class="ticks ${msg.read ? 'read' : ''}">
                <i data-feather="${msg.read ? 'check-circle' : 'check'}" style="width:12px;height:12px"></i>
            </span>
        ` : '';

        wrap.innerHTML = `
            <div class="bubble">${escapeHtml(msg.text)}</div>
            <div class="bubble-footer">
                <span class="msg-time">${formatTime(msg.createdAt)}</span>
                ${ticksHtml}
            </div>
        `;

        msgsArea.appendChild(wrap);
        feather.replace();
    };

    // Clear and render all messages
    const renderAllMessages = (messages) => {
        const loading = msgsArea.querySelector('.loading');
        if (loading) loading.remove();
        
        // Clear existing messages
        while (msgsArea.firstChild) {
            msgsArea.removeChild(msgsArea.firstChild);
        }
        
        lastDate = '';
        messages.sort((a, b) => {
            const aTime = a.createdAt?.seconds || 0;
            const bTime = b.createdAt?.seconds || 0;
            return aTime - bTime;
        }).forEach(renderMessage);
        
        scrollToBottom(true);
    };

    // Load doctor info
    const loadDoctorInfo = async () => {
        try {
            // Try cache first
            const cached = await cache.getDoctor(doctorId);
            if (cached) {
                updateDoctorUI(cached);
            }

            // Fetch from Firestore
            const doctorsRef = collection(db, 'doctors');
            const q = query(doctorsRef, where('authUid', '==', doctorId));
            const snap = await getDocs(q);
            
            if (!snap.empty) {
                const docData = { id: doctorId, ...snap.docs[0].data() };
                await cache.saveDoctor(docData);
                updateDoctorUI(docData);
            }
        } catch (e) {
            console.warn('Doctor info error:', e);
        }
    };

    const updateDoctorUI = (data) => {
        const name = data.name || 'أخصائي';
        document.getElementById('headerName').textContent = name;
        const av = document.getElementById('docAvatarEl');
        if (data.photoURL) {
            av.innerHTML = `<img src="${data.photoURL}" alt="${name}">`;
        } else {
            av.textContent = name.charAt(0);
        }
    };

    // Get or create conversation
    const getOrCreateConversation = async () => {
        try {
            const convRef = collection(db, 'conversations');
            const q = query(
                convRef,
                where('patientId', '==', patientUid),
                where('doctorId', '==', doctorId)
            );
            const snap = await getDocs(q);
            
            if (!snap.empty) {
                convId = snap.docs[0].id;
            } else {
                const newConv = await addDoc(convRef, {
                    patientId: patientUid,
                    doctorId: doctorId,
                    createdAt: serverTimestamp(),
                    lastMessage: '',
                    lastMessageTime: serverTimestamp(),
                    unreadDoctor: 0,
                    unreadPatient: 0
                });
                convId = newConv.id;
            }
            return convId;
        } catch (e) {
            console.error('Conversation error:', e);
            toast('تعذر تحميل المحادثة', true);
            throw e;
        }
    };

    // Listen to messages
    const listenToMessages = async () => {
        if (!convId) return;

        // Load from cache first
        const cachedMsgs = await cache.getMessages(convId);
        if (cachedMsgs.length > 0) {
            renderAllMessages(cachedMsgs);
        }

        // Listen to live updates
        const msgsRef = collection(db, 'conversations', convId, 'messages');
        const q = query(msgsRef, orderBy('createdAt', 'asc'));

        unsubMsgs = onSnapshot(q, async (snap) => {
            const messages = [];
            
            for (const change of snap.docChanges()) {
                const msg = { id: change.doc.id, convId, ...change.doc.data() };
                
                if (change.type === 'added') {
                    messages.push(msg);
                    await cache.saveMessage(msg);
                    
                    // Mark as read if from doctor
                    if (msg.senderId !== patientUid && !msg.read) {
                        try {
                            await updateDoc(doc(db, 'conversations', convId, 'messages', msg.id), {
                                read: true
                            });
                            await updateDoc(doc(db, 'conversations', convId), {
                                unreadPatient: 0
                            });
                        } catch (e) {}
                    }
                } else if (change.type === 'modified') {
                    await cache.saveMessage(msg);
                    // Update tick
                    const bubble = msgsArea.querySelector(`[data-id="${msg.id}"]`);
                    if (bubble) {
                        const ticks = bubble.querySelector('.ticks');
                        if (ticks) {
                            ticks.className = 'ticks read';
                            ticks.innerHTML = '<i data-feather="check-circle" style="width:12px;height:12px"></i>';
                            feather.replace();
                        }
                    }
                }
            }

            if (messages.length > 0) {
                if (!msgsArea.querySelector('.loading')) {
                    messages.forEach(renderMessage);
                } else {
                    renderAllMessages(await cache.getMessages(convId));
                }
                scrollToBottom();
            }
        }, (error) => {
            console.error('Messages error:', error);
            toast('خطأ في تحميل الرسائل', true);
        });
    };

    // Send message
    const sendMessage = async () => {
        const text = msgInput.value.trim();
        if (!text || !convId) return;

        msgInput.value = '';
        msgInput.style.height = 'auto';
        sendBtn.disabled = true;

        // Optimistic update
        const tempId = `temp_${Date.now()}`;
        const tempMsg = {
            id: tempId,
            convId,
            senderId: patientUid,
            text,
            createdAt: new Date(),
            read: false,
            _optimistic: true
        };
        
        renderMessage(tempMsg);
        scrollToBottom(true);

        try {
            // Save to Firestore
            const msgRef = await addDoc(collection(db, 'conversations', convId, 'messages'), {
                text,
                senderId: patientUid,
                senderRole: 'patient',
                createdAt: serverTimestamp(),
                read: false
            });

            // Remove optimistic message
            const tempEl = msgsArea.querySelector(`[data-id="${tempId}"]`);
            if (tempEl) tempEl.remove();

            // Update conversation
            await updateDoc(doc(db, 'conversations', convId), {
                lastMessage: text,
                lastMessageTime: serverTimestamp(),
                unreadDoctor: 1
            });

        } catch (e) {
            console.error('Send error:', e);
            toast('فشل إرسال الرسالة', true);
            const tempEl = msgsArea.querySelector(`[data-id="${tempId}"]`);
            if (tempEl) tempEl.remove();
        }
    };

    // Input handlers
    msgInput.addEventListener('input', () => {
        msgInput.style.height = 'auto';
        msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
        sendBtn.disabled = !msgInput.value.trim();
    });

    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!sendBtn.disabled) sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    document.getElementById('backBtn').addEventListener('click', () => {
        if (unsubMsgs) unsubMsgs();
        window.location.href = 'patient-chats.html';
    });

    // Initialize
    const init = async (user) => {
        patientUid = user.uid;
        const params = new URLSearchParams(window.location.search);
        doctorId = params.get('doctorId');

        if (!doctorId) {
            toast('معرف الدكتور مفقود', true);
            setTimeout(() => window.location.href = 'patient-home.html', 2000);
            return;
        }

        await cache.init();
        await Promise.all([loadDoctorInfo(), getOrCreateConversation()]);
        await listenToMessages();
    };

    // Auth check
    onAuthStateChanged(auth, (user) => {
        if (user) {
            init(user);
        } else {
            window.location.href = 'patient-login.html';
        }
    });
</script>
</body>
</html>
