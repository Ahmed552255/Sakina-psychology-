<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سُكُون — محادثة</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --t50: #f0fafa;
            --t100: #d0eded;
            --t200: #a8dede;
            --t300: #98D8D8;
            --t500: #5aabab;
            --t700: #3d8a8a;
            --t900: #1f4f4f;
            --ink: #162828;
            --ink60: #4a6363;
            --ink30: #9ababa;
            --bg: #e8f3f3;
            --white: #ffffff;
            --danger: #d94f4f;
            --success: #38c08a;
            --sh-sm: 0 2px 8px rgba(20, 70, 70, 0.06);
            --sh-md: 0 4px 16px rgba(20, 70, 70, 0.08);
            --sh-lg: 0 8px 24px rgba(20, 70, 70, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100dvh;              /* استخدام dvh لضبط ديناميكي على الموبايل */
            overflow: hidden;
            touch-action: pan-y;          /* تحسين اللمس */
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* خلفية ناعمة */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: 
                radial-gradient(circle at 0% 0%, rgba(152, 216, 216, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(61, 138, 138, 0.1) 0%, transparent 50%);
        }

        /* ===== Header (Sticky) ===== */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(152, 216, 216, 0.2);
            box-shadow: var(--sh-sm);
            z-index: 100;
            flex-shrink: 0;
            position: sticky;            /* يظل ظاهرًا عند التمرير */
            top: 0;
            transition: box-shadow 0.2s;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--ink60);
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: var(--sh-sm);
        }

        .back-btn:hover {
            background: var(--t50);
            transform: scale(1.05);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .doc-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2.5px solid var(--white);
            box-shadow: var(--sh-md);
            background: linear-gradient(135deg, var(--t500), var(--t700));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--white);
            overflow: hidden;
            flex-shrink: 0;
        }

        .doc-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .header-meta {
            flex: 1;
            min-width: 0;
        }

        .header-name {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--t900);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 2px;
        }

        .header-subtitle {
            font-size: 0.7rem;
            color: var(--ink30);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== Messages Area ===== */
        .msgs-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
            overscroll-behavior: contain;   /* منع سلوك التمرير الزائد */
        }

        .msgs-area::-webkit-scrollbar {
            width: 4px;
        }

        .msgs-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .msgs-area::-webkit-scrollbar-thumb {
            background: var(--t200);
            border-radius: 10px;
        }

        /* فاصل التاريخ */
        .date-separator {
            align-self: center;
            margin: 16px 0 8px;
            position: relative;
        }

        .date-badge {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--ink60);
            border: 1px solid rgba(152, 216, 216, 0.3);
            box-shadow: var(--sh-sm);
            text-transform: capitalize;
        }

        /* ===== Message Bubbles (ذيل من الأعلى) ===== */
        .msg-wrapper {
            display: flex;
            margin-bottom: 2px;
            animation: messageIn 0.25s ease-out;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-wrapper.out {
            justify-content: flex-end;
        }

        .msg-wrapper.in {
            justify-content: flex-start;
        }

        .msg-bubble {
            max-width: 75%;
            position: relative;
        }

        /* صادرة (يمين) – ذيل أعلى اليمين */
        .msg-wrapper.out .msg-bubble {
            background: linear-gradient(135deg, var(--t700) 0%, var(--t500) 100%);
            color: white;
            border-radius: 20px 4px 20px 20px;   /* الزاوية اليمنى العليا صغيرة (ذيل) */
            box-shadow: 0 4px 12px rgba(61, 138, 138, 0.25);
        }

        /* واردة (يسار) – ذيل أعلى اليسار */
        .msg-wrapper.in .msg-bubble {
            background: var(--white);
            color: var(--ink);
            border-radius: 4px 20px 20px 20px;   /* الزاوية اليسرى العليا صغيرة (ذيل) */
            box-shadow: var(--sh-sm);
            border: 1px solid rgba(152, 216, 216, 0.2);
        }

        .msg-content {
            padding: 10px 14px;
            font-size: 0.9rem;
            line-height: 1.6;
            word-break: break-word;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            padding: 0 10px 8px;
            font-size: 0.65rem;
        }

        .msg-wrapper.out .msg-meta {
            color: rgba(255, 255, 255, 0.7);
        }

        .msg-wrapper.in .msg-meta {
            color: var(--ink30);
        }

        .msg-time {
            display: flex;
            align-items: center;
        }

        .msg-status {
            display: flex;
            align-items: center;
            margin-right: 2px;
        }

        .msg-status i {
            width: 12px;
            height: 12px;
        }

        .msg-wrapper.out .msg-status {
            color: rgba(255, 255, 255, 0.9);
        }

        .msg-wrapper.in .msg-status {
            color: var(--t500);
        }

        /* ===== Input Bar ===== */
        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(152, 216, 216, 0.2);
            flex-shrink: 0;
            z-index: 100;
        }

        .msg-input-wrapper {
            flex: 1;
            position: relative;
        }

        .msg-input {
            width: 100%;
            min-height: 46px;
            max-height: 120px;
            padding: 12px 18px;
            border: 2px solid rgba(152, 216, 216, 0.3);
            border-radius: 25px;
            background: var(--white);
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            color: var(--ink);
            outline: none;
            resize: none;
            line-height: 1.5;
            transition: all 0.2s;
            overflow-y: auto;
        }

        .msg-input:focus {
            border-color: var(--t500);
            box-shadow: 0 0 0 3px rgba(90, 171, 171, 0.15);
        }

        .msg-input::placeholder {
            color: var(--ink30);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--t700), var(--t500));
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(61, 138, 138, 0.3);
            transition: all 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 16px rgba(61, 138, 138, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--t200);
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .send-btn:disabled:hover {
            transform: none;
        }

        /* ===== Loading ===== */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--ink30);
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--t100);
            border-top-color: var(--t500);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Empty State ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--t50);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: var(--t500);
        }

        .empty-text {
            font-size: 0.9rem;
            color: var(--ink30);
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--t900);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            white-space: nowrap;
            box-shadow: var(--sh-lg);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.err {
            background: var(--danger);
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .chat-header {
                padding: 10px 12px;
            }
            
            .msg-bubble {
                max-width: 85%;
            }
            
            .msg-content {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
            
            .input-bar {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>

<!-- Header (sticky) -->
<header class="chat-header">
    <button class="back-btn" id="backBtn">
        <i data-feather="arrow-right" style="width:20px;height:20px"></i>
    </button>
    <div class="doc-avatar" id="docAvatarEl">د</div>
    <div class="header-meta">
        <div class="header-name" id="headerName">جاري التحميل...</div>
        <div class="header-subtitle">
            <i data-feather="message-circle" style="width:12px;height:12px"></i>
            <span>محادثة مباشرة</span>
        </div>
    </div>
</header>

<!-- Messages Area -->
<main class="msgs-area" id="msgsArea">
    <div class="loading-state">
        <div class="loading-spinner"></div>
        <div>جاري تحميل المحادثة...</div>
    </div>
</main>

<!-- Input Bar -->
<footer class="input-bar">
    <div class="msg-input-wrapper">
        <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn">
        <i data-feather="send" style="width:18px;height:18px"></i>
    </button>
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    feather.replace();

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        databaseURL: "https://sakina-937c4-default-rtdb.firebaseio.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);

    // State
    let patientUid = null;
    let doctorId = null;
    let convId = null;
    let isAtBottom = true;
    let lastDate = '';
    let isSending = false;        // لمنع الإرسال المزدوج دون تعطيل الزر

    // DOM Elements
    const msgsArea = document.getElementById('msgsArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const toastEl = document.getElementById('toast');
    const headerName = document.getElementById('headerName');
    const docAvatarEl = document.getElementById('docAvatarEl');

    // Toast Helper
    const showToast = (msg, isError = false) => {
        toastEl.textContent = msg;
        toastEl.className = `toast show ${isError ? 'err' : ''}`;
        setTimeout(() => toastEl.classList.remove('show'), 3000);
    };

    // Format Helpers
    const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    };

    const formatDate = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const msgDate = new Date(d);
        msgDate.setHours(0, 0, 0, 0);
        
        const diffDays = Math.floor((now - msgDate) / (1000 * 60 * 60 * 24));
        
        if (diffDays === 0) return 'اليوم';
        if (diffDays === 1) return 'أمس';
        if (diffDays < 7) return d.toLocaleDateString('ar-EG', { weekday: 'long' });
        return d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
    };

    const escapeHtml = (str) => {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m])
                  .replace(/\n/g, '<br>');
    };

    // Scroll Helper
    const scrollToBottom = () => {
        if (isAtBottom) {
            setTimeout(() => msgsArea.scrollTop = msgsArea.scrollHeight, 50);
        }
    };

    msgsArea.addEventListener('scroll', () => {
        isAtBottom = msgsArea.scrollHeight - msgsArea.scrollTop - msgsArea.clientHeight < 80;
    });

    // Render Message
    const renderMessage = (msg) => {
        const isOut = msg.senderId === patientUid;
        const msgDate = formatDate(msg.timestamp);
        
        // Date separator
        if (msgDate !== lastDate) {
            lastDate = msgDate;
            const sepDiv = document.createElement('div');
            sepDiv.className = 'date-separator';
            sepDiv.innerHTML = `<div class="date-badge">${msgDate}</div>`;
            msgsArea.appendChild(sepDiv);
        }

        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${isOut ? 'out' : 'in'}`;
        wrapper.dataset.id = msg.id;

        wrapper.innerHTML = `
            <div class="msg-bubble">
                <div class="msg-content">${escapeHtml(msg.text)}</div>
                <div class="msg-meta">
                    <span class="msg-time">${formatTime(msg.timestamp)}</span>
                    ${isOut ? `
                        <span class="msg-status">
                            <i data-feather="check" style="width:12px;height:12px"></i>
                        </span>
                    ` : ''}
                </div>
            </div>
        `;

        msgsArea.appendChild(wrapper);
        feather.replace();
    };

    // Clear and render all messages
    const renderAllMessages = (messages) => {
        msgsArea.innerHTML = '';
        lastDate = '';
        
        if (messages.length === 0) {
            msgsArea.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <i data-feather="message-square" style="width:28px;height:28px"></i>
                    </div>
                    <div class="empty-text">لا توجد رسائل بعد</div>
                    <div class="empty-text" style="font-size:0.8rem;margin-top:4px">ابدأ المحادثة الآن</div>
                </div>
            `;
            feather.replace();
            return;
        }
        
        messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        messages.forEach(msg => renderMessage(msg));
    };

    // Load Doctor Info
    const loadDoctorInfo = async () => {
        try {
            const doctorRef = ref(database, `doctors/${doctorId}`);
            const snapshot = await get(doctorRef);
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                headerName.textContent = data.name || 'أخصائي نفسي';
                
                if (data.photoURL) {
                    docAvatarEl.innerHTML = `<img src="${data.photoURL}" alt="${data.name}">`;
                } else {
                    docAvatarEl.textContent = (data.name || 'د').charAt(0);
                }
            } else {
                headerName.textContent = 'أخصائي نفسي';
            }
        } catch (error) {
            console.error('خطأ في تحميل الدكتور:', error);
        }
    };

    // Get or Create Conversation
    const getOrCreateConversation = async () => {
        try {
            const convsRef = ref(database, 'conversations');
            const snapshot = await get(convsRef);
            
            if (snapshot.exists()) {
                const conversations = snapshot.val();
                for (const id in conversations) {
                    const conv = conversations[id];
                    if (conv.patientId === patientUid && conv.doctorId === doctorId) {
                        convId = id;
                        return convId;
                    }
                }
            }
            
            const newConvRef = push(ref(database, 'conversations'));
            convId = newConvRef.key;
            
            await set(newConvRef, {
                patientId: patientUid,
                doctorId: doctorId,
                createdAt: Date.now(),
                lastMessage: '',
                lastMessageTime: Date.now()
            });
            
            return convId;
        } catch (error) {
            console.error('خطأ في المحادثة:', error);
            throw error;
        }
    };

    // Listen to Messages
    const listenToMessages = () => {
        if (!convId) return;
        
        const msgsRef = ref(database, `conversations/${convId}/messages`);
        
        onValue(msgsRef, (snapshot) => {
            const messages = [];
            
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    messages.push({
                        id: child.key,
                        ...child.val()
                    });
                });
            }
            
            renderAllMessages(messages);
            scrollToBottom();
        });
    };

    // Send Message (بدون تعطيل الزر للحفاظ على التركيز)
    const sendMessage = async () => {
        const text = msgInput.value.trim();
        if (!text || !convId || !patientUid || isSending) return;
        
        isSending = true;
        sendBtn.style.opacity = '0.7';   // إشارة بصرية فقط
        
        // حفظ القيمة ثم تفريغ الحقل فوراً
        const messageText = text;
        msgInput.value = '';
        msgInput.style.height = 'auto';
        
        // إبقاء التركيز على حقل الإدخال (لا نفقده)
        msgInput.focus({ preventScroll: true });
        
        try {
            const msgRef = push(ref(database, `conversations/${convId}/messages`));
            
            await set(msgRef, {
                text: messageText,
                senderId: patientUid,
                senderRole: 'patient',
                timestamp: Date.now(),
                read: false
            });
            
            await update(ref(database, `conversations/${convId}`), {
                lastMessage: messageText,
                lastMessageTime: Date.now()
            });
            
        } catch (error) {
            console.error('خطأ في الإرسال:', error);
            showToast('فشل إرسال الرسالة', true);
            // إعادة النص في حال فشل الإرسال
            msgInput.value = messageText;
        } finally {
            isSending = false;
            sendBtn.style.opacity = '1';
            
            // ضمان بقاء التركيز (مرة أخرى)
            requestAnimationFrame(() => {
                msgInput.focus({ preventScroll: true });
            });
        }
    };

    // Event Listeners
    msgInput.addEventListener('input', () => {
        msgInput.style.height = 'auto';
        msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
        // لا حاجة لتعطيل الزر الآن
    });

    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (msgInput.value.trim() && !isSending) {
                sendMessage();
            }
        }
    });

    sendBtn.addEventListener('click', (e) => {
        if (msgInput.value.trim() && !isSending) {
            sendMessage();
        }
    });

    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'patient-chats.html';
    });

    // منع فقدان التركيز عند النقر على الزر (لمسة إضافية)
    sendBtn.addEventListener('mousedown', (e) => e.preventDefault());

    // Initialize
    const init = async (user) => {
        patientUid = user.uid;
        const params = new URLSearchParams(window.location.search);
        doctorId = params.get('doctorId');
        
        if (!doctorId) {
            showToast('معرف الدكتور مفقود', true);
            return;
        }
        
        try {
            await loadDoctorInfo();
            await getOrCreateConversation();
            listenToMessages();
        } catch (error) {
            console.error('فشل التهيئة:', error);
            showToast('حدث خطأ', true);
        }
    };

    // Auth Check
    onAuthStateChanged(auth, (user) => {
        if (user) {
            init(user);
        } else {
            window.location.href = 'patient-login.html';
        }
    });
</script>
</body>
