<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>سُكُون · أدوات العناية</title>

    <!-- الخط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- مكتبة jsPDF لتصدير PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ==================== متغيرات التصميم ==================== */
        :root {
            --bg-primary: #f6faf9;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --primary-50: #e6f3f3;
            --primary-100: #cce7e7;
            --primary-200: #99cfcf;
            --primary-300: #66b8b8;
            --primary-400: #3da0a0;
            --primary-500: #2a8888;
            --primary-600: #1f6f6f;
            --primary-700: #165656;
            --primary-800: #0d3d3d;
            --primary-900: #062424;
            --text-primary: #1a2e2e;
            --text-secondary: #3d5a5a;
            --text-tertiary: #6b8a8a;
            --danger: #d94f4f;
            --success: #2ecc71;
            --warning: #f4b740;
            --shadow-xs: 0 2px 4px rgba(22, 86, 86, 0.04);
            --shadow-sm: 0 6px 16px rgba(22, 86, 86, 0.06);
            --shadow-md: 0 12px 28px rgba(22, 86, 86, 0.08);
            --shadow-lg: 0 20px 40px rgba(22, 86, 86, 0.12);
            --radius-card: 28px;
            --radius-element: 18px;
            --transition: all 0.2s ease;
            color-scheme: light;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0a1818;
                --surface: rgba(18, 30, 30, 0.85);
                --surface-solid: #142424;
                --text-primary: #e3f0f0;
                --text-secondary: #b3d1d1;
                --text-tertiary: #7aa3a3;
                --shadow-xs: 0 2px 4px rgba(0, 0, 0, 0.2);
                --shadow-sm: 0 6px 16px rgba(0, 0, 0, 0.25);
                --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
                color-scheme: dark;
            }
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:16px; scroll-behavior:smooth; }
        body {
            font-family:'Cairo', sans-serif;
            background:var(--bg-primary);
            color:var(--text-primary);
            min-height:100vh;
            padding-bottom:95px;
            line-height:1.5;
            position:relative;
            transition:background 0.2s;
        }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background:radial-gradient(circle at 0% 0%, rgba(42,136,136,0.08) 0%, transparent 50%),
                       radial-gradient(circle at 100% 100%, rgba(61,138,138,0.06) 0%, transparent 50%);
        }

        .app-container { max-width:760px; margin:0 auto; padding:1.75rem 1.25rem; position:relative; z-index:2; }

        /* ==================== رأس الصفحة ==================== */
        .app-header {
            display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;
        }
        .logo { display:flex; align-items:baseline; gap:2px; }
        .logo-main { font-size:2.2rem; font-weight:800; letter-spacing:-2px; color:var(--primary-600); line-height:1; }
        .logo-sub { font-size:1.5rem; font-weight:500; color:var(--primary-300); margin-right:2px; }

        /* ==================== التبويبات ==================== */
        .tabs-header {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: var(--surface);
            padding: 6px;
            border-radius: 60px;
            backdrop-filter: blur(12px);
            border: 1px solid var(--primary-100);
        }
        .tab-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-secondary);
            border-radius: 40px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-btn.active {
            background: linear-gradient(145deg, var(--primary-600), var(--primary-500));
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* ==================== بطاقات الأدوات ==================== */
        .tool-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-card);
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 20px;
            background: linear-gradient(145deg, var(--primary-500), var(--primary-600));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary-700);
        }
        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .question-hint {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding: 12px;
            background: var(--primary-50);
            border-radius: 18px;
            border-right: 4px solid var(--primary-400);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .tool-input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 30px;
            border: 1.5px solid var(--primary-100);
            background: var(--surface-solid);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
        }
        .tool-input:focus {
            border-color: var(--primary-400);
            box-shadow: 0 0 0 3px rgba(42,136,136,0.15);
        }
        .action-btn {
            padding: 0 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(145deg, var(--primary-600), var(--primary-500));
            color: white;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn:active { transform: scale(0.96); }

        /* ==================== تأثير التبخير ==================== */
        .evaporate-effect {
            animation: evaporateAnim 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
        }
        @keyframes evaporateAnim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
            40% { opacity: 0.8; transform: translate(-50%, -80%) scale(1.1); filter: blur(2px); }
            80% { opacity: 0.3; transform: translate(-50%, -150%) scale(1.3); filter: blur(6px); }
            100% { opacity: 0; transform: translate(-50%, -200%) scale(1.5); filter: blur(10px); }
        }

        /* ==================== نافذة الكتاب المنبثقة ==================== */
        .book-modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 30, 30, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .book-modal.open {
            opacity: 1;
            pointer-events: auto;
        }
        .book-container {
            background: #fdf8f0;
            background-image: linear-gradient(to bottom, rgba(210, 180, 140, 0.05), rgba(210, 180, 140, 0.15));
            max-width: 600px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 1px #d4b896 inset;
            overflow: hidden;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s;
            border: 1px solid #d4b896;
        }
        .book-modal.open .book-container {
            transform: scale(1);
        }
        .book-header {
            padding: 20px 24px;
            text-align: center;
            border-bottom: 1px solid #e0cbb0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f3e9de;
        }
        .book-header h3 {
            color: #5c3e2e;
            font-size: 1.5rem;
            font-weight: 800;
        }
        .close-book-btn {

            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #8b6f5c;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .close-book-btn:hover {
            background: rgba(0,0,0,0.05);
        }
        .book-pages {
            min-height: 350px;
            max-height: 55vh;
            overflow-y: auto;
            padding: 24px;
            background: #fff9f2;
        }
        .memory-page {
            padding: 24px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.04);
            margin-bottom: 16px;
            border-right: 5px solid var(--primary-400);
            transition: transform 0.2s;
        }
        .memory-page:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .memory-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #3e2c1c;
            font-weight: 500;
        }
        .memory-date {
            margin-top: 16px;
            font-size: 0.85rem;
            color: var(--text-tertiary);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .book-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-top: 1px solid #e0cbb0;
            background: #f3e9de;
        }
        .nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--primary-100);
            color: var(--primary-700);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: var(--shadow-xs);
        }
        .nav-btn:hover {
            background: var(--primary-200);
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .page-indicator {
            font-weight: 700;
            color: #5c3e2e;
            background: white;
            padding: 8px 20px;
            border-radius: 40px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .empty-book {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-tertiary);
            font-size: 1.1rem;
        }

        .pdf-btn {
            margin-left: 12px;
            background: #d94f4f;
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-xs);
            transition: var(--transition);
        }
        .pdf-btn:hover {
            background: #c03939;
        }

        /* ==================== شريط التنقل ==================== */
        .bottom-nav {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            width:calc(100% - 32px); max-width:500px; background:var(--surface);
            backdrop-filter:blur(25px); border-radius:36px; display:flex; justify-content:space-around;
            padding:10px 8px; box-shadow:var(--shadow-lg); border:1px solid rgba(255,255,255,0.3);
            z-index:400;
        }
        .nav-link {
            text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:4px;
            padding:8px 18px; border-radius:30px; color:var(--text-tertiary); font-weight:600;
            font-size:0.7rem; transition:var(--transition);
        }
        .nav-link.active { color:var(--primary-600); background:var(--primary-50); }
        .icon { width:22px; height:22px; stroke:currentColor; stroke-width:2; fill:none; }

        /* Toast */
        .toast {
            position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
            background:var(--primary-800); color:white; padding:10px 24px; border-radius:40px;
            font-size:0.9rem; font-weight:600; z-index:9999; opacity:0; pointer-events:none;
            transition:opacity 0.25s, transform 0.25s; white-space:nowrap; box-shadow:var(--shadow-md);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        @media (max-width:480px) {
            .app-container { padding:1.25rem 1rem; }
        }
    </style>
</head>

<script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, query, where, orderBy, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    // تفعيل التخزين دون اتصال
    enableIndexedDbPersistence(db).catch(err => console.warn("Offline persistence error:", err));

    // ==================== IndexedDB محلي ====================
    class MemoryCache {
        constructor() { this.db = null; }
        async init() {
            if (this.db) return;
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('SakoonMemoriesDB', 1);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => { this.db = req.result; resolve(); };
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('memories')) db.createObjectStore('memories', { keyPath: 'id' });
                };
            });
        }
        async getAll() {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('memories', 'readonly');
                const req = tx.objectStore('memories').getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => resolve([]);
            });
        }
        async saveAll(items) {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('memories', 'readwrite');
                const store = tx.objectStore('memories');
                store.clear();
                items.forEach(item => store.put(item));
                tx.oncomplete = () => resolve();
            });
        }
    }
    const cache = new MemoryCache();

    // ==================== الحالة ====================
    let currentUser = null;
    let memories = [];
    let currentPage = 0;

    // ==================== أسئلة عشوائية ====================
    const evaporateQuestions = [
        "ما الذي يثقل كاهلك الآن؟",
        "ما الفكرة التي تود التخلص منها؟",
        "ما الشيء الذي يزعجك اليوم؟",
        "اكتب شيئاً تريد أن يختفي من ذهنك"
    ];
    const bookQuestions = [
        "ما أجمل شيء حدث لك مؤخراً؟",
        "من الشخص الذي تشعر بالامتنان له اليوم؟",
        "ما الإنجاز الصغير الذي حققته اليوم؟",
        "لحظة شعرت فيها بالسلام الداخلي"
    ];

    const randomQuestion = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const evaporateHint = document.getElementById('evaporateHint');
    const bookHint = document.getElementById('bookHint');
    const evaporateInput = document.getElementById('evaporateInput');
    const memoryInput = document.getElementById('memoryInput');

    // تحديث الأسئلة بشكل دوري
    function refreshHints() {
        evaporateHint.textContent = `💭 ${randomQuestion(evaporateQuestions)}`;
        bookHint.textContent = `✨ ${randomQuestion(bookQuestions)}`;
        evaporateInput.placeholder = randomQuestion(evaporateQuestions);
        memoryInput.placeholder = randomQuestion(bookQuestions);
    }
    refreshHints();
    // تغيير السؤال بعد كل استخدام
    evaporateInput.addEventListener('focus', () => {
        if (!evaporateInput.value) evaporateInput.placeholder = randomQuestion(evaporateQuestions);
    });
    memoryInput.addEventListener('focus', () => {
        if (!memoryInput.value) memoryInput.placeholder = randomQuestion(bookQuestions);
    });

    // ==================== التبويبات ====================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        });
    });

    // ==================== تبخير الأفكار ====================
    const evaporateBtn = document.getElementById('evaporateBtn');
    
    evaporateBtn.addEventListener('click', () => {
        const text = evaporateInput.value.trim();
        if (!text) return;
        
        // إنشاء عنصر يتبخر
        const clone = document.createElement('div');
        clone.textContent = text;
        clone.style.position = 'fixed';
        clone.style.left = '50%';
        clone.style.top = '50%';
        clone.style.transform = 'translate(-50%, -50%)';
        clone.style.background = 'var(--surface-solid)';
        clone.style.padding = '16px 24px';
        clone.style.borderRadius = '40px';
        clone.style.boxShadow = 'var(--shadow-lg)';
        clone.style.zIndex = '9999';
        clone.style.fontSize = '1.2rem';
        clone.style.fontWeight = '600';
        clone.style.color = 'var(--text-primary)';
        clone.style.border = '2px solid var(--primary-300)';
        clone.style.pointerEvents = 'none';
        clone.classList.add('evaporate-effect');
        document.body.appendChild(clone);
        
        setTimeout(() => clone.remove(), 1200);
        evaporateInput.value = '';
        refreshHints();
        showToast('✨ تم تبخير الفكرة');
    });

    // ==================== كتاب الذكريات ====================
    const addMemoryBtn = document.getElementById('addMemoryBtn');
    const bookModal = document.getElementById('bookModal');
    const bookPages = document.getElementById('bookPages');
    const pageIndicator = document.getElementById('pageIndicator');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const closeBookBtn = document.getElementById('closeBookBtn');
    const openBookBtn = document.getElementById('openBookBtn');
    const downloadPdfBtn = document.getElementById('downloadPdfBtn');

    const showToast = (msg) => {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
    };

    const renderBook = () => {
        if (!memories.length) {
            bookPages.innerHTML = '<div class="empty-book">📖 لا توجد ذكريات بعد. أضف أول ذكرى جميلة!</div>';
            pageIndicator.textContent = '0 / 0';
            prevPageBtn.disabled = true;
            nextPageBtn.disabled = true;
            return;
        }
        // تأكد من أن الصفحة الحالية ضمن النطاق
        if (currentPage >= memories.length) currentPage = memories.length - 1;
        if (currentPage < 0) currentPage = 0;
        
        const memory = memories[currentPage];
        const date = new Date(memory.timestamp).toLocaleDateString('ar-EG', { 
            year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' 
        });
        
        bookPages.innerHTML = `
            <div class="memory-page">
                <div class="memory-text">${escapeHtml(memory.text)}</div>
                <div class="memory-date">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    ${date}
                </div>
            </div>
        `;
        pageIndicator.textContent = `${currentPage + 1} / ${memories.length}`;
        prevPageBtn.disabled = currentPage === 0;
        nextPageBtn.disabled = currentPage === memories.length - 1;
    };

    const escapeHtml = (s) => {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    };

    const addMemory = async () => {
        const text = memoryInput.value.trim();
        if (!text || !currentUser) return;
        const newDoc = doc(collection(db, 'memories'));
        await setDoc(newDoc, {
            text,
            patientId: currentUser.uid,
            timestamp: Date.now()
        });
        memoryInput.value = '';
        refreshHints();
        showToast('✨ أُضيفت إلى كتابك');
    };

    addMemoryBtn.addEventListener('click', addMemory);
    memoryInput.addEventListener('keypress', (e) => { if(e.key==='Enter') addMemory(); });

    openBookBtn.addEventListener('click', () => {
        currentPage = 0;
        renderBook();
        bookModal.classList.add('open');
    });
    
    const closeBook = () => bookModal.classList.remove('open');
    closeBookBtn.addEventListener('click', closeBook);
    bookModal.addEventListener('click', (e) => { if(e.target === bookModal) closeBook(); });
    
    prevPageBtn.addEventListener('click', () => {
        if (currentPage > 0) {
            currentPage--;
            renderBook();
        }
    });
    nextPageBtn.addEventListener('click', () => {
        if (currentPage < memories.length - 1) {
            currentPage++;
            renderBook();
        }
    });

    // ==================== تصدير PDF ====================
    downloadPdfBtn.addEventListener('click', () => {
        if (!memories.length) {
            showToast('لا توجد ذكريات لتصديرها');
            return;
        }
        
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a5'
            });
            
            // إعداد الخط (يدعم العربية بشكل محدود، نستخدم خط قياسي)
            doc.setR2L(true);
            
            let y = 20;
            const pageHeight = doc.internal.pageSize.height;
            const margin = 15;
            const lineHeight = 7;
            
            // عنوان
            doc.setFontSize(22);
            doc.setTextColor(31, 111, 111);
            doc.text('كتاب الذكريات', doc.internal.pageSize.width / 2, y, { align: 'center' });
            y += 15;
            
            doc.setFontSize(12);
            doc.setTextColor(80, 80, 80);
            
            memories.forEach((memory, index) => {
                const date = new Date(memory.timestamp).toLocaleDateString('ar-EG', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
                const text = memory.text;
                
                // حساب ارتفاع النص
                const splitText = doc.splitTextToSize(text, doc.internal.pageSize.width - 2 * margin);
                const textHeight = splitText.length * lineHeight + 15;
                
                // صفحة جديدة إذا لزم
                if (y + textHeight > pageHeight - margin) {
                    doc.addPage();
                    y = margin;
                }
                
                // رسم مربع للذكرى
                doc.setDrawColor(200, 180, 150);
                doc.setFillColor(255, 250, 240);
                doc.roundedRect(margin, y - 5, doc.internal.pageSize.width - 2 * margin, textHeight + 5, 5, 5, 'FD');
                
                // نص الذكرى
                doc.setFontSize(14);
                doc.setTextColor(60, 40, 20);
                doc.text(splitText, margin + 5, y + 5);
                
                // التاريخ
                doc.setFontSize(10);
                doc.setTextColor(100, 120, 120);
                doc.text(date, doc.internal.pageSize.width - margin - 5, y + textHeight - 5, { align: 'right' });
                
                y += textHeight + 10;
            });
            
            // تذييل
            doc.setFontSize(10);
            doc.setTextColor(150, 150, 150);
            const footerY = pageHeight - 10;
            doc.text('سُكُون · تطبيق العناية النفسية', doc.internal.pageSize.width / 2, footerY, { align: 'center' });
            
            doc.save('كتاب_ذكرياتي.pdf');
            showToast('📄 تم تنزيل الكتاب بنجاح');
        } catch (error) {
            console.error('PDF error:', error);
            showToast('حدث خطأ أثناء إنشاء PDF');
        }
    });

    // ==================== مزامنة الذكريات ====================
    let unsubMemories = null;
    const startSync = (user) => {
        if (unsubMemories) unsubMemories();
        const q = query(
            collection(db, 'memories'), 
            where('patientId', '==', user.uid), 
            orderBy('timestamp', 'desc')
        );
        unsubMemories = onSnapshot(q, async (snap) => {
            memories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            await cache.saveAll(memories);
            if (bookModal.classList.contains('open')) {
                // الاحتفاظ بالصفحة الحالية إن أمكن
                if (currentPage >= memories.length) currentPage = Math.max(0, memories.length - 1);
                renderBook();
            }
        }, (error) => {
            console.warn('Sync error:', error);
            showToast('⚠️ تعذر الاتصال بالسحابة، البيانات محلية');
        });
    };

    const init = async (user) => {
        currentUser = user;
        const cached = await cache.getAll();
        if (cached.length) {
            memories = cached.sort((a, b) => b.timestamp - a.timestamp);
        }
        startSync(user);
    };

    onAuthStateChanged(auth, user => {
        if (user) init(user);
        else window.location.href = 'patient-login.html';
    });
</script>
</body>
</html>
