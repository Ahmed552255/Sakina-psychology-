<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — تسجيل دخول آمن</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary: #98D8D8;
            --accent: #5aabab;
            --accent-dark: #3d8a8a;
            --bg: #eef6f6;
            --white: #fff;
            --ink: #2c3e50;
            --text-sec: #7f8c8d;
            --danger: #ff6b6b;
            --success: #4caf93;
            --grad: linear-gradient(135deg, var(--primary), var(--accent));
            --shadow: 0 8px 32px rgba(90, 171, 171, 0.15);
            --radius: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--bg), #d1e8e8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            overflow: hidden;
        }

        .bg-orbs { position: fixed; inset: 0; z-index: -1; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 20s infinite alternate; }
        .orb1 { width: 400px; height: 400px; background: var(--primary); top: -100px; right: -100px; }
        @keyframes float { to { transform: translate(20px, 30px); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-badge { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
        .logo-icon { width: 40px; height: 40px; background: var(--grad); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; }
        
        h1 { color: var(--accent-dark); font-size: 1.8rem; margin-bottom: 0.5rem; }
        p { color: var(--text-sec); font-size: 0.9rem; margin-bottom: 2rem; }

        .input-group { position: relative; margin-bottom: 1.2rem; }
        .input-group i { position: absolute; top: 50%; right: 1rem; transform: translateY(-50%); color: var(--accent); }
        .input-group input {
            width: 100%;
            padding: 1rem 3rem 1rem 1rem;
            border-radius: 16px;
            border: 1.5px solid transparent;
            background: rgba(255, 255, 255, 0.9);
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(152, 216, 216, 0.2); }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            border: none;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }
        .btn-primary { background: var(--grad); color: white; box-shadow: 0 4px 15px rgba(90, 171, 171, 0.3); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(90, 171, 171, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(1); }

        .alert {
            padding: 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .alert-danger { background: #ffe3e3; color: var(--danger); border: 1px solid #ffc1c1; }

        #recovery-zone { display: none; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px dashed #ccc; }
        .recovery-key-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border: 2px dashed var(--primary);
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: var(--accent-dark);
            margin: 10px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="bg-orbs"><div class="orb orb1"></div></div>

    <main class="glass-card">
        <div class="logo-badge">
            <div class="logo-icon"><i data-feather="shield"></i></div>
            <h2 style="color: var(--accent-dark)">سُ<span>كُون</span></h2>
        </div>

        <div id="login-view">
            <h1>دخول آمن</h1>
            <p>بياناتك مشفرة ولا يمكن لأحد الوصول إليها</p>
            
            <div id="error-msg" class="alert alert-danger"></div>

            <form id="loginForm">
                <div class="input-group">
                    <i data-feather="user"></i>
                    <input type="text" id="userId" placeholder="المُعرّف الشخصي" required>
                </div>
                <div class="input-group">
                    <i data-feather="lock"></i>
                    <input type="password" id="userPin" placeholder="رمز الأمان (PIN)" required maxlength="6">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">دخول الحساب</button>
            </form>
            
            <div style="margin-top: 1.5rem;">
                <a href="#" id="show-recovery" style="color: var(--text-sec); font-size: 0.85rem; text-decoration: none;">نسيت رمز الأمان؟</a>
            </div>
        </div>

        <div id="recovery-zone">
            <h3>استعادة الوصول</h3>
            <p>أدخل مفتاح الاستعادة الورقي الخاص بك</p>
            <div class="input-group">
                <i data-feather="key"></i>
                <input type="text" id="recoveryInput" placeholder="SK-XXXX-XXXX">
            </div>
            <button class="btn btn-primary" onclick="APP.handleRecovery()">تحقق واستعادة</button>
            <button class="btn" style="background:none; color: var(--text-sec);" onclick="location.reload()">العودة</button>
        </div>
    </main>

    <script>
        feather.replace();

        const APP = (() => {
            const state = {
                attempts: 0,
                maxAttempts: 3,
                lockoutTime: 0
            };

            const UI = {
                loginForm: document.getElementById('loginForm'),
                errorMsg: document.getElementById('error-msg'),
                loginBtn: document.getElementById('loginBtn'),
                recoveryZone: document.getElementById('recovery-zone'),
                loginView: document.getElementById('login-view')
            };

            // محاكاة التشفير المحلي (Client-side Hashing)
            const hashData = (id, pin) => btoa(id + pin + "sokoon_secure_salt");

            const handleLogin = (e) => {
                e.preventDefault();
                
                if (Date.now() < state.lockoutTime) {
                    const remaining = Math.ceil((state.lockoutTime - Date.now()) / 1000);
                    showError(`المحاولات مقفولة. انتظر ${remaining} ثانية`);
                    return;
                }

                const id = document.getElementById('userId').value;
                const pin = document.getElementById('userPin').value;

                // محاكاة التحقق
                if (id === "admin" && pin === "123456") {
                    UI.errorMsg.style.display = 'none';
                    alert("تم الدخول بنجاح! جاري تحميل جلساتك...");
                } else {
                    state.attempts++;
                    if (state.attempts >= state.maxAttempts) {
                        const penalty = 30 * 1000; // 30 ثانية حظر
                        state.lockoutTime = Date.now() + penalty;
                        state.attempts = 0;
                        showError("تم رصد محاولات خاطئة كثيرة. تم قفل الدخول مؤقتاً.");
                    } else {
                        showError(`بيانات خاطئة. متبقي ${state.maxAttempts - state.attempts} محاولات.`);
                    }
                }
            };

            const showError = (msg) => {
                UI.errorMsg.textContent = msg;
                UI.errorMsg.style.display = 'block';
            };

            const init = () => {
                UI.loginForm.addEventListener('submit', handleLogin);
                document.getElementById('show-recovery').onclick = () => {
                    UI.loginView.style.display = 'none';
                    UI.recoveryZone.style.display = 'block';
                };
            };

            return { init, handleRecovery: () => alert("جاري التحقق من مفتاح الاستعادة...") };
        })();

        APP.init();
    </script>
</body>
</html>
