<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — تسجيل الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary: #98D8D8;
            --accent: #5aabab;
            --accent-dark: #3d8a8a;
            --bg: #eef6f6;
            --white: #fff;
            --ink: #2c3e50;
            --text-sec: #7f8c8d;
            --grad: linear-gradient(135deg, var(--primary), var(--accent));
            --shadow: 0 8px 32px rgba(90, 171, 171, 0.15);
            --radius: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--bg), #d1e8e8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .logo-section { margin-bottom: 2rem; }
        .logo-icon { 
            width: 50px; height: 50px; background: var(--grad); 
            border-radius: 14px; display: inline-flex; 
            align-items: center; justify-content: center; color: white;
            margin-bottom: 1rem;
        }

        h1 { color: var(--accent-dark); margin-bottom: 0.5rem; font-size: 1.6rem; }
        
        .input-group { position: relative; margin-bottom: 1.2rem; }
        .input-group i { position: absolute; top: 50%; right: 1rem; transform: translateY(-50%); color: var(--accent); }
        .input-group input {
            width: 100%; padding: 1rem 3rem 1rem 1rem;
            border-radius: 16px; border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.9); font-family: inherit;
            outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(152, 216, 216, 0.1); }

        .btn {
            width: 100%; padding: 1rem; border-radius: 16px;
            border: none; font-family: inherit; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-bottom: 1rem;
        }

        /* زر تسجيل الدخول الأساسي */
        .btn-primary { 
            background: var(--grad); color: white; 
            box-shadow: 0 4px 15px rgba(90, 171, 171, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(90, 171, 171, 0.4); }

        /* زر إنشاء الحساب (الذي طلبته) */
        .btn-outline {
            background: transparent;
            color: var(--accent-dark);
            border: 2px solid var(--primary);
            margin-top: 0.5rem;
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .divider {
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            color: var(--text-sec);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: ""; flex: 1; height: 1px; background: #ddd; margin: 0 10px;
        }

        .forgot-link { color: var(--text-sec); text-decoration: none; font-size: 0.85rem; }
        .forgot-link:hover { color: var(--accent-dark); }
    </style>
</head>
<body>

    <main class="glass-card">
        <div class="logo-section">
            <div class="logo-icon"><i data-feather="wind"></i></div>
            <h1>مرحباً بك في سُكُون</h1>
            <p style="color: var(--text-sec); font-size: 0.9rem;">سجل دخولك لتستعيد هدوءك</p>
        </div>

        <form>
            <div class="input-group">
                <i data-feather="user"></i>
                <input type="text" placeholder="المُعرّف الشخصي">
            </div>
            <div class="input-group">
                <i data-feather="lock"></i>
                <input type="password" placeholder="كلمة المرور">
            </div>
            
            <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
            <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
        </form>

        <div class="divider">أو</div>

        <button type="button" class="btn btn-outline" onclick="window.location.href='signup.html'">
            إنشاء حساب جديد
        </button>
    </main>

    <script>
        feather.replace();
    </script>
</body>
</html>
