<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — تسجيل الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary: #98D8D8;
            --accent: #5aabab;
            --accent-dark: #3d8a8a;
            --bg: #eef6f6;
            --white: #fff;
            --ink: #2c3e50;
            --text-sec: #7f8c8d;
            --danger: #ff6b6b;
            --success: #4caf93;
            --grad: linear-gradient(135deg, var(--primary), var(--accent));
            --shadow: 0 8px 32px rgba(90, 171, 171, 0.15);
            --radius: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            background: linear-gradient(135deg, var(--bg), #d1e8e8);
            position: relative;
        }

        .bg-orbs { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: float 40s infinite alternate; }
        .orb1 { width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(152, 216, 216, 0.25) 0%, transparent 70%); top: -15%; right: -15%; }
        .orb2 { width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(90, 171, 171, 0.15) 0%, transparent 70%); bottom: -10%; left: -10%; animation-direction: alternate-reverse; }
        @keyframes float { from { transform: translate(0, 0) scale(1); } to { transform: translate(5%, 8%) scale(1.1); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            text-align: center;
            z-index: 1;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .card-header { margin-bottom: 2rem; }
        .logo-badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(152, 216, 216, 0.25); border-radius: 20px; padding: 10px 22px; margin-bottom: 1.25rem; }
        .logo-badge .li { width: 32px; height: 32px; border-radius: 10px; background: var(--grad); display: flex; align-items: center; justify-content: center; color: #fff; }
        .logo-badge .lt { font-size: 18px; font-weight: 900; color: var(--accent-dark); }
        .card-header h1 { font-size: 2.2rem; font-weight: 700; color: var(--accent-dark); margin-bottom: 0.5rem; }
        .card-header p { font-size: 1rem; color: var(--text-sec); }

        .input-group { position: relative; margin-bottom: 1rem; }
        .input-group .icon { position: absolute; top: 50%; right: 1.25rem; transform: translateY(-50%); color: var(--accent); }
        .input-group .validation-icon { left: 1.25rem; right: auto; position: absolute; top: 50%; transform: translateY(-50%); display: flex; align-items: center; }
        .input-group input { width: 100%; padding: 1rem 4rem 1rem 3rem; background: rgba(255, 255, 255, 0.7); border: 1.5px solid transparent; border-radius: 16px; outline: none; font-size: 1rem; font-family: 'Cairo'; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 4px rgba(152, 216, 216, 0.2); }

        .validation-message { text-align: right; font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; min-height: 1.2rem; }
        .validation-message.success { color: var(--success); }
        .validation-message.error { color: var(--danger); }

        .btn { width: 100%; padding: 1rem; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 700; font-family: 'Cairo'; cursor: pointer; transition: 0.3s; margin-bottom: 1rem; }
        .btn-primary { background: var(--grad); color: white; box-shadow: 0 6px 20px rgba(90, 171, 171, 0.35); }
        .btn-primary:hover { transform: translateY(-3px); }
        .btn-primary:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .loader { width: 18px; height: 18px; border: 2px solid var(--primary); border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
    </div>

    <main class="glass-card">
        <header class="card-header">
            <div class="logo-badge">
                <div class="li"><i data-feather="leaf"></i></div>
                <span class="lt">سُكُون</span>
            </div>
            <h1>أهلاً بعودتك</h1>
            <p>سجل دخولك للوصول إلى مساحتك</p>
        </header>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="userId" placeholder="المُعرّف الشخصي" required autocomplete="off">
                <i class="icon" data-feather="user"></i>
                <span class="validation-icon" id="validationIcon"></span>
            </div>
            <div class="validation-message" id="validationMessage"></div>
            
            <button type="submit" class="btn btn-primary" id="loginButton" disabled>دخول</button>
        </form>
    </main>

    <script>
        feather.replace();

        const LOGIN_APP = (() => {
            const elements = {
                input: document.getElementById('userId'),
                icon: document.getElementById('validationIcon'),
                msg: document.getElementById('validationMessage'),
                btn: document.getElementById('loginButton'),
                form: document.getElementById('loginForm')
            };

            let timeout;

            const validate = async (val) => {
                if (val.length < 4) {
                    elements.icon.innerHTML = '';
                    elements.msg.textContent = '';
                    elements.btn.disabled = true;
                    return;
                }

                elements.icon.innerHTML = '<span class="loader"></span>';
                
                // محاكاة التحقق من السيرفر
                setTimeout(() => {
                    const validIDs = ['admin', 'user123', 'sokoon_patient', 'nour_box'];
                    const isOk = validIDs.includes(val.toLowerCase());

                    if (isOk) {
                        elements.icon.innerHTML = '<i data-feather="check-circle" style="color:var(--success)"></i>';
                        elements.msg.textContent = 'مُعرّف صالح';
                        elements.msg.className = 'validation-message success';
                        elements.btn.disabled = false;
                    } else {
                        elements.icon.innerHTML = '<i data-feather="x-circle" style="color:var(--danger)"></i>';
                        elements.msg.textContent = 'المُعرّف غير مسجل';
                        elements.msg.className = 'validation-message error';
                        elements.btn.disabled = true;
                    }
                    feather.replace();
                }, 600);
            };

            elements.input.addEventListener('input', (e) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => validate(e.target.value.trim()), 400);
            });

            elements.form.addEventListener('submit', (e) => {
                e.preventDefault();
                elements.btn.innerHTML = '<span class="loader" style="border-color:#fff; border-bottom-color:transparent"></span>';
                // التوجه لصفحة المنزل
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            });
        })();
    </script>
</body>
</html>
