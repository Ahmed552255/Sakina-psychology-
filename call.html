<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سُكُون — مكالمة</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --teal-500: #5aabab; --teal-700: #3d8a8a; --teal-900: #1f4f4f;
            --white: #ffffff; --danger: #e05252; --success: #34c48a;
            --bg-dark: #0f1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--white);
            display: flex;
            flex-direction: column;
        }
        .video-container {
            flex: 1; position: relative; background: #0a1111;
            display: flex; align-items: center; justify-content: center;
        }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #1a2a2a; }
        #localVideo {
            position: absolute; bottom: 20px; left: 20px;
            width: 100px; height: 140px; border-radius: 16px;
            border: 3px solid var(--teal-500); object-fit: cover;
            background: #2a3a3a; z-index: 10;
        }
        .audio-call-ui {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 2rem;
        }
        .avatar-large {
            width: 120px; height: 120px; border-radius: 50%;
            background: linear-gradient(135deg, var(--teal-500), var(--teal-700));
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 900; color: var(--white);
            margin-bottom: 1.5rem; border: 4px solid var(--teal-500);
            box-shadow: 0 8px 32px rgba(90,171,171,0.3);
        }
        .caller-name { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .call-status { font-size: 1rem; color: rgba(255,255,255,0.7); margin-bottom: 2rem; }
        .controls-bar {
            display: flex; align-items: center; justify-content: center; gap: 1.5rem;
            padding: 1.5rem 1rem 2rem; background: rgba(15, 25, 25, 0.95);
            backdrop-filter: blur(10px); border-top: 1px solid rgba(90,171,171,0.2);
        }
        .ctrl-btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.1); color: var(--white);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .ctrl-btn:hover { transform: scale(1.1); }
        .ctrl-btn.active { background: var(--teal-500); }
        .ctrl-btn.end-call { background: var(--danger); width: 70px; height: 70px; }
        .toast-message {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 24px;
            border-radius: 40px; font-size: 0.9rem; z-index: 1000;
            backdrop-filter: blur(8px); white-space: nowrap;
        }
        .waiting-screen {
            position: absolute; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 20;
        }
        .pulse-ring {
            width: 80px; height: 80px; border-radius: 50%; background: var(--teal-500);
            opacity: 0.6; animation: pulse 1.5s infinite; margin-bottom: 2rem;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.6; }
            70% { transform: scale(1.2); opacity: 0.2; }
            100% { transform: scale(0.8); opacity: 0.6; }
        }
        .hidden { display: none !important; }
        .error-details {
            margin-top: 1rem; font-size: 0.9rem; color: var(--danger);
            max-width: 300px; text-align: center;
        }
        .retry-btn {
            margin-top: 1.5rem; background: var(--teal-500); color: white;
            border: none; padding: 0.8rem 2.5rem; border-radius: 60px;
            font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 1.2rem;
            cursor: pointer; transition: background 0.2s;
        }
        .retry-btn:hover { background: var(--teal-700); }
        @media(max-width:500px){
            .ctrl-btn{width:50px;height:50px}
            .ctrl-btn.end-call{width:60px;height:60px}
            #localVideo{width:80px;height:110px}
        }
    </style>
</head>
<body>

<div id="waitingScreen" class="waiting-screen">
    <div class="pulse-ring"></div>
    <div class="caller-name" id="waitingName">...</div>
    <div class="call-status" id="waitingStatus">جاري التهيئة...</div>
    <div id="errorMessage" class="error-details"></div>
    <button id="retryButton" class="retry-btn hidden">إعادة المحاولة</button>
</div>

<div id="callInterface" class="hidden" style="display:flex; flex-direction:column; height:100%;">
    <div id="videoContainer" class="video-container hidden">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
    </div>
    <div id="audioOnlyUI" class="audio-call-ui">
        <div class="avatar-large" id="remoteAvatar">م</div>
        <div class="caller-name" id="remoteName">مريض</div>
        <div class="call-status" id="callStatusText">متصل • الصوت فقط</div>
    </div>
    <div class="controls-bar">
        <button class="ctrl-btn" id="toggleMicBtn" title="كتم الصوت">
            <i data-feather="mic" style="width:22px;height:22px"></i>
        </button>
        <button class="ctrl-btn end-call" id="hangupBtn" title="إنهاء المكالمة">
            <i data-feather="phone-off" style="width:24px;height:24px"></i>
        </button>
        <button class="ctrl-btn" id="toggleVideoBtn" title="تشغيل الفيديو">
            <i data-feather="video" style="width:22px;height:22px"></i>
        </button>
    </div>
</div>

<div id="toast" class="toast-message hidden"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        databaseURL: "https://sakina-937c4-default-rtdb.firebaseio.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    feather.replace();

    // DOM elements
    const waitingScreen = document.getElementById('waitingScreen');
    const callInterface = document.getElementById('callInterface');
    const videoContainer = document.getElementById('videoContainer');
    const audioOnlyUI = document.getElementById('audioOnlyUI');
    const remoteVideo = document.getElementById('remoteVideo');
    const localVideo = document.getElementById('localVideo');
    const remoteNameEl = document.getElementById('remoteName');
    const remoteAvatar = document.getElementById('remoteAvatar');
    const callStatusText = document.getElementById('callStatusText');
    const waitingName = document.getElementById('waitingName');
    const waitingStatus = document.getElementById('waitingStatus');
    const errorMessageEl = document.getElementById('errorMessage');
    const retryButton = document.getElementById('retryButton');
    const toggleMicBtn = document.getElementById('toggleMicBtn');
    const toggleVideoBtn = document.getElementById('toggleVideoBtn');
    const hangupBtn = document.getElementById('hangupBtn');
    const toastEl = document.getElementById('toast');

    const urlParams = new URLSearchParams(window.location.search);
    const callType = urlParams.get('type') || 'audio';
    const doctorId = urlParams.get('doctorId');
    const patientId = urlParams.get('patientId');
    const role = urlParams.get('role') || 'callee'; // افتراضي callee للمريض

    let localUid = null;
    let remoteUid = null;
    let callId = null;
    let peerConnection = null;
    let localStream = null;
    let isAudioMuted = false;
    let isVideoOff = (callType === 'audio');
    let isCallActive = false;
    let hasRemoteVideo = false;

    // Web Audio للرنين (432Hz مريح)
    let audioContext = null;
    let ringtoneGain = null;
    let ringtoneTimeout = null;
    let currentOscillator = null;

    const servers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function log(msg, data) { console.log(`[${role}] ${msg}`, data || ''); }
    function showToast(msg, duration = 3000) {
        toastEl.textContent = msg;
        toastEl.classList.remove('hidden');
        setTimeout(() => toastEl.classList.add('hidden'), duration);
    }
    function updateWaitingStatus(text, isError = false) {
        waitingStatus.textContent = text;
        waitingStatus.style.color = isError ? 'var(--danger)' : '';
    }
    function displayError(message) {
        errorMessageEl.textContent = message;
        errorMessageEl.classList.remove('hidden');
        retryButton.classList.remove('hidden');
        updateWaitingStatus('فشل الاتصال', true);
    }
    function hideError() {
        errorMessageEl.classList.add('hidden');
        retryButton.classList.add('hidden');
    }
    function formatName(uid) {
        if (uid === doctorId) return 'الطبيب';
        if (uid === patientId) return 'المريض';
        return uid;
    }
    function stopLocalStream() {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    }

    // --- رنين مريح 432Hz ---
    function playTone() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
        if (currentOscillator) {
            try { currentOscillator.stop(); } catch(e) {}
            currentOscillator = null;
        }
        const now = audioContext.currentTime;
        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        osc.type = 'sine';
        osc.frequency.value = 432;
        gainNode.gain.setValueAtTime(0.12, now);
        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);
        osc.start();
        osc.stop(now + 1.2);
        currentOscillator = osc;
        osc.onended = () => { currentOscillator = null; };
        ringtoneTimeout = setTimeout(() => playTone(), 2500);
    }

    function startRingtone() {
        stopRingtone();
        playTone();
        ringtoneTimeout = setTimeout(() => {
            stopRingtone();
            if (!isCallActive) {
                displayError('لم يتم الرد على المكالمة');
                endCall();
            }
        }, 45000); // 45 ثانية
    }

    function stopRingtone() {
        if (ringtoneTimeout) {
            clearTimeout(ringtoneTimeout);
            ringtoneTimeout = null;
        }
        if (currentOscillator) {
            try { currentOscillator.stop(); } catch(e) {}
            currentOscillator = null;
        }
    }

    function updateUIForVideo(hasRemoteVideoTrack) {
        hasRemoteVideo = hasRemoteVideoTrack;
        if (hasRemoteVideo || !isVideoOff) {
            videoContainer.classList.remove('hidden');
            audioOnlyUI.classList.add('hidden');
        } else {
            videoContainer.classList.add('hidden');
            audioOnlyUI.classList.remove('hidden');
        }
    }

    function createPeerConnection() {
        const pc = new RTCPeerConnection(servers);
        pc.onicecandidate = (e) => { if (e.candidate) sendSignalingMessage({ type: 'candidate', candidate: e.candidate }); };
        pc.ontrack = (e) => {
            if (e.track.kind === 'video') { remoteVideo.srcObject = e.streams[0]; updateUIForVideo(true); }
            else if (e.track.kind === 'audio') { const a = new Audio(); a.srcObject = e.streams[0]; a.autoplay = true; document.body.appendChild(a); }
            stopRingtone();
            waitingScreen.classList.add('hidden');
            callStatusText.textContent = 'متصل';
            isCallActive = true;
            hideError();
        };
        pc.onconnectionstatechange = () => {
            if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') displayError('انقطع الاتصال');
        };
        return pc;
    }

    const callRef = () => ref(db, `calls/${callId}`);
    function sendSignalingMessage(msg) {
        update(callRef(), { [`signaling/${role === 'caller' ? 'caller' : 'callee'}`]: msg });
    }
    function listenForSignaling() {
        onValue(ref(db, `calls/${callId}/signaling`), async (snap) => {
            const data = snap.val();
            if (!data) return;
            const other = role === 'caller' ? 'callee' : 'caller';
            const msg = data[other];
            if (!msg) return;
            try {
                if (msg.type === 'offer') {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(msg));
                    const ans = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(ans);
                    sendSignalingMessage(ans);
                } else if (msg.type === 'answer') {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(msg));
                } else if (msg.type === 'candidate') {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(msg.candidate));
                }
            } catch (e) { log('خطأ signaling', e); }
        });
    }

    async function startCallProcess() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: callType === 'video' });
            if (callType === 'video') { localVideo.srcObject = localStream; updateUIForVideo(false); }
            peerConnection = createPeerConnection();
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            if (role === 'caller') {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                sendSignalingMessage(offer);
                listenForSignaling();
                waitingStatus.textContent = 'في انتظار الرد...';
                startRingtone();
            } else {
                listenForSignaling();
                waitingStatus.textContent = 'جاري الاتصال...';
            }
            showCallInterface();
        } catch (e) {
            log('فشل بدء المكالمة', e);
            displayError('تعذر الوصول إلى الميكروفون/الكاميرا');
        }
    }

    function showCallInterface() {
        waitingScreen.classList.add('hidden');
        callInterface.classList.remove('hidden');
        callInterface.style.display = 'flex';
        if (callType === 'audio') { videoContainer.classList.add('hidden'); audioOnlyUI.classList.remove('hidden'); }
    }

    async function endCall() {
        stopRingtone();
        if (audioContext) { audioContext.close(); audioContext = null; }
        stopLocalStream();
        if (peerConnection) peerConnection.close();
        if (callId) await remove(callRef());
        const returnUrl = role === 'caller' ? `doctor-conversation.html?patientId=${patientId}` : `conversation.html?doctorId=${doctorId}`;
        window.location.href = returnUrl;
    }

    // أحداث الأزرار
    retryButton.addEventListener('click', () => window.location.reload());
    toggleMicBtn.addEventListener('click', () => {
        if (localStream) {
            const t = localStream.getAudioTracks()[0];
            if (t) { t.enabled = !t.enabled; isAudioMuted = !t.enabled; }
            toggleMicBtn.classList.toggle('active', isAudioMuted);
            toggleMicBtn.innerHTML = isAudioMuted ? '<i data-feather="mic-off" style="width:22px;height:22px"></i>' : '<i data-feather="mic" style="width:22px;height:22px"></i>';
            feather.replace();
        }
    });
    toggleVideoBtn.addEventListener('click', () => {
        if (!localStream || callType === 'audio') return showToast('المكالمة صوتية');
        const t = localStream.getVideoTracks()[0];
        if (t) { t.enabled = !t.enabled; isVideoOff = !t.enabled; }
        toggleVideoBtn.classList.toggle('active', isVideoOff);
        toggleVideoBtn.innerHTML = isVideoOff ? '<i data-feather="video-off" style="width:22px;height:22px"></i>' : '<i data-feather="video" style="width:22px;height:22px"></i>';
        feather.replace();
        updateUIForVideo(hasRemoteVideo);
    });
    hangupBtn.addEventListener('click', endCall);

    async function initPage() {
        localUid = auth.currentUser.uid;
        remoteUid = role === 'caller' ? patientId : doctorId;
        const remoteName = formatName(remoteUid);
        remoteNameEl.textContent = remoteName;
        remoteAvatar.textContent = remoteName.charAt(0);
        waitingName.textContent = remoteName;
        updateWaitingStatus('جاري التهيئة...');

        if (role === 'caller') {
            callId = `${doctorId}_${patientId}_${Date.now()}`;
            await set(callRef(), { caller: doctorId, callee: patientId, type: callType, status: 'ringing', createdAt: Date.now() });
            onValue(ref(db, `calls/${callId}/status`), (snap) => {
                if (snap.val() === 'rejected') { stopRingtone(); displayError('تم رفض المكالمة'); setTimeout(endCall, 1500); }
                else if (snap.val() === 'answered') waitingStatus.textContent = 'تم الرد...';
            });
            startCallProcess();
        } else {
            const snap = await get(ref(db, 'calls'));
            if (snap.exists()) {
                for (const id in snap.val()) {
                    if (snap.val()[id].callee === patientId && snap.val()[id].status === 'ringing') {
                        callId = id; break;
                    }
                }
            }
            if (!callId) { displayError('لا توجد مكالمة واردة'); return; }
            await update(callRef(), { status: 'answered' });
            startCallProcess();
        }
    }

    onAuthStateChanged(auth, (user) => {
        if (user) initPage();
        else window.location.href = 'index.html';
    });

    window.addEventListener('beforeunload', () => {
        stopRingtone();
        if (audioContext) audioContext.close();
        stopLocalStream();
        if (peerConnection) peerConnection.close();
        if (callId) remove(callRef());
    });
</script>
</body>
</html>
