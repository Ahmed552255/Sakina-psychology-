<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سُكُون — مكالمة احترافية (Agora)</title>

    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- Agora Web SDK NG (أحدث إصدار ثابت) -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>

    <style>
        /* ========== نظام التصميم الاحترافي ========== */
        :root {
            --primary: #2b7a78;
            --primary-light: #3aafaa;
            --primary-dark: #1d4e4c;
            --accent: #feffff;
            --bg-dark: #17252a;
            --bg-darker: #0b1417;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --white: #ffffff;
            --gray-100: #f8f9fa;
            --gray-600: #6c757d;
            --gray-800: #343a40;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.2);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: all 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ----- شاشة التحميل / الانتظار ----- */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, var(--bg-dark), var(--bg-darker));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.4s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }

        .pulse-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary-light);
            opacity: 0.25;
            animation: pulse 1.8s infinite;
            margin-bottom: 30px;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.1; }
            100% { transform: scale(0.9); opacity: 0.3; }
        }

        .loading-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .loading-subtitle {
            font-size: 1.1rem;
            color: var(--gray-100);
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .loading-progress {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .loading-progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary-light);
            border-radius: 4px;
            transition: width 0.3s;
            animation: progress 2.5s infinite;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .error-panel {
            margin-top: 30px;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid var(--danger);
            border-radius: 60px;
            padding: 15px 25px;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .btn-retry {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .btn-retry:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* ----- واجهة المكالمة الرئيسية ----- */
        .call-interface {
            display: flex;
            flex-direction: column;
            height: 100vh;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            background: var(--bg-darker);
        }
        .call-interface.active {
            opacity: 1;
            visibility: visible;
        }

        /* منطقة الفيديو */
        .video-stage {
            flex: 1;
            position: relative;
            background: #0a0f12;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #remote-video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0e1a1f;
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a2a2a;
            transition: opacity 0.3s;
        }

        #local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 180px;
            border-radius: var(--radius-sm);
            border: 3px solid var(--primary-light);
            object-fit: cover;
            background: #2a3a3a;
            z-index: 15;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }

        .audio-only-ui {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            background: radial-gradient(circle at center, var(--bg-dark), var(--bg-darker));
        }

        .avatar-remote {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            color: white;
            margin-bottom: 25px;
            border: 5px solid var(--primary-light);
            box-shadow: var(--shadow-lg);
        }

        .remote-name {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .call-duration {
            font-size: 1.3rem;
            color: var(--primary-light);
            margin-bottom: 15px;
            font-variant-numeric: tabular-nums;
        }

        .call-status-badge {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* شريط التحكم السفلي */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 15px 20px 25px;
            background: rgba(11, 20, 23, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 20;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 11px;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }
        .ctrl-btn i { width: 24px; height: 24px; }
        .ctrl-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .ctrl-btn.active { background: var(--primary); }
        .ctrl-btn.danger { background: var(--danger); }
        .ctrl-btn.danger:hover { background: #c0392b; }

        .end-call-btn {
            width: 70px;
            height: 70px;
            border-radius: 40px;
            background: var(--danger);
            font-size: 14px;
        }

        /* قائمة إضافية (إعدادات) */
        .settings-panel {
            position: absolute;
            bottom: 100px;
            right: 20px;
            background: rgba(23, 37, 42, 0.95);
            backdrop-filter: blur(15px);
            border-radius: var(--radius);
            padding: 15px;
            border: 1px solid var(--primary-light);
            box-shadow: var(--shadow-lg);
            z-index: 25;
            min-width: 200px;
            display: none;
        }
        .settings-panel.show { display: block; }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .setting-item:last-child { border: none; }

        /* تنبيهات Toast محسنة */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: var(--gray-800);
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            backdrop-filter: blur(8px);
            pointer-events: auto;
            animation: slideIn 0.3s;
            border-right: 6px solid var(--primary);
        }
        .toast.error { border-right-color: var(--danger); background: #2c1a1a; }
        .toast.success { border-right-color: var(--success); }
        .toast.warning { border-right-color: var(--warning); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* إحصائيات الشبكة */
        .network-stats {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            color: #ccc;
            z-index: 15;
        }

        /* استعلامات الوسائط للجوال */
        @media (max-width: 600px) {
            #local-video { width: 90px; height: 140px; bottom: 15px; right: 15px; }
            .ctrl-btn { width: 50px; height: 50px; font-size: 9px; }
            .end-call-btn { width: 65px; height: 65px; }
            .avatar-remote { width: 110px; height: 110px; font-size: 3rem; }
            .remote-name { font-size: 1.8rem; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- شاشة التحميل / الحالة -->
<div id="loadingScreen" class="loading-screen">
    <div class="pulse-ring"></div>
    <div class="loading-title">سُكُون</div>
    <div class="loading-subtitle" id="loadingMessage">جاري تجهيز المكالمة...</div>
    <div class="loading-progress">
        <div class="loading-progress-bar"></div>
    </div>
    <div id="errorContainer" class="error-panel hidden"></div>
    <button id="retryBtn" class="btn-retry hidden">إعادة المحاولة</button>
</div>

<!-- واجهة المكالمة -->
<div id="callInterface" class="call-interface">
    <!-- إحصائيات الشبكة -->
    <div id="networkStats" class="network-stats hidden">
        <span id="networkQuality">📶 ممتاز</span> | <span id="callTimer">00:00</span>
    </div>

    <div class="video-stage">
        <div id="remote-video-container">
            <video id="remote-video" autoplay playsinline></video>
        </div>
        <video id="local-video" autoplay playsinline muted></video>

        <!-- واجهة الصوت فقط -->
        <div id="audioOnlyContainer" class="audio-only-ui hidden">
            <div class="avatar-remote" id="remoteAvatar">ط</div>
            <div class="remote-name" id="remoteDisplayName">طبيب</div>
            <div class="call-duration" id="audioCallTimer">00:00</div>
            <div class="call-status-badge" id="callStateBadge">متصل • صوت</div>
        </div>
    </div>

    <!-- شريط التحكم -->
    <div class="controls-bar">
        <button class="ctrl-btn" id="toggleMicBtn" title="كتم الصوت">
            <i data-feather="mic"></i>
            <span>كتم</span>
        </button>
        <button class="ctrl-btn" id="toggleVideoBtn" title="إيقاف الفيديو">
            <i data-feather="video"></i>
            <span>فيديو</span>
        </button>
        <button class="ctrl-btn" id="switchCameraBtn" title="تبديل الكاميرا">
            <i data-feather="refresh-cw"></i>
            <span>عكس</span>
        </button>
        <button class="ctrl-btn" id="screenShareBtn" title="مشاركة الشاشة">
            <i data-feather="monitor"></i>
            <span>مشاركة</span>
        </button>
        <button class="ctrl-btn danger end-call-btn" id="hangupBtn" title="إنهاء">
            <i data-feather="phone-off"></i>
            <span>إنهاء</span>
        </button>
    </div>
</div>

<!-- لوحة الإعدادات السريعة -->
<div id="settingsPanel" class="settings-panel">
    <div class="setting-item">
        <span>جودة الفيديو</span>
        <select id="videoQualitySelect">
            <option value="high">عالية (HD)</option>
            <option value="medium" selected>متوسطة</option>
            <option value="low">منخفضة (توفير بيانات)</option>
        </select>
    </div>
    <div class="setting-item">
        <span>وضع توفير البيانات</span>
        <input type="checkbox" id="dataSaverCheckbox">
    </div>
</div>

<!-- حاوية Toast -->
<div id="toastContainer" class="toast-container"></div>

<script type="module">
    // ==================== استيراد Firebase ====================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // إعدادات Firebase (خاصة بمشروع سُكُون)
    const firebaseConfig = {
        apiKey: "AIzaSyAx0wVqtIYHbFNgZ3_Wr6ViemAJ7BwMOkw",
        authDomain: "sakina-937c4.firebaseapp.com",
        databaseURL: "https://sakina-937c4-default-rtdb.firebaseio.com",
        projectId: "sakina-937c4",
        storageBucket: "sakina-937c4.firebasestorage.app",
        messagingSenderId: "25215790734",
        appId: "1:25215790734:web:46c5d893d5818530b3a3df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    // أيقونات Feather
    feather.replace();

    // ==================== إعدادات Agora ====================
    const AGORA_APP_ID = '13534a183d7941c2b324b5c29c15ca8a'; // المفتاح الجديد
    
    // ==================== متغيرات عامة ====================
    // عناصر DOM
    const loadingScreen = document.getElementById('loadingScreen');
    const callInterface = document.getElementById('callInterface');
    const remoteVideo = document.getElementById('remote-video');
    const localVideo = document.getElementById('local-video');
    const audioOnlyContainer = document.getElementById('audioOnlyContainer');
    const remoteDisplayName = document.getElementById('remoteDisplayName');
    const remoteAvatar = document.getElementById('remoteAvatar');
    const callStateBadge = document.getElementById('callStateBadge');
    const audioCallTimer = document.getElementById('audioCallTimer');
    const networkStats = document.getElementById('networkStats');
    const networkQualitySpan = document.getElementById('networkQuality');
    const callTimerSpan = document.getElementById('callTimer');
    const loadingMessage = document.getElementById('loadingMessage');
    const errorContainer = document.getElementById('errorContainer');
    const retryBtn = document.getElementById('retryBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const toastContainer = document.getElementById('toastContainer');

    // أزرار التحكم
    const toggleMicBtn = document.getElementById('toggleMicBtn');
    const toggleVideoBtn = document.getElementById('toggleVideoBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const screenShareBtn = document.getElementById('screenShareBtn');
    const hangupBtn = document.getElementById('hangupBtn');

    // معلمات URL
    const urlParams = new URLSearchParams(window.location.search);
    let callType = urlParams.get('type') || 'audio'; // 'audio' أو 'video'
    const doctorId = urlParams.get('doctorId');
    const patientId = urlParams.get('patientId');
    const role = urlParams.get('role') || 'caller';
    const callIdFromUrl = urlParams.get('callId');

    // حالة المكالمة
    let localUid = null;
    let remoteUid = null;
    let callId = null;
    let channelName = null;
    let agoraClient = null;
    let localAudioTrack = null;
    let localVideoTrack = null;
    let localScreenTrack = null;
    let isAudioMuted = false;
    let isVideoMuted = false;
    let isScreenSharing = false;
    let remoteUsers = new Map();
    let callStartTime = null;
    let callTimerInterval = null;
    let networkStatsInterval = null;
    let currentCameraId = null;
    let cameras = [];

    // إعدادات الجودة
    let videoQuality = 'medium'; // high, medium, low
    let dataSaverEnabled = false;

    // ==================== دوال مساعدة ====================
    function showToast(message, type = 'info', duration = 4000) {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i data-feather="${type === 'error' ? 'alert-circle' : (type === 'success' ? 'check-circle' : 'info')}"></i><span>${message}</span>`;
        toastContainer.appendChild(toast);
        feather.replace();
        setTimeout(() => toast.remove(), duration);
    }

    function updateLoadingMessage(msg, isError = false) {
        loadingMessage.textContent = msg;
        if (isError) {
            loadingMessage.style.color = 'var(--danger)';
            errorContainer.classList.remove('hidden');
            errorContainer.textContent = msg;
            retryBtn.classList.remove('hidden');
        } else {
            loadingMessage.style.color = '';
            errorContainer.classList.add('hidden');
            retryBtn.classList.add('hidden');
        }
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function startCallTimer() {
        if (callTimerInterval) clearInterval(callTimerInterval);
        callStartTime = Date.now();
        callTimerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const formatted = formatTime(elapsed);
            callTimerSpan.textContent = formatted;
            audioCallTimer.textContent = formatted;
        }, 1000);
    }

    function stopCallTimer() {
        if (callTimerInterval) {
            clearInterval(callTimerInterval);
            callTimerInterval = null;
        }
    }

    // تحديث إحصائيات الشبكة
    function startNetworkMonitoring() {
        if (!agoraClient) return;
        networkStats.classList.remove('hidden');
        networkStatsInterval = setInterval(async () => {
            try {
                const stats = agoraClient.getRTCStats();
                const localStats = agoraClient.getLocalVideoStats();
                const remoteStats = agoraClient.getRemoteVideoStats();
                // تقييم بسيط للجودة
                let quality = 'ممتاز';
                if (remoteStats && remoteStats.receiveFrameRate < 10) quality = 'ضعيف';
                else if (remoteStats && remoteStats.receiveFrameRate < 20) quality = 'متوسط';
                networkQualitySpan.textContent = `📶 ${quality}`;
            } catch (e) {}
        }, 2000);
    }

    function stopNetworkMonitoring() {
        if (networkStatsInterval) {
            clearInterval(networkStatsInterval);
            networkStatsInterval = null;
        }
        networkStats.classList.add('hidden');
    }

    // الحصول على رمز Agora مميز (في الإنتاج: استدعاء Cloud Function)
    async function fetchAgoraToken(channel, uid) {
        // للتطوير: إذا كانت شهادة المصادقة معطلة في لوحة تحكم Agora، يمكن إرجاع null
        // في الإنتاج: استبدل هذا بدالة تستدعي خادمك للحصول على token
        return null;
    }

    // إنشاء اسم قناة آمن
    function generateValidChannelName(docId, patId) {
        const input = `${docId}_${patId}`;
        let hash = 0;
        for (let i = 0; i < input.length; i++) {
            hash = ((hash << 5) - hash) + input.charCodeAt(i);
            hash |= 0;
        }
        const timestamp = Date.now().toString(36);
        return `sakoon_${Math.abs(hash).toString(36)}_${timestamp}`;
    }

    // ==================== إدارة Agora ====================
    async function initializeAgoraClient() {
        agoraClient = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
        
        agoraClient.on('user-published', async (user, mediaType) => {
            await agoraClient.subscribe(user, mediaType);
            remoteUsers.set(user.uid, user);
            
            if (mediaType === 'video') {
                const videoTrack = user.videoTrack;
                if (videoTrack) {
                    videoTrack.play('remote-video');
                    audioOnlyContainer.classList.add('hidden');
                    remoteVideo.parentElement.style.display = 'flex';
                }
                callStateBadge.textContent = 'متصل • فيديو';
            } else if (mediaType === 'audio') {
                user.audioTrack?.play();
            }
            showToast(`انضم ${formatName(user.uid)} إلى المكالمة`, 'success', 2000);
        });

        agoraClient.on('user-unpublished', (user, mediaType) => {
            if (mediaType === 'video') {
                remoteVideo.srcObject = null;
                if (callType === 'audio' || !remoteUsers.has(user.uid)?.videoTrack) {
                    audioOnlyContainer.classList.remove('hidden');
                    remoteVideo.parentElement.style.display = 'none';
                }
            }
        });

        agoraClient.on('user-left', (user) => {
            remoteUsers.delete(user.uid);
            showToast(`غادر ${formatName(user.uid)} المكالمة`, 'warning', 2000);
            if (remoteUsers.size === 0) {
                callStateBadge.textContent = 'في انتظار الطرف الآخر...';
            }
        });

        agoraClient.on('connection-state-change', (curState, prevState) => {
            console.log(`Connection state: ${prevState} -> ${curState}`);
            if (curState === 'DISCONNECTED') {
                showToast('انقطع الاتصال بالخادم', 'error');
            } else if (curState === 'CONNECTED') {
                startNetworkMonitoring();
                startCallTimer();
            }
        });

        agoraClient.on('exception', (event) => {
            console.error('Agora exception:', event);
            showToast(`خطأ: ${event.message}`, 'error');
        });
    }

    async function createLocalTracks() {
        const audioConfig = { echoCancellation: true, noiseSuppression: true, autoGainControl: true };
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack(audioConfig);
        
        if (callType === 'video' && !isVideoMuted) {
            const videoConfig = {
                facingMode: 'user',
                encoderConfig: videoQuality === 'high' ? '1080p' : (videoQuality === 'medium' ? '720p' : '480p'),
                optimizationMode: dataSaverEnabled ? 'motion' : 'detail'
            };
            localVideoTrack = await AgoraRTC.createCameraVideoTrack(videoConfig);
            localVideoTrack.play('local-video');
            // الحصول على قائمة الكاميرات
            cameras = await AgoraRTC.getCameras();
            currentCameraId = localVideoTrack.getTrackLabel();
        }
    }

    async function publishTracks() {
        const tracks = [localAudioTrack];
        if (localVideoTrack) tracks.push(localVideoTrack);
        if (localScreenTrack) tracks.push(localScreenTrack);
        await agoraClient.publish(tracks);
        if (localVideoTrack) {
            remoteVideo.parentElement.style.display = 'flex';
            audioOnlyContainer.classList.add('hidden');
        } else {
            audioOnlyContainer.classList.remove('hidden');
            remoteVideo.parentElement.style.display = 'none';
        }
    }

    async function joinChannel() {
        const token = await fetchAgoraToken(channelName, localUid);
        const uid = await agoraClient.join(AGORA_APP_ID, channelName, token, localUid);
        localUid = uid;
        console.log(`Joined channel ${channelName} with uid ${uid}`);
    }

    async function startCall() {
        try {
            updateLoadingMessage('إنشاء اتصال Agora...');
            await initializeAgoraClient();
            
            updateLoadingMessage('الوصول إلى الكاميرا والميكروفون...');
            await createLocalTracks();
            
            updateLoadingMessage('الانضمام إلى قناة الاتصال...');
            await joinChannel();
            
            updateLoadingMessage('نشر المسارات المحلية...');
            await publishTracks();
            
            // إظهار الواجهة
            loadingScreen.classList.add('hidden');
            callInterface.classList.add('active');
            
            showToast('تم بدء المكالمة بنجاح', 'success');
        } catch (error) {
            console.error('فشل بدء المكالمة:', error);
            updateLoadingMessage(`فشل بدء المكالمة: ${error.message}`, true);
        }
    }

    async function leaveCall() {
        stopCallTimer();
        stopNetworkMonitoring();
        
        if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); }
        if (localVideoTrack) { localVideoTrack.stop(); localVideoTrack.close(); }
        if (localScreenTrack) { localScreenTrack.stop(); localScreenTrack.close(); }
        
        if (agoraClient) {
            agoraClient.removeAllListeners();
            await agoraClient.leave();
            agoraClient = null;
        }
        
        if (callId) {
            await update(ref(db, `calls/${callId}`), { status: 'ended', endedAt: Date.now() });
        }
        
        const returnUrl = role === 'caller' ? `doctor-conversation.html?patientId=${patientId}` : `conversation.html?doctorId=${doctorId}`;
        window.location.href = returnUrl;
    }

    function formatName(uid) {
        if (uid === doctorId) return 'الطبيب';
        if (uid === patientId) return 'المريض';
        return 'مستخدم';
    }

    // ==================== تفاعلات الأزرار ====================
    toggleMicBtn.addEventListener('click', async () => {
        if (localAudioTrack) {
            isAudioMuted = !isAudioMuted;
            await localAudioTrack.setEnabled(!isAudioMuted);
            toggleMicBtn.classList.toggle('active', isAudioMuted);
            toggleMicBtn.querySelector('span').textContent = isAudioMuted ? 'إلغاء الكتم' : 'كتم';
            feather.replace();
        }
    });

    toggleVideoBtn.addEventListener('click', async () => {
        if (callType === 'audio') {
            showToast('المكالمة صوتية فقط', 'warning');
            return;
        }
        if (localVideoTrack) {
            isVideoMuted = !isVideoMuted;
            await localVideoTrack.setEnabled(!isVideoMuted);
            toggleVideoBtn.classList.toggle('active', isVideoMuted);
            toggleVideoBtn.querySelector('span').textContent = isVideoMuted ? 'تشغيل الفيديو' : 'إيقاف';
            localVideoTrack.play('local-video', { mirror: !isVideoMuted });
            feather.replace();
        } else if (!isVideoMuted) {
            // محاولة تشغيل الكاميرا من جديد
            try {
                localVideoTrack = await AgoraRTC.createCameraVideoTrack();
                localVideoTrack.play('local-video');
                await agoraClient.publish(localVideoTrack);
                isVideoMuted = false;
                toggleVideoBtn.classList.remove('active');
                toggleVideoBtn.querySelector('span').textContent = 'إيقاف';
            } catch (e) {
                showToast('تعذر تشغيل الكاميرا', 'error');
            }
        }
    });

    switchCameraBtn.addEventListener('click', async () => {
        if (!localVideoTrack || cameras.length < 2) {
            showToast('لا توجد كاميرا أخرى', 'warning');
            return;
        }
        try {
            const newCameraId = cameras.find(c => c.deviceId !== currentCameraId)?.deviceId;
            if (newCameraId) {
                await localVideoTrack.setDevice(newCameraId);
                currentCameraId = newCameraId;
                showToast('تم تبديل الكاميرا', 'success');
            }
        } catch (e) {
            showToast('فشل تبديل الكاميرا', 'error');
        }
    });

    screenShareBtn.addEventListener('click', async () => {
        if (isScreenSharing) {
            if (localScreenTrack) {
                await agoraClient.unpublish(localScreenTrack);
                localScreenTrack.stop();
                localScreenTrack.close();
                localScreenTrack = null;
            }
            isScreenSharing = false;
            screenShareBtn.classList.remove('active');
            showToast('تم إيقاف مشاركة الشاشة');
        } else {
            try {
                localScreenTrack = await AgoraRTC.createScreenVideoTrack({}, 'auto');
                await agoraClient.publish(localScreenTrack);
                isScreenSharing = true;
                screenShareBtn.classList.add('active');
                showToast('بدأت مشاركة الشاشة', 'success');
                localScreenTrack.on('track-ended', () => {
                    isScreenSharing = false;
                    screenShareBtn.classList.remove('active');
                    showToast('انتهت مشاركة الشاشة');
                });
            } catch (e) {
                showToast('فشل بدء مشاركة الشاشة', 'error');
            }
        }
    });

    hangupBtn.addEventListener('click', leaveCall);
    retryBtn.addEventListener('click', () => window.location.reload());

    // ==================== تهيئة Firebase والمكالمة ====================
    async function initPage() {
        const user = auth.currentUser;
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        localUid = user.uid;
        remoteUid = role === 'caller' ? patientId : doctorId;
        
        const remoteName = formatName(remoteUid);
        remoteDisplayName.textContent = remoteName;
        remoteAvatar.textContent = remoteName.charAt(0);
        
        channelName = generateValidChannelName(doctorId, patientId);
        console.log('Channel name:', channelName);

        if (role === 'caller') {
            callId = `${doctorId}_${patientId}_${Date.now()}`;
            await set(ref(db, `calls/${callId}`), {
                caller: doctorId,
                callee: patientId,
                type: callType,
                status: 'ringing',
                channelName: channelName,
                createdAt: Date.now()
            });
            
            onValue(ref(db, `calls/${callId}/status`), (snap) => {
                const status = snap.val();
                if (status === 'rejected') {
                    showToast('تم رفض المكالمة', 'error');
                    setTimeout(leaveCall, 2000);
                } else if (status === 'answered') {
                    updateLoadingMessage('تم الرد، جاري الاتصال...');
                }
            });
            
            await startCall();
        } else {
            if (callIdFromUrl) {
                callId = callIdFromUrl;
                const snap = await get(ref(db, `calls/${callId}`));
                if (snap.exists()) {
                    const callData = snap.val();
                    callType = callData.type || 'audio';
                    channelName = callData.channelName || channelName;
                    if (callData.status === 'ringing') {
                        await update(ref(db, `calls/${callId}`), { status: 'answered' });
                    }
                    await startCall();
                } else {
                    updateLoadingMessage('المكالمة غير موجودة', true);
                }
            } else {
                updateLoadingMessage('معرف المكالمة مفقود', true);
            }
        }
    }

    onAuthStateChanged(auth, (user) => {
        if (user) initPage();
        else window.location.href = 'index.html';
    });

    window.addEventListener('beforeunload', () => {
        if (callId) update(ref(db, `calls/${callId}`), { status: 'ended' });
    });
</script>
</body>
</html>
