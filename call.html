<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — مكالمة مباشرة</title>
    
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>

    <style>
        :root { --teal: #5aabab; --dark: #0f1a1a; --danger: #e05252; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* منطقة الفيديو */
        .video-grid { flex: 1; position: relative; background: #000; }
        #remote-player { width: 100%; height: 100%; object-fit: cover; }
        #local-player { 
            position: absolute; bottom: 20px; left: 20px; width: 120px; height: 160px; 
            border: 2px solid var(--teal); border-radius: 10px; z-index: 10; background: #222;
        }

        /* شريط التحكم */
        .controls { height: 90px; display: flex; justify-content: center; align-items: center; gap: 20px; background: #162525; }
        .btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: white; cursor: pointer; }
        .btn.active { background: var(--teal); }
        .btn-end { background: var(--danger); width: 60px; height: 60px; }
        
        #info { position: fixed; top: 10px; width: 100%; text-align: center; color: var(--teal); z-index: 100; }
    </style>
</head>
<body>

    <div id="info">جاري التحضير...</div>

    <div class="video-grid">
        <div id="remote-player"></div>
        <div id="local-player"></div>
    </div>

    <div class="controls">
        <button class="btn" id="mic-btn" onclick="toggleMic()"><i data-feather="mic"></i></button>
        <button class="btn btn-end" onclick="leave()"><i data-feather="phone-off"></i></button>
        <button class="btn" id="vid-btn" onclick="toggleVid()"><i data-feather="video"></i></button>
    </div>

<script>
    // الإعدادات (باستخدام مفتاح المشروع الأصفر)
    const APP_ID = "dcab084bed5243959e742a73de3c8f2d"; 
    const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

    let localTracks = { video: null, audio: null };
    
    // الحصول على البيانات من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const channelName = urlParams.get('channel') || "default_room";

    async function start() {
        try {
            // الانضمام باستخدام App ID فقط (بدون Token لأن المشروع أصفر)
            await client.join(APP_ID, channelName, null, null);

            // فتح المايك والكاميرا
            localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
            localTracks.video = await AgoraRTC.createCameraVideoTrack();

            // عرض فيديو المستخدم الحالي
            localTracks.video.play('local-player');

            // نشر البث للطرف التاني
            await client.publish([localTracks.audio, localTracks.video]);

            document.getElementById('info').innerText = "أنت متصل الآن بالقناة: " + channelName;
        } catch (e) {
            document.getElementById('info').innerText = "خطأ: تأكد من تشغيل HTTPS أو Localhost";
            console.error(e);
        }
    }

    // استقبال فيديو الطرف التاني
    client.on("user-published", async (user, mediaType) => {
        await client.subscribe(user, mediaType);
        if (mediaType === "video") {
            user.videoTrack.play("remote-player");
        }
        if (mediaType === "audio") {
            user.audioTrack.play();
        }
    });

    // وظائف الأزرار
    async function toggleMic() {
        if (!localTracks.audio.muted) {
            await localTracks.audio.setMuted(true);
            document.getElementById('mic-btn').classList.remove('active');
        } else {
            await localTracks.audio.setMuted(false);
            document.getElementById('mic-btn').classList.add('active');
        }
    }

    async function toggleVid() {
        if (!localTracks.video.muted) {
            await localTracks.video.setMuted(true);
            document.getElementById('local-player').style.display = 'none';
        } else {
            await localTracks.video.setMuted(false);
            document.getElementById('local-player').style.display = 'block';
        }
    }

    async function leave() {
        localTracks.audio.stop(); localTracks.audio.close();
        localTracks.video.stop(); localTracks.video.close();
        await client.leave();
        window.history.back();
    }

    window.onload = () => { start(); feather.replace(); };
</script>
</body>
</html>
