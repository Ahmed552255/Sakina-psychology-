<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سُكُون — أجندتي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #98D8D8;
            --accent: #5aabab;
            --accent-dark: #3d8a8a;
            --bg: #eef6f6;
            --white: #fff;
            --ink: #2c3e50;
            --text-sec: #7f8c8d;
            --danger: #ff6b6b;
            --success: #4caf93;
            --warn: #f0a500;
            --appt: #f3a683;
            --task: #8e94f2;
            --grad: linear-gradient(135deg,#98D8D8,#5aabab);
            --shadow: 0 8px 32px rgba(90,171,171,.10);
            --shadow-lg: 0 20px 60px rgba(90,171,171,.20);
            --radius: 26px;
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-thumb{background:var(--primary);border-radius:10px;}
        body{background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--ink);min-height:100vh;overflow-x:hidden;padding-bottom:120px;}

        /* ── BG ORBS ── */
        .bg-c{position:fixed;inset:0;z-index:-1;overflow:hidden;}
        .bo{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orbF 30s infinite alternate;}
        .bo1{width:55vw;height:55vw;background:radial-gradient(circle,rgba(152,216,216,.16) 0%,transparent 70%);top:-18%;right:-12%;animation-duration:28s;}
        .bo2{width:40vw;height:40vw;background:radial-gradient(circle,rgba(90,171,171,.10) 0%,transparent 70%);bottom:-10%;left:-10%;animation-duration:36s;animation-direction:alternate-reverse;}
        @keyframes orbF{from{transform:translate(0,0) scale(1)}to{transform:translate(3%,5%) scale(1.07)}}

        /* ── HEADER ── */
        .ph{text-align:center;padding:48px 20px 18px;}
        .logo-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.78);backdrop-filter:blur(12px);border:1px solid rgba(152,216,216,.25);border-radius:20px;padding:10px 22px;box-shadow:var(--shadow);margin-bottom:14px;}
        .lb-i{width:32px;height:32px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;}
        .lb-t{font-size:18px;font-weight:900;color:var(--accent-dark);}
        .lb-t span{color:var(--primary);}
        .ph h1{font-size:2.2rem;font-weight:200;color:var(--accent);letter-spacing:5px;margin-bottom:5px;}
        .ph p{font-size:13px;color:var(--text-sec);}

        /* ── WRAP ── */
        .wrap{max-width:860px;margin:0 auto;padding:0 18px;}

        /* ── INSIGHTS STRIP ── */
        .insights-strip{display:flex;gap:10px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
        .insights-strip::-webkit-scrollbar{height:0;}
        .ins-chip{flex-shrink:0;background:rgba(255,255,255,.88);border-radius:18px;padding:14px 18px;text-align:center;box-shadow:var(--shadow);border:1px solid rgba(152,216,216,.12);min-width:100px;backdrop-filter:blur(8px);cursor:pointer;transition:transform .2s,box-shadow .2s;}
        .ins-chip:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
        .ic-val{font-size:1.5rem;font-weight:800;color:var(--accent);}
        .ic-lbl{font-size:10px;color:var(--text-sec);margin-top:3px;}

        /* ── CALENDAR CARD ── */
        .cal-card{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.95);padding:24px 20px;margin-bottom:20px;transition:box-shadow .3s;}
        .cal-card:hover{box-shadow:var(--shadow-lg);}

        .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
        .cal-header h2{font-size:17px;font-weight:700;color:var(--accent-dark);}
        .cal-nav{width:36px;height:36px;border:none;background:rgba(152,216,216,.14);color:var(--accent);border-radius:11px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;}
        .cal-nav:hover{background:rgba(152,216,216,.28);transform:scale(1.06);}

        .month-summary{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
        .ms-pill{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 11px;border-radius:20px;background:#f4fbfb;border:1px solid rgba(152,216,216,.2);color:var(--text-sec);}
        .ms-dot{width:7px;height:7px;border-radius:50%;}

        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;text-align:center;}
        .dn{font-size:11px;font-weight:700;color:var(--accent);opacity:.65;padding-bottom:6px;}

        .day{
            aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
            border-radius:14px;cursor:pointer;
            background:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.03);
            position:relative;border:2px solid transparent;font-size:.88rem;
            transition:transform .25s,box-shadow .25s,border-color .2s;
        }
        .day:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(152,216,216,.22);}
        .day.today{background:var(--grad);color:#fff;font-weight:700;box-shadow:0 6px 20px rgba(90,171,171,.35);}
        .day.selected{border-color:var(--accent);transform:scale(1.06);}
        .day.other-month{opacity:.22;pointer-events:none;background:transparent;box-shadow:none;}
        .mood-dot{position:absolute;top:4px;right:4px;font-size:11px;line-height:1;}
        .event-dots{position:absolute;bottom:4px;display:flex;gap:2px;}
        .ev-dot{width:5px;height:5px;border-radius:50%;}
        .ev-dot.appt{background:var(--appt);}
        .ev-dot.task{background:var(--task);}
        .ev-dot.completed{background:var(--success);}

        /* ── AGENDA AREA ── */
        .agenda-area{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.95);padding:22px 20px;margin-bottom:20px;display:none;animation:fadeUp .38s ease;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .agenda-title{font-size:16px;font-weight:700;color:var(--accent-dark);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}

        /* mood section */
        .mood-section{background:#f8fdfd;border-radius:18px;padding:16px;margin-bottom:16px;border:1px solid rgba(152,216,216,.15);}
        .sec-label{font-size:12px;font-weight:700;color:var(--text-sec);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
        .mood-emojis{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
        .moji{font-size:26px;cursor:pointer;transition:transform .25s,filter .25s;filter:grayscale(1);opacity:.45;}
        .moji:hover,.moji.sel{filter:grayscale(0);opacity:1;transform:scale(1.28);}
        .mood-note-inp{width:100%;padding:10px 14px;border-radius:13px;border:1.5px solid #e0ecec;outline:none;font-size:13px;font-family:inherit;background:#fff;color:var(--ink);resize:none;min-height:60px;transition:border .2s;}
        .mood-note-inp:focus{border-color:var(--primary);}
        .save-mood-btn{margin-top:8px;padding:9px 20px;border-radius:13px;border:none;background:var(--grad);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 12px rgba(90,171,171,.3);transition:transform .18s;}
        .save-mood-btn:hover{transform:translateY(-1px);}

        /* events list */
        .events-list{display:flex;flex-direction:column;gap:9px;max-height:340px;overflow-y:auto;padding:2px;}
        .ev-item{display:flex;align-items:center;gap:12px;padding:13px 15px;background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.04);border-right:5px solid;transition:transform .2s,box-shadow .2s;}
        .ev-item:hover{transform:translateX(-3px);box-shadow:0 5px 16px rgba(0,0,0,.07);}
        .ev-item.appt-item{border-color:var(--appt);}
        .ev-item.task-item{border-color:var(--task);}
        .ev-item.done{opacity:.5;}
        .ev-item.done .ev-title{text-decoration:line-through;}
        .ev-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
        .ev-icon.appt{background:rgba(243,166,131,.12);color:var(--appt);}
        .ev-icon.task{background:rgba(142,148,242,.12);color:var(--task);}
        .ev-body{flex:1;min-width:0;}
        .ev-title{font-size:14px;font-weight:700;margin-bottom:2px;}
        .ev-desc{font-size:12px;color:var(--text-sec);}
        .ev-time{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;}
        .ev-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(152,216,216,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s;flex-shrink:0;}
        .ev-check.done{background:var(--success);border-color:var(--success);color:#fff;}
        .ev-del{width:28px;height:28px;border:none;background:transparent;color:#ccc;cursor:pointer;font-size:13px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
        .ev-del:hover{background:rgba(255,107,107,.1);color:var(--danger);}
        .ev-empty{text-align:center;padding:28px;color:var(--text-sec);font-size:13px;}
        .ev-empty i{font-size:32px;color:#c8e6e6;display:block;margin-bottom:10px;}

        /* ── ADD BUTTONS INLINE ── */
        .add-btns-row{display:flex;gap:8px;margin-bottom:12px;}
        .add-inline-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:13px;border:1.5px solid rgba(152,216,216,.3);background:transparent;color:var(--text-sec);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;flex:1;justify-content:center;}
        .add-inline-btn:hover{border-color:var(--accent);color:var(--accent-dark);background:rgba(152,216,216,.08);}
        .add-inline-btn.appt{border-color:rgba(243,166,131,.4);color:var(--appt);}
        .add-inline-btn.appt:hover{background:rgba(243,166,131,.08);}

        /* ── FAB ── */
        .fab-wrap{position:fixed;bottom:86px;left:22px;z-index:500;}
        .fab{width:58px;height:58px;border-radius:50%;background:var(--grad);color:#fff;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(90,171,171,.42);transition:transform .3s,box-shadow .3s;}
        .fab:hover{transform:scale(1.1);box-shadow:0 10px 32px rgba(90,171,171,.54);}
        .fab.open{transform:rotate(45deg);}
        .fab-opts{position:absolute;bottom:68px;left:6px;display:flex;flex-direction:column;gap:10px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;transform:translateY(10px);}
        .fab-wrap.open .fab-opts{opacity:1;pointer-events:auto;transform:translateY(0);}
        .fab-opt{width:46px;height:46px;border-radius:50%;background:#fff;border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:transform .2s,background .2s;}
        .fab-opt.task-opt{color:var(--task);}
        .fab-opt.appt-opt{color:var(--appt);}
        .fab-opt:hover{transform:scale(1.1);background:var(--primary);color:#fff;}

        /* ── MODAL ── */
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.26);z-index:600;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(5px);}
        .modal-bg.open{opacity:1;pointer-events:auto;}
        .modal-sheet{background:#fff;border-radius:28px 28px 0 0;padding:22px 20px 40px;width:100%;max-width:520px;transform:translateY(100%);transition:transform .38s cubic-bezier(.25,.46,.45,.94);overflow-y:auto;max-height:92vh;}
        .modal-bg.open .modal-sheet{transform:translateY(0);}
        .sh-handle{width:38px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 16px;}
        .sh-title{font-size:16px;font-weight:800;color:var(--accent-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
        .sh-title i{color:var(--primary);}
        .form-label{font-size:12px;font-weight:700;color:var(--text-sec);margin-bottom:4px;display:block;}
        .form-input,.form-textarea{width:100%;padding:11px 14px;border-radius:13px;border:1.5px solid #e0ecec;outline:none;font-size:14px;font-family:inherit;background:#f8fdfd;color:var(--ink);transition:border .2s;margin-bottom:11px;}
        .form-input:focus,.form-textarea:focus{border-color:var(--primary);background:#fff;}
        .form-textarea{resize:vertical;min-height:70px;}
        .sh-cta{width:100%;padding:13px;border-radius:15px;border:none;background:var(--grad);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(90,171,171,.32);transition:transform .18s;}
        .sh-cta:hover{transform:translateY(-2px);}
        .sh-cta:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none;}

        /* type toggle in modal */
        .type-toggle{display:flex;gap:8px;margin-bottom:14px;}
        .tt-btn{flex:1;padding:10px;border-radius:13px;border:1.5px solid rgba(152,216,216,.28);background:transparent;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
        .tt-btn.task-t{color:var(--task);}
        .tt-btn.appt-t{color:var(--appt);}
        .tt-btn.sel.task-t{background:rgba(142,148,242,.12);border-color:var(--task);}
        .tt-btn.sel.appt-t{background:rgba(243,166,131,.12);border-color:var(--appt);}

        /* recurrence */
        .recur-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
        .rec-pill{font-size:11px;padding:5px 12px;border-radius:12px;border:1.5px solid rgba(152,216,216,.28);background:transparent;color:var(--text-sec);cursor:pointer;transition:all .2s;font-family:inherit;}
        .rec-pill.sel{background:var(--grad);color:#fff;border-color:transparent;}

        /* priority */
        .prio-row{display:flex;gap:7px;margin-bottom:12px;}
        .prio-btn{flex:1;padding:7px;border-radius:11px;border:1.5px solid;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
        .prio-btn.low{border-color:rgba(76,175,147,.3);color:var(--success);background:transparent;}
        .prio-btn.low.sel{background:var(--success);color:#fff;}
        .prio-btn.med{border-color:rgba(240,165,0,.3);color:var(--warn);background:transparent;}
        .prio-btn.med.sel{background:var(--warn);color:#fff;}
        .prio-btn.high{border-color:rgba(255,107,107,.3);color:var(--danger);background:transparent;}
        .prio-btn.high.sel{background:var(--danger);color:#fff;}

        /* ── TOAST ── */
        #toasts{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
        .toast{display:flex;align-items:center;gap:8px;background:rgba(44,62,80,.93);color:#fff;padding:10px 20px;border-radius:25px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.18);backdrop-filter:blur(10px);animation:tIn .3s ease,tOut .3s ease 2.7s forwards;white-space:nowrap;}
        .toast.ok{background:rgba(76,175,147,.94);}
        .toast.err{background:rgba(255,107,107,.94);}
        .toast.warn{background:rgba(240,165,0,.94);}
        @keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(10px)}}

        /* loading */
        .loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:9997;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .4s;}
        .loading-overlay.hide{opacity:0;pointer-events:none;}
        .loading-overlay i{font-size:36px;color:var(--primary);animation:spin 1s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-overlay p{font-size:14px;color:var(--text-sec);}

        /* ── BOTTOM NAV ── */
        .bnav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:460px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-radius:24px;display:flex;justify-content:space-around;align-items:center;padding:9px 6px;box-shadow:0 8px 36px rgba(0,0,0,.1);z-index:400;border:1px solid rgba(152,216,216,.18);}
        .navi{text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-sec);transition:color .2s;padding:4px 12px;border-radius:14px;position:relative;}
        .navi.active{color:var(--accent);}
        .navi i{font-size:20px;}
        .navi span{font-size:10px;font-weight:600;}
        .navi.active::after{content:'';position:absolute;bottom:-5px;width:20px;height:3px;border-radius:3px;background:var(--grad);}
    </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
    <i class="fas fa-spinner"></i>
    <p>جاري تحميل أجندتك...</p>
</div>

<div class="bg-c"><div class="bo bo1"></div><div class="bo bo2"></div></div>
<div id="toasts"></div>

<!-- ADD EVENT MODAL -->
<div class="modal-bg" id="addModal">
    <div class="modal-sheet">
        <div class="sh-handle"></div>
        <div class="sh-title" id="modalIcon"><i class="fas fa-plus"></i>إضافة حدث</div>

        <div class="type-toggle">
            <button class="tt-btn task-t sel" id="ttTask" onclick="A.setType('task')"><i class="fas fa-clipboard-check"></i>مهمة</button>
            <button class="tt-btn appt-t" id="ttAppt" onclick="A.setType('appt')"><i class="fas fa-user-doctor"></i>موعد مع الدكتور</button>
        </div>

        <label class="form-label">العنوان *</label>
        <input type="text" class="form-input" id="evTitle" placeholder="مثال: مراجعة ورقة بحثية">

        <label class="form-label">الوصف (اختياري)</label>
        <textarea class="form-textarea" id="evDesc" placeholder="تفاصيل..."></textarea>

        <label class="form-label">التاريخ *</label>
        <input type="date" class="form-input" id="evDate">

        <div id="evTimeRow">
            <label class="form-label">الوقت</label>
            <input type="time" class="form-input" id="evTime">
        </div>

        <label class="form-label">الأولوية</label>
        <div class="prio-row">
            <button class="prio-btn low" data-p="low" onclick="A.setPrio('low',this)">منخفضة</button>
            <button class="prio-btn med sel" data-p="med" onclick="A.setPrio('med',this)">متوسطة</button>
            <button class="prio-btn high" data-p="high" onclick="A.setPrio('high',this)">عالية</button>
        </div>

        <label class="form-label">التكرار</label>
        <div class="recur-row" id="recurRow">
            <button class="rec-pill sel" data-r="none" onclick="A.setRecur('none',this)">مرة واحدة</button>
            <button class="rec-pill" data-r="daily" onclick="A.setRecur('daily',this)">يومي</button>
            <button class="rec-pill" data-r="weekly" onclick="A.setRecur('weekly',this)">أسبوعي</button>
            <button class="rec-pill" data-r="monthly" onclick="A.setRecur('monthly',this)">شهري</button>
        </div>

        <button class="sh-cta" id="evSaveBtn" onclick="A.saveEvent()">
            <i class="fas fa-check" style="margin-left:6px"></i>حفظ الحدث
        </button>
    </div>
</div>

<!-- HEADER -->
<div class="ph">
    <div class="logo-badge">
        <div class="lb-i"><i class="fas fa-leaf"></i></div>
        <span class="lb-t">سُ<span>كُون</span></span>
    </div>
    <h1>أجندتي</h1>
    <p>منظّم ذكي لمواعيدك ومهامك</p>
</div>

<!-- MAIN -->
<div class="wrap">

    <!-- Insights -->
    <div class="insights-strip" id="insightsStrip"></div>

    <!-- Calendar -->
    <div class="cal-card">
        <div class="cal-header">
            <button class="cal-nav" onclick="A.changeMonth(-1)" aria-label="الشهر السابق"><i class="fas fa-chevron-right"></i></button>
            <h2 id="calTitle">—</h2>
            <button class="cal-nav" onclick="A.changeMonth(1)" aria-label="الشهر التالي"><i class="fas fa-chevron-left"></i></button>
        </div>
        <div class="month-summary" id="monthSummary"></div>
        <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Agenda Area -->
    <div class="agenda-area" id="agendaArea">
        <div class="agenda-title">
            <span id="agendaTitle">—</span>
            <span id="streakBadge" style="font-size:12px;color:var(--warn)"></span>
        </div>

        <!-- Mood section -->
        <div class="mood-section">
            <div class="sec-label"><i class="fas fa-heart-pulse" style="color:var(--primary)"></i>كيف حالك؟</div>
            <div class="mood-emojis">
                <span class="moji" data-m="😁" onclick="A.pickMood(this)">😁</span>
                <span class="moji" data-m="😊" onclick="A.pickMood(this)">😊</span>
                <span class="moji" data-m="😐" onclick="A.pickMood(this)">😐</span>
                <span class="moji" data-m="😔" onclick="A.pickMood(this)">😔</span>
                <span class="moji" data-m="😢" onclick="A.pickMood(this)">😢</span>
                <span class="moji" data-m="😰" onclick="A.pickMood(this)">😰</span>
                <span class="moji" data-m="😠" onclick="A.pickMood(this)">😠</span>
                <span class="moji" data-m="😌" onclick="A.pickMood(this)">😌</span>
            </div>
            <textarea class="mood-note-inp" id="moodNote" placeholder="ملاحظة لنفسك أو لطبيبك..."></textarea>
            <button class="save-mood-btn" onclick="A.saveMood()"><i class="fas fa-save" style="margin-left:5px"></i>حفظ الحالة</button>
        </div>

        <!-- Add inline -->
        <div class="add-btns-row">
            <button class="add-inline-btn task" onclick="A.openModal('task')"><i class="fas fa-plus"></i>إضافة مهمة</button>
            <button class="add-inline-btn appt" onclick="A.openModal('appt')"><i class="fas fa-user-doctor"></i>إضافة موعد</button>
        </div>

        <!-- Events list -->
        <div class="events-list" id="evList"></div>
    </div>

</div>

<!-- FAB -->
<div class="fab-wrap" id="fabWrap">
    <div class="fab-opts">
        <button class="fab-opt task-opt" onclick="A.openModal('task');A.closeFab()" title="إضافة مهمة"><i class="fas fa-clipboard-check"></i></button>
        <button class="fab-opt appt-opt" onclick="A.openModal('appt');A.closeFab()" title="إضافة موعد"><i class="fas fa-user-doctor"></i></button>
    </div>
    <button class="fab" id="mainFab" onclick="A.toggleFab()" aria-label="إضافة">
        <i class="fas fa-plus"></i>
    </button>
</div>

<!-- Firebase v8 compat -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>

<script>
const A = (() => {
    'use strict';

    // ── Firebase ──────────────────────────────────────────
    let db = null;
    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        db.settings({ merge: true });
    } catch(e) { console.warn('Firebase init failed:', e.message); }

    // ── Patient ID ────────────────────────────────────────
    const PID = (() => {
        let p = localStorage.getItem('sokoon_patient_id');
        if (!p) { p = 'pat_' + Math.random().toString(36).substr(2,9); localStorage.setItem('sokoon_patient_id', p); }
        return p;
    })();

    // ── Firestore refs ────────────────────────────────────
    const fsRef = {
        events: () => db?.collection('patients').doc(PID).collection('events'),
        moods:  () => db?.collection('patients').doc(PID).collection('moods'),
    };

    // ── Local cache ───────────────────────────────────────
    const STORE = 'sokoon_cal_v3';
    function loadLocal() {
        try { return JSON.parse(localStorage.getItem(STORE)) || { events:[], moods:{} }; }
        catch { return { events:[], moods:{} }; }
    }
    function saveLocal() { localStorage.setItem(STORE, JSON.stringify(DB)); }
    let DB = loadLocal();

    // ── State ─────────────────────────────────────────────
    let calDate  = new Date();
    let selDate  = new Date().toISOString().split('T')[0];
    let curMood  = null;
    let evType   = 'task';
    let evPrio   = 'med';
    let evRecur  = 'none';
    let fabOpen  = false;
    let unsubEvs = null, unsubMoods = null;

    // ── DOM ───────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    // ── Toast ─────────────────────────────────────────────
    function toast(msg, type='info') {
        const ic = { ok:'fa-check-circle', err:'fa-times-circle', warn:'fa-exclamation-circle', info:'fa-info-circle' };
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<i class="fas ${ic[type]||ic.info}"></i> ${msg}`;
        $('toasts').appendChild(t);
        setTimeout(() => t.remove(), 3300);
    }

    function fmtTime(t) {
        if (!t) return '';
        const d = new Date(`1970-01-01T${t}`);
        return d.toLocaleTimeString('ar-EG', { hour:'numeric', minute:'2-digit' });
    }
    function fmtDate(ds) {
        const d = new Date(ds + 'T00:00:00');
        const now = new Date(); const y = new Date(now); y.setDate(y.getDate()-1);
        if (d.toDateString()===now.toDateString()) return 'اليوم';
        if (d.toDateString()===y.toDateString())   return 'أمس';
        return d.toLocaleDateString('ar-EG', { weekday:'long', day:'numeric', month:'long' });
    }
    function today() { return new Date().toISOString().split('T')[0]; }

    // ── Real-time Firestore listeners ─────────────────────
    function subscribeAll() {
        if (!db) { hideLoader(); return; }

        // Events
        if (unsubEvs) unsubEvs();
        unsubEvs = fsRef.events().onSnapshot(snap => {
            const fsEvs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
            DB.events = fsEvs;
            saveLocal();
            render();
        }, err => {
            toast('خطأ في تحميل الأحداث: ' + err.message, 'err');
            render();
        });

        // Moods
        if (unsubMoods) unsubMoods();
        unsubMoods = fsRef.moods().onSnapshot(snap => {
            snap.docs.forEach(d => { DB.moods[d.id] = d.data(); });
            saveLocal();
            renderCal();
            renderMoodForDate(selDate);
            hideLoader();
        }, err => {
            toast('خطأ في تحميل المزاج: ' + err.message, 'err');
            hideLoader();
        });
    }

    // ── Calendar ──────────────────────────────────────────
    function renderCal() {
        const month = calDate.getMonth(), year = calDate.getFullYear();
        $('calTitle').textContent = `${calDate.toLocaleString('ar-EG', { month:'long' })} ${year}`;
        const grid = $('calGrid'); grid.innerHTML = '';

        ['أحد','إثن','ثلا','أرب','خمس','جمع','سبت'].forEach(n => {
            const d = document.createElement('div'); d.className='dn'; d.textContent=n; grid.appendChild(d);
        });

        const first = new Date(year, month, 1).getDay();
        const days  = new Date(year, month+1, 0).getDate();

        for(let i=0;i<first;i++){
            const el=document.createElement('div'); el.className='day other-month'; grid.appendChild(el);
        }

        const td = today();
        for(let i=1;i<=days;i++){
            const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const evs=DB.events.filter(e=>isOnDate(e,ds));
            const mood=DB.moods[ds];

            const el=document.createElement('div'); el.className='day';
            if(ds===td)    el.classList.add('today');
            if(ds===selDate) el.classList.add('selected');

            const num=document.createElement('span'); num.textContent=i; el.appendChild(num);

            if(mood){ const md=document.createElement('div'); md.className='mood-dot'; md.textContent=mood.emoji; el.appendChild(md); }

            const hasTask  = evs.some(e=>e.type==='task'&&!e.completed);
            const hasAppt  = evs.some(e=>e.type==='appt');
            const hasDone  = evs.some(e=>e.type==='task'&&e.completed);
            if(hasTask||hasAppt||hasDone){
                const dots=document.createElement('div'); dots.className='event-dots';
                if(hasTask)  dots.innerHTML+=`<div class="ev-dot task"></div>`;
                if(hasAppt)  dots.innerHTML+=`<div class="ev-dot appt"></div>`;
                if(hasDone)  dots.innerHTML+=`<div class="ev-dot completed"></div>`;
                el.appendChild(dots);
            }

            el.addEventListener('click', () => selectDate(ds));
            grid.appendChild(el);
        }

        renderMonthSummary();
    }

    function isOnDate(ev, ds) {
        if (ev.date === ds) return true;
        if (!ev.recur || ev.recur==='none') return false;
        const evD = new Date(ev.date+'T00:00:00');
        const chkD = new Date(ds+'T00:00:00');
        if (chkD < evD) return false;
        if (ev.recur==='daily')  return true;
        if (ev.recur==='weekly') return evD.getDay()===chkD.getDay();
        if (ev.recur==='monthly') return evD.getDate()===chkD.getDate();
        return false;
    }

    function renderMonthSummary() {
        const month=calDate.getMonth(), year=calDate.getFullYear();
        const monthEvs=DB.events.filter(e=>{
            const [y,m]=e.date.split('-').map(Number); return y===year&&m===month+1;
        });
        const appts=monthEvs.filter(e=>e.type==='appt').length;
        const tasks=monthEvs.filter(e=>e.type==='task').length;
        const done =monthEvs.filter(e=>e.type==='task'&&e.completed).length;
        const moodDays=Object.keys(DB.moods).filter(k=>k.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).length;
        $('monthSummary').innerHTML=`
            <div class="ms-pill"><div class="ms-dot" style="background:var(--appt)"></div>${appts} موعد</div>
            <div class="ms-pill"><div class="ms-dot" style="background:var(--task)"></div>${tasks} مهمة</div>
            <div class="ms-pill"><div class="ms-dot" style="background:var(--success)"></div>${done} منجزة</div>
            <div class="ms-pill"><div class="ms-dot" style="background:var(--primary)"></div>${moodDays} يوم مسجّل</div>`;
    }

    function changeMonth(off) { calDate.setMonth(calDate.getMonth()+off); renderCal(); }

    function selectDate(ds) {
        selDate=ds;
        renderCal();
        showAgenda(ds);
    }

    // ── Agenda ────────────────────────────────────────────
    function showAgenda(ds) {
        $('agendaTitle').textContent = fmtDate(ds);
        $('agendaArea').style.display='block';
        renderMoodForDate(ds);
        renderEventsForDate(ds);
        renderStreakBadge();
        setTimeout(()=>$('agendaArea').scrollIntoView({behavior:'smooth',block:'start'}),80);
    }

    function renderMoodForDate(ds) {
        const m = DB.moods[ds];
        curMood = m?.emoji || null;
        document.querySelectorAll('.moji').forEach(el => {
            el.classList.toggle('sel', el.dataset.m === curMood);
        });
        $('moodNote').value = m?.note || '';
    }

    function renderEventsForDate(ds) {
        const list = $('evList'); list.innerHTML='';
        const evs = DB.events.filter(e=>isOnDate(e,ds)).sort((a,b)=>(a.time||'zzz').localeCompare(b.time||'zzz'));
        if(!evs.length){
            list.innerHTML=`<div class="ev-empty"><i class="fas fa-calendar-day"></i>لا توجد أحداث لهذا اليوم.</div>`; return;
        }
        const PRIO_ICON = {high:'🔴',med:'🟡',low:'🟢'};
        evs.forEach(ev=>{
            const isTask=ev.type==='task';
            const div=document.createElement('div');
            div.className=`ev-item ${isTask?'task-item':'appt-item'}${ev.completed?' done':''}`;
            div.innerHTML=`
                ${isTask?`<div class="ev-check${ev.completed?' done':''}" onclick="A.toggleDone('${ev.id}')">${ev.completed?'<i class="fas fa-check"></i>':''}</div>`
                         :`<div class="ev-icon appt"><i class="fas fa-user-doctor"></i></div>`}
                <div class="ev-icon ${isTask?'task':'appt'}">
                    ${isTask?'<i class="fas fa-clipboard-check"></i>':'<i class="fas fa-calendar-check"></i>'}
                </div>
                <div class="ev-body">
                    <div class="ev-title">${PRIO_ICON[ev.prio||'med']||''} ${ev.title}</div>
                    ${ev.desc?`<div class="ev-desc">${ev.desc}</div>`:''}
                    ${ev.recur&&ev.recur!=='none'?`<div class="ev-desc"><i class="fas fa-redo" style="font-size:9px"></i> ${ev.recur==='daily'?'يومي':ev.recur==='weekly'?'أسبوعي':'شهري'}</div>`:''}
                </div>
                ${ev.time?`<div class="ev-time">${fmtTime(ev.time)}</div>`:''}
                <button class="ev-del" onclick="A.deleteEvent('${ev.id}')" title="حذف"><i class="fas fa-trash"></i></button>`;
            list.appendChild(div);
        });
    }

    function renderStreakBadge() {
        const dates=Object.keys(DB.moods).sort((a,b)=>b.localeCompare(a));
        let streak=0; const now=new Date(today());
        for(let i=0;i<dates.length;i++){
            const d=new Date(dates[i]+'T00:00:00');
            const diff=Math.round((now-d)/(86400000));
            if(diff===i) streak++; else break;
        }
        $('streakBadge').textContent = streak>1 ? `🔥 ${streak} أيام متتالية` : '';
    }

    // ── Insights ──────────────────────────────────────────
    function renderInsights() {
        const total=DB.events.length;
        const done =DB.events.filter(e=>e.type==='task'&&e.completed).length;
        const appts=DB.events.filter(e=>e.type==='appt'&&e.date>=today()).length;
        const moodDays=Object.keys(DB.moods).length;
        $('insightsStrip').innerHTML=[
            {v:total,   l:'حدث إجمالي',   i:'fa-list'},
            {v:done,    l:'مهمة منجزة',    i:'fa-check-circle'},
            {v:appts,   l:'موعد قادم',     i:'fa-user-doctor'},
            {v:moodDays,l:'يوم مسجّل',     i:'fa-heart-pulse'},
        ].map(s=>`<div class="ins-chip"><div class="ic-val"><i class="fas ${s.i}" style="font-size:1rem;margin-left:4px"></i>${s.v}</div><div class="ic-lbl">${s.l}</div></div>`).join('');
    }

    function render() { renderCal(); renderInsights(); renderEventsForDate(selDate); }

    // ── Mood ──────────────────────────────────────────────
    function pickMood(el) {
        curMood = el.dataset.m;
        document.querySelectorAll('.moji').forEach(e => e.classList.remove('sel'));
        el.classList.add('sel');
    }

    async function saveMood() {
        if (!curMood) { toast('اختر حالتك المزاجية أولاً', 'warn'); return; }
        const data = { emoji: curMood, note: $('moodNote').value.trim(), savedAt: new Date().toISOString() };
        DB.moods[selDate] = data; saveLocal();
        renderCal(); renderStreakBadge(); renderInsights();
        toast('تم حفظ حالتك ✓', 'ok');

        if (db) {
            try {
                await fsRef.moods().doc(selDate).set(data);
                // Also write to patient-level mood summary for therapist
                await db.collection('patients').doc(PID).set({
                    lastMood: curMood,
                    lastMoodDate: selDate,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                }, { merge:true });
            } catch(e) { toast('خطأ في الحفظ السحابي', 'err'); }
        }
    }

    // ── Events CRUD ───────────────────────────────────────
    function openModal(type) {
        evType  = type || 'task';
        evPrio  = 'med';
        evRecur = 'none';
        $('evTitle').value=''; $('evDesc').value=''; $('evDate').value=selDate; $('evTime').value='';
        setType(evType);
        document.querySelectorAll('.prio-btn').forEach(b=>b.classList.toggle('sel',b.dataset.p==='med'));
        document.querySelectorAll('.rec-pill').forEach(b=>b.classList.toggle('sel',b.dataset.r==='none'));
        $('addModal').classList.add('open');
        setTimeout(()=>$('evTitle').focus(),300);
    }

    function setType(t) {
        evType=t;
        $('ttTask').classList.toggle('sel',t==='task');
        $('ttAppt').classList.toggle('sel',t==='appt');
        $('evTimeRow').style.display = t==='appt'?'block':'none';
        $('modalIcon').innerHTML=`<i class="fas ${t==='task'?'fa-clipboard-check':'fa-user-doctor'}"></i>${t==='task'?'إضافة مهمة':'إضافة موعد'}`;
    }

    function setPrio(p,btn) {
        evPrio=p;
        document.querySelectorAll('.prio-btn').forEach(b=>b.classList.remove('sel'));
        btn.classList.add('sel');
    }

    function setRecur(r,btn) {
        evRecur=r;
        document.querySelectorAll('.rec-pill').forEach(b=>b.classList.remove('sel'));
        btn.classList.add('sel');
    }

    async function saveEvent() {
        const title=$('evTitle').value.trim();
        const date=$('evDate').value;
        if(!title){toast('أدخل عنوان الحدث','err');return;}
        if(!date){toast('اختر تاريخاً','err');return;}

        const btn=$('evSaveBtn'); btn.disabled=true;
        btn.innerHTML='<i class="fas fa-spinner fa-spin" style="margin-left:6px"></i>جارٍ الحفظ...';

        const ev={
            id: Date.now().toString(),
            type: evType,
            title,
            desc: $('evDesc').value.trim(),
            date,
            time: $('evTime').value || null,
            prio: evPrio,
            recur: evRecur,
            completed: false,
            createdAt: new Date().toISOString(),
            patientId: PID,
        };

        DB.events.push(ev); saveLocal();
        $('addModal').classList.remove('open');
        selDate=date; renderCal(); renderInsights(); showAgenda(date);
        toast(`تم إضافة ${evType==='task'?'المهمة':'الموعد'} ✓`,'ok');

        if (db) {
            try {
                await fsRef.events().doc(ev.id).set(ev);
                // If it's an appointment, also notify the doctor
                if (evType==='appt') {
                    await db.collection('patients').doc(PID).set({
                        nextAppointment: date,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    },{merge:true});
                }
            } catch(e) { toast('خطأ في الحفظ السحابي','err'); }
        }

        btn.disabled=false;
        btn.innerHTML='<i class="fas fa-check" style="margin-left:6px"></i>حفظ الحدث';
    }

    async function toggleDone(id) {
        const idx=DB.events.findIndex(e=>e.id===id); if(idx<0) return;
        DB.events[idx].completed=!DB.events[idx].completed; saveLocal();
        renderCal(); renderInsights(); renderEventsForDate(selDate);
        if(db){ try{ await fsRef.events().doc(id).update({completed:DB.events[idx].completed}); }catch(e){} }
    }

    async function deleteEvent(id) {
        if(!confirm('حذف هذا الحدث؟')) return;
        DB.events=DB.events.filter(e=>e.id!==id); saveLocal();
        renderCal(); renderInsights(); renderEventsForDate(selDate);
        toast('تم الحذف','ok');
        if(db){ try{ await fsRef.events().doc(id).delete(); }catch(e){} }
    }

    // ── FAB ───────────────────────────────────────────────
    function toggleFab() {
        fabOpen=!fabOpen;
        $('fabWrap').classList.toggle('open',fabOpen);
        $('mainFab').classList.toggle('open',fabOpen);
    }
    function closeFab() { fabOpen=false; $('fabWrap').classList.remove('open'); $('mainFab').classList.remove('open'); }

    // Close modal on backdrop
    $('addModal').addEventListener('click',e=>{ if(e.target===$('addModal')) $('addModal').classList.remove('open'); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ $('addModal').classList.remove('open'); closeFab(); }});

    // ── Loading ───────────────────────────────────────────
    function hideLoader() { const l=$('loadingOverlay'); l.classList.add('hide'); setTimeout(()=>l.remove(),500); }

    // ── Init ──────────────────────────────────────────────
    function init() {
        renderCal(); renderInsights(); showAgenda(selDate);
        if (db) {
            subscribeAll();
        } else {
            toast('يعمل بدون اتصال — سيتم المزامنة لاحقاً','warn');
            hideLoader();
        }
    }

    init();

    return {
        changeMonth, selectDate, pickMood, saveMood,
        openModal, setType, setPrio, setRecur, saveEvent,
        toggleDone, deleteEvent, toggleFab, closeFab,
    };
})();
</script>
