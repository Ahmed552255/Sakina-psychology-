<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>سُكُون · أجندتي الذكية</title>

    <!-- تحميل الخط مع العرض الفوري -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== متغيرات التصميم الموحد ==================== */
        :root {
            --bg-primary: #f6faf9;
            --bg-secondary: #eef5f4;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --primary-50: #e6f3f3;
            --primary-100: #cce7e7;
            --primary-200: #99cfcf;
            --primary-300: #66b8b8;
            --primary-400: #3da0a0;
            --primary-500: #2a8888;
            --primary-600: #1f6f6f;
            --primary-700: #165656;
            --primary-800: #0d3d3d;
            --primary-900: #062424;
            --text-primary: #1a2e2e;
            --text-secondary: #3d5a5a;
            --text-tertiary: #6b8a8a;
            --danger: #d94f4f;
            --success: #2ecc71;
            --warning: #f4b740;
            --appt-color: #f3a683;
            --task-color: #8e94f2;
            --shadow-xs: 0 2px 4px rgba(22, 86, 86, 0.04);
            --shadow-sm: 0 6px 16px rgba(22, 86, 86, 0.06);
            --shadow-md: 0 12px 28px rgba(22, 86, 86, 0.08);
            --shadow-lg: 0 20px 40px rgba(22, 86, 86, 0.12);
            --radius-card: 28px;
            --radius-element: 18px;
            --radius-full: 9999px;
            --transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            color-scheme: light;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0a1818;
                --bg-secondary: #0f2222;
                --surface: rgba(18, 30, 30, 0.85);
                --surface-solid: #142424;
                --text-primary: #e3f0f0;
                --text-secondary: #b3d1d1;
                --text-tertiary: #7aa3a3;
                --shadow-xs: 0 2px 4px rgba(0, 0, 0, 0.2);
                --shadow-sm: 0 6px 16px rgba(0, 0, 0, 0.25);
                --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.3);
                --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.4);
                color-scheme: dark;
            }
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:16px; scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
        body {
            font-family:'Cairo', sans-serif;
            background:var(--bg-primary);
            color:var(--text-primary);
            min-height:100vh;
            padding-bottom:95px;
            line-height:1.5;
            position:relative;
            transition:background 0.2s;
        }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background:radial-gradient(circle at 0% 0%, rgba(42,136,136,0.08) 0%, transparent 50%),
                       radial-gradient(circle at 100% 100%, rgba(61,138,138,0.06) 0%, transparent 50%);
        }

        .app-container { max-width:760px; margin:0 auto; padding:1.75rem 1.25rem; position:relative; z-index:2; }

        /* ==================== رأس الصفحة ==================== */
        .app-header {
            display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;
        }
        .logo { display:flex; align-items:baseline; gap:2px; }
        .logo-main { font-size:2.2rem; font-weight:800; letter-spacing:-2px; color:var(--primary-600); line-height:1; }
        .logo-sub { font-size:1.5rem; font-weight:500; color:var(--primary-300); margin-right:2px; }
        .sync-badge {
            display:flex; align-items:center; gap:8px; background:var(--surface); backdrop-filter:blur(12px);
            padding:6px 16px; border-radius:40px; font-size:0.8rem; font-weight:600; color:var(--text-secondary);
            border:1px solid var(--primary-100); box-shadow:var(--shadow-xs);
        }
        .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--success); }
        .sync-dot.syncing { background:var(--warning); animation:blink 1.2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

        /* ==================== بطاقة التقويم ==================== */
        .calendar-card {
            background:var(--surface); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            border-radius:var(--radius-card); padding:1.5rem; margin-bottom:1.5rem;
            border:1px solid rgba(255,255,255,0.3); box-shadow:var(--shadow-sm);
        }
        .cal-header {
            display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem;
        }
        .cal-nav-btn {
            width:44px; height:44px; border-radius:50%; border:none; background:var(--surface-solid);
            display:flex; align-items:center; justify-content:center; cursor:pointer;
            color:var(--text-secondary); box-shadow:var(--shadow-xs); transition:var(--transition);
        }
        .cal-nav-btn:active { transform:scale(0.94); background:var(--primary-50); }
        .cal-title { font-size:1.3rem; font-weight:800; color:var(--primary-700); }

        .month-summary {
            display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;
        }
        .summary-pill {
            background:var(--primary-50); border-radius:30px; padding:6px 14px; font-size:0.75rem;
            font-weight:700; color:var(--text-secondary); display:flex; align-items:center; gap:6px;
            border:1px solid var(--primary-100);
        }

        .weekdays {
            display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:8px;
            font-weight:700; color:var(--text-tertiary); font-size:0.75rem;
        }
        .calendar-grid {
            display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
        }
        .day-cell {
            aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
            background:var(--surface-solid); border-radius:16px; cursor:pointer; position:relative;
            border:2px solid transparent; font-size:0.9rem; font-weight:600; transition:var(--transition);
            box-shadow:var(--shadow-xs);
        }
        .day-cell:hover { transform:translateY(-2px); box-shadow:var(--shadow-sm); }
        .day-cell.today { background:var(--primary-500); color:white; }
        .day-cell.selected { border-color:var(--primary-400); }
        .day-cell.other-month { opacity:0.3; pointer-events:none; background:transparent; }
        .mood-emoji { position:absolute; top:4px; right:4px; font-size:1rem; }
        .event-dots { position:absolute; bottom:4px; display:flex; gap:3px; }
        .dot { width:5px; height:5px; border-radius:50%; }
        .dot.appt { background:var(--appt-color); }
        .dot.task { background:var(--task-color); }
        .dot.completed { background:var(--success); }

        /* ==================== منطقة تفاصيل اليوم ==================== */
        .agenda-card {
            background:var(--surface); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            border-radius:var(--radius-card); padding:1.5rem; border:1px solid rgba(255,255,255,0.3);
            box-shadow:var(--shadow-sm); display:none;
        }
        .agenda-header {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;
        }
        .agenda-title { font-size:1.2rem; font-weight:800; color:var(--primary-700); }
        .streak-badge { font-size:0.9rem; font-weight:700; color:var(--warning); }

        /* قسم المزاج */
        .mood-section {
            background:var(--primary-50); border-radius:24px; padding:18px; margin-bottom:24px;
            border:1px solid var(--primary-100);
        }
        .section-label { display:flex; align-items:center; gap:8px; font-weight:700; color:var(--text-secondary); margin-bottom:12px; }
        .mood-emojis { display:flex; gap:12px; justify-content:center; margin:16px 0; }
        .mood-option {
            font-size:2rem; cursor:pointer; filter:grayscale(0.5); opacity:0.6; transition:var(--transition);
        }
        .mood-option.selected { filter:grayscale(0); opacity:1; transform:scale(1.2); }
        .mood-note {
            width:100%; padding:12px 16px; border-radius:20px; border:1.5px solid var(--primary-100);
            background:var(--surface-solid); font-family:inherit; resize:vertical; margin:8px 0;
            color:var(--text-primary);
        }
        .save-mood-btn {
            width:100%; padding:12px; background:linear-gradient(145deg, var(--primary-600), var(--primary-500));
            color:white; border:none; border-radius:24px; font-weight:700; cursor:pointer; margin-top:8px;
            box-shadow:var(--shadow-sm); transition:var(--transition);
        }
        .save-mood-btn:active { transform:scale(0.98); }

        /* أزرار الإضافة السريعة */
        .quick-add {
            display:flex; gap:12px; margin-bottom:20px;
        }
        .quick-btn {
            flex:1; padding:12px; border-radius:30px; border:1.5px solid; background:transparent;
            font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .quick-btn.task { border-color:var(--task-color); color:var(--task-color); }
        .quick-btn.appt { border-color:var(--appt-color); color:var(--appt-color); }

        /* قائمة الأحداث */
        .events-list { display:flex; flex-direction:column; gap:12px; max-height:400px; overflow-y:auto; }
        .event-item {
            background:var(--surface-solid); border-radius:20px; padding:14px; display:flex;
            align-items:center; gap:14px; border-right:5px solid; box-shadow:var(--shadow-xs);
        }
        .event-item.appt { border-color:var(--appt-color); }
        .event-item.task { border-color:var(--task-color); }
        .event-item.completed { opacity:0.6; }
        .event-icon {
            width:44px; height:44px; border-radius:16px; display:flex; align-items:center; justify-content:center;
            background:var(--primary-50); color:var(--primary-700); flex-shrink:0;
        }
        .event-content { flex:1; }
        .event-title { font-weight:800; display:flex; align-items:center; gap:6px; }
        .event-desc { font-size:0.8rem; color:var(--text-secondary); margin-top:2px; }
        .event-time { font-weight:700; color:var(--primary-600); margin-left:8px; white-space:nowrap; }
        .event-actions { display:flex; gap:8px; }
        .icon-btn {
            width:36px; height:36px; border-radius:50%; border:none; background:transparent;
            display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-tertiary);
        }
        .icon-btn:hover { background:var(--primary-50); color:var(--danger); }
        .empty-events { text-align:center; padding:30px; color:var(--text-tertiary); }

        /* ==================== مودال الإضافة/التعديل ==================== */
        .modal-backdrop {
            position:fixed; inset:0; background:rgba(10,30,30,0.6); backdrop-filter:blur(8px);
            z-index:1000; display:flex; align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity 0.25s;
        }
        .modal-backdrop.open { opacity:1; pointer-events:auto; }
        .modal-sheet {
            background:var(--surface-solid); width:100%; max-width:500px; border-radius:32px 32px 0 0;
            padding:24px 20px 35px; transform:translateY(100%); transition:transform 0.3s cubic-bezier(.2,.9,.4,1.1);
            max-height:90vh; overflow-y:auto;
        }
        .modal-backdrop.open .modal-sheet { transform:translateY(0); }
        .modal-handle { width:50px; height:5px; background:var(--primary-100); border-radius:4px; margin:0 auto 20px; }
        .form-group { margin-bottom:18px; }
        .form-label { font-weight:700; color:var(--text-secondary); margin-bottom:6px; display:block; }
        .form-input, .form-textarea {
            width:100%; padding:14px 16px; border-radius:20px; border:1.5px solid var(--primary-100);
            background:var(--bg-primary); font-family:inherit; color:var(--text-primary); outline:none;
        }
        .type-toggle { display:flex; gap:12px; margin-bottom:20px; }
        .type-btn {
            flex:1; padding:12px; border-radius:30px; border:1.5px solid var(--primary-100);
            background:transparent; font-weight:700; cursor:pointer;
        }
        .type-btn.active { background:var(--primary-500); color:white; border-color:var(--primary-500); }
        .prio-row, .recur-row { display:flex; gap:8px; flex-wrap:wrap; }
        .pill-btn {
            padding:8px 16px; border-radius:30px; border:1.5px solid var(--primary-100);
            background:transparent; cursor:pointer; font-size:0.8rem; font-weight:600;
        }
        .pill-btn.active { background:var(--primary-500); color:white; }
        .save-btn {
            width:100%; padding:16px; background:linear-gradient(145deg, var(--primary-600), var(--primary-500));
            color:white; border:none; border-radius:30px; font-weight:800; font-size:1.1rem;
            cursor:pointer; margin-top:16px; box-shadow:var(--shadow-md);
        }

        /* FAB */
        .fab-container { position:fixed; bottom:80px; left:20px; z-index:500; }
        .fab-main {
            width:60px; height:60px; border-radius:50%; background:linear-gradient(145deg, var(--primary-600), var(--primary-500));
            border:none; color:white; font-size:24px; box-shadow:var(--shadow-lg); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        }
        .fab-options {
            position:absolute; bottom:70px; left:0; display:flex; flex-direction:column; gap:10px;
            opacity:0; pointer-events:none; transform:translateY(8px); transition:0.2s;
        }
        .fab-container.open .fab-options { opacity:1; pointer-events:auto; transform:translateY(0); }
        .fab-option {
            width:50px; height:50px; border-radius:50%; background:var(--surface-solid);
            border:none; box-shadow:var(--shadow-md); font-size:20px; cursor:pointer;
        }

        /* شريط التنقل */
        .bottom-nav {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            width:calc(100% - 32px); max-width:500px; background:var(--surface);
            backdrop-filter:blur(25px); border-radius:36px; display:flex; justify-content:space-around;
            padding:10px 8px; box-shadow:var(--shadow-lg); border:1px solid rgba(255,255,255,0.3);
            z-index:400;
        }
        .nav-link {
            text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:4px;
            padding:8px 18px; border-radius:30px; color:var(--text-tertiary); font-weight:600;
            font-size:0.7rem; transition:var(--transition);
        }
        .nav-link.active { color:var(--primary-600); background:var(--primary-50); }
        .icon { width:22px; height:22px; stroke:currentColor; stroke-width:2; fill:none; }

        @media (max-width:480px) {
            .app-container { padding:1.25rem 1rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="logo">
            <span class="logo-main">سُ</span>
            <span class="logo-sub">كُون</span>
        </div>
        <div class="sync-badge" id="syncBadge">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncText">محلي</span>
        </div>
    </header>

    <!-- بطاقة التقويم -->
    <div class="calendar-card">
        <div class="cal-header">
            <button class="cal-nav-btn" id="prevMonthBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 class="cal-title" id="calTitle"></h2>
            <button class="cal-nav-btn" id="nextMonthBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
        <div class="month-summary" id="monthSummary"></div>
        <div class="weekdays" id="weekdays"></div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- بطاقة تفاصيل اليوم -->
    <div class="agenda-card" id="agendaCard">
        <div class="agenda-header">
            <h3 class="agenda-title" id="agendaTitle"></h3>
            <span class="streak-badge" id="streakBadge"></span>
        </div>

        <!-- قسم المزاج -->
        <div class="mood-section">
            <div class="section-label">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
                <span>كيف تشعر اليوم؟</span>
            </div>
            <div class="mood-emojis" id="moodEmojis"></div>
            <textarea class="mood-note" id="moodNote" placeholder="ملاحظة (اختياري)..."></textarea>
            <button class="save-mood-btn" id="saveMoodBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" style="margin-left:6px;">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                حفظ الحالة
            </button>
        </div>

        <!-- أزرار الإضافة السريعة -->
        <div class="quick-add">
            <button class="quick-btn task" id="addTaskBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line>
                    <line x1="9" y1="15" x2="15" y2="15"></line>
                </svg>
                مهمة
            </button>
            <button class="quick-btn appt" id="addApptBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                موعد
            </button>
        </div>

        <!-- قائمة الأحداث -->
        <div class="events-list" id="eventsList"></div>
    </div>
</div>

<!-- FAB -->
<div class="fab-container" id="fabContainer">
    <div class="fab-options">
        <button class="fab-option" id="fabTask" style="color:var(--task-color);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
        </button>
        <button class="fab-option" id="fabAppt" style="color:var(--appt-color);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            </svg>
        </button>
    </div>
    <button class="fab-main" id="mainFab">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white">
            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>
</div>

<!-- شريط التنقل -->
<nav class="bottom-nav">
    <a href="patient-home.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>الرئيسية</span>

        <span>محادثاتي</span>
    </a>
    <a href="patient-agenda.html" class="nav-link active">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <span>الأجندة</span>
    </a>
    <a href="patient-tools.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24"><path d="M2 12h6M22 12h-6M12 2v6M12 22v-6M4.93 4.93l4.24 4.24M14.83 14.83l4.24 4.24M14.83 9.17l4.24-4.24M14.83 9.17l3.53-3.53M4.93 19.07l4.24-4.24"></path></svg>
        <span>أدوات</span>
    </a>
</nav>

<!-- مودال الإضافة -->
<div class="modal-backdrop" id="eventModal">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <h3 style="margin-bottom:20px; font-weight:800;" id="modalTitle">إضافة حدث</h3>
        <div class="type-toggle">
            <button class="type-btn active" id="modalTaskType">📋 مهمة</button>
            <button class="type-btn" id="modalApptType">🩺 موعد</button>
        </div>
        <div class="form-group">
            <label class="form-label">العنوان</label>
            <input type="text" id="eventTitle" class="form-input" placeholder="مثال: جلسة علاجية">
        </div>
        <div class="form-group">
            <label class="form-label">الوصف</label>
            <textarea id="eventDesc" class="form-textarea" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">التاريخ</label>
            <input type="date" id="eventDate" class="form-input">
        </div>
        <div class="form-group" id="timeRow">
            <label class="form-label">الوقت</label>
            <input type="time" id="eventTime" class="form-input">
        </div>
        <div class="form-group">
            <label class="form-label">الأولوية</label>
            <div class="prio-row" id="prioRow"></div>
        </div>
        <div class="form-group">
            <label class="form-label">التكرار</label>
            <div class="recur-row" id="recurRow"></div>
        </div>
        <button class="save-btn" id="saveEventBtn">حفظ</button>
    </div>
</div>

<script type="module">
    // استيراد إعدادات Firebase
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { 
        getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, 
        query, where, onSnapshot, enableIndexedDbPersistence 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // تفعيل التخزين المؤقت دون اتصال (Offline Persistence)
    enableIndexedDbPersistence(db).catch(err => console.warn("Offline persistence failed:", err));

    // ==================== إدارة التخزين المحلي (IndexedDB) ====================
    class AgendaCache {
        constructor() { this.db = null; }
        async init() {
            if (this.db) return;
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('SakoonAgendaDB', 2);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => { this.db = req.result; resolve(); };
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('events')) db.createObjectStore('events', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('moods')) db.createObjectStore('moods', { keyPath: 'date' });
                };
            });
        }
        async getAllEvents() {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('events', 'readonly');
                const req = tx.objectStore('events').getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => resolve([]);
            });
        }
        async saveEvents(events) {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('events', 'readwrite');
                const store = tx.objectStore('events');
                store.clear();
                events.forEach(e => store.put(e));
                tx.oncomplete = () => resolve();
            });
        }
        async getAllMoods() {
            await this.init();
            return new Promise(resolve => {
                const tx = this.db.transaction('moods', 'readonly');
                const req = tx.objectStore('moods').getAll();
                req.onsuccess = () => {
                    const moods = {};
                    (req.result || []).forEach(m => { moods[m.date] = m; });
                    resolve(moods);
                };
                req.onerror = () => resolve({});
            });
        }
        async saveMoods(moods) {
            await this.init();
            const list = Object.entries(moods).map(([date, data]) => ({ date, ...data }));
            return new Promise(resolve => {
                const tx = this.db.transaction('moods', 'readwrite');
                const store = tx.objectStore('moods');
                store.clear();
                list.forEach(m => store.put(m));
                tx.oncomplete = () => resolve();
            });
        }
    }
    const cache = new AgendaCache();

    // ==================== الحالة العامة ====================
    let currentUser = null;
    let events = [];
    let moods = {};
    let currentDate = new Date();
    let selectedDate = new Date().toISOString().split('T')[0];
    let currentType = 'task'; // 'task' or 'appt'
    let currentPrio = 'med';
    let currentRecur = 'none';
    let unsubscribeTasks = null;
    let unsubscribeAppts = null;
    let unsubscribeMoods = null;

    // ==================== دوال مساعدة ====================
    const setSyncStatus = (busy, msg) => {
        document.getElementById('syncDot').className = `sync-dot${busy ? ' syncing' : ''}`;
        document.getElementById('syncText').textContent = msg || (busy ? 'مزامنة...' : 'متصل ✓');
    };

    const isEventOnDate = (ev, dateStr) => {
        if (ev.date === dateStr) return true;
        if (!ev.recur || ev.recur === 'none') return false;
        const evDate = new Date(ev.date + 'T00:00:00');
        const curDate = new Date(dateStr + 'T00:00:00');
        if (curDate < evDate) return false;
        if (ev.recur === 'daily') return true;
        if (ev.recur === 'weekly') return evDate.getDay() === curDate.getDay();
        if (ev.recur === 'monthly') return evDate.getDate() === curDate.getDate();
        return false;
    };

    const formatDateLabel = (ds) => {
        const d = new Date(ds + 'T00:00:00');
        const today = new Date().toISOString().split('T')[0];
        if (ds === today) return 'اليوم';
        return d.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long' });
    };

    // ==================== عرض التقويم ====================
    const renderCalendar = () => {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];
        const grid = document.getElementById('calendarGrid');
        
        document.getElementById('calTitle').textContent = currentDate.toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });
        
        const weekdays = ['أحد', 'إثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة', 'سبت'];
        document.getElementById('weekdays').innerHTML = weekdays.map(d => `<div>${d}</div>`).join('');
        
        grid.innerHTML = '';
        for (let i = 0; i < firstDay; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell other-month';
            grid.appendChild(cell);
        }
        for (let d = 1; d <= daysInMonth; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (ds === todayStr) cell.classList.add('today');
            if (ds === selectedDate) cell.classList.add('selected');
            
            const dayEvents = events.filter(e => isEventOnDate(e, ds));
            const mood = moods[ds];
            
            cell.innerHTML = `<span>${d}</span>`;
            if (mood) {
                const moodSpan = document.createElement('span');
                moodSpan.className = 'mood-emoji';
                moodSpan.textContent = mood.emoji;
                cell.appendChild(moodSpan);
            }
            if (dayEvents.length) {
                const dots = document.createElement('div');
                dots.className = 'event-dots';
                if (dayEvents.some(e => e.type === 'appt')) dots.innerHTML += '<span class="dot appt"></span>';
                if (dayEvents.some(e => e.type === 'task' && !e.completed)) dots.innerHTML += '<span class="dot task"></span>';
                if (dayEvents.some(e => e.type === 'task' && e.completed)) dots.innerHTML += '<span class="dot completed"></span>';
                cell.appendChild(dots);
            }
            cell.addEventListener('click', () => { selectedDate = ds; renderCalendar(); showAgenda(ds); });
            grid.appendChild(cell);
        }

        const monthPrefix = `${year}-${String(month+1).padStart(2,'0')}`;
        const monthEvents = events.filter(e => e.date.startsWith(monthPrefix));
        const monthMoods = Object.keys(moods).filter(k => k.startsWith(monthPrefix)).length;
        document.getElementById('monthSummary').innerHTML = `
            <div class="summary-pill"><span>📅 ${monthEvents.filter(e=>e.type==='appt').length} موعد</span></div>
            <div class="summary-pill"><span>✅ ${monthEvents.filter(e=>e.type==='task').length} مهمة</span></div>
            <div class="summary-pill"><span>😊 ${monthMoods} يوم مزاج</span></div>
        `;
    };

    // ==================== عرض تفاصيل اليوم ====================
    const showAgenda = (ds) => {
        document.getElementById('agendaCard').style.display = 'block';
        document.getElementById('agendaTitle').textContent = formatDateLabel(ds);
        
        const mood = moods[ds] || {};
        document.querySelectorAll('.mood-option').forEach(el => el.classList.remove('selected'));
        if (mood.emoji) {
            document.querySelectorAll(`.mood-option[data-emoji="${mood.emoji}"]`).forEach(el => el.classList.add('selected'));
        }
        document.getElementById('moodNote').value = mood.note || '';
        
        const dayEvents = events.filter(e => isEventOnDate(e, ds)).sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));
        const list = document.getElementById('eventsList');
        if (dayEvents.length === 0) {
            list.innerHTML = `<div class="empty-events">✨ لا توجد أحداث لهذا اليوم</div>`;
        } else {
            list.innerHTML = dayEvents.map(ev => `
                <div class="event-item ${ev.type} ${ev.completed ? 'completed' : ''}">
                    ${ev.type === 'task' ? `
                        <div class="icon-btn" data-action="toggle" data-id="${ev.id}">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                ${ev.completed ? '<polyline points="20 6 9 17 4 12"></polyline>' : '<circle cx="12" cy="12" r="10"></circle>'}
                            </svg>
                        </div>
                    ` : ''}
                    <div class="event-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            ${ev.type === 'task' ? '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>' : '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line>'}
                        </svg>
                    </div>
                    <div class="event-content">
                        <div class="event-title">
                            ${ev.prio === 'high' ? '🔴' : ev.prio === 'low' ? '🟢' : '🟡'} ${ev.title}
                        </div>
                        ${ev.desc ? `<div class="event-desc">${ev.desc}</div>` : ''}
                        ${ev.recur && ev.recur !== 'none' ? `<div class="event-desc">🔄 ${ev.recur === 'daily' ? 'يومي' : ev.recur === 'weekly' ? 'أسبوعي' : 'شهري'}</div>` : ''}
                    </div>
                    ${ev.time ? `<div class="event-time">${ev.time}</div>` : ''}
                    <button class="icon-btn" data-action="delete" data-id="${ev.id}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
            
            list.querySelectorAll('[data-action="toggle"]').forEach(btn => {
                btn.addEventListener('click', e => { e.stopPropagation(); toggleTask(btn.dataset.id); });
            });
            list.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', e => { e.stopPropagation(); deleteEvent(btn.dataset.id); });
            });
        }
        
        // تحديث الستريك
        const sortedDates = Object.keys(moods).sort((a,b) => b.localeCompare(a));
        let streak = 0;
        const today = new Date().toISOString().split('T')[0];
        for (let i = 0; i < sortedDates.length; i++) {
            const diff = (new Date(today) - new Date(sortedDates[i] + 'T00:00:00')) / (1000*3600*24);
            if (diff === i) streak++; else break;
        }
        document.getElementById('streakBadge').innerHTML = streak > 1 ? `🔥 ${streak} أيام متتالية` : '';
    };

    // ==================== إجراءات على الأحداث ====================
    const toggleTask = async (id) => {
        const ev = events.find(e => e.id === id);
        if (!ev) return;
        ev.completed = !ev.completed;
        await cache.saveEvents(events);
        renderCalendar();
        showAgenda(selectedDate);
        if (currentUser) {
            await updateDoc(doc(db, 'tasks', id), { done: ev.completed });
        }
    };

    const deleteEvent = async (id) => {
        if (!confirm('حذف هذا الحدث؟')) return;
        const ev = events.find(e => e.id === id);
        events = events.filter(e => e.id !== id);
        await cache.saveEvents(events);
        renderCalendar();
        showAgenda(selectedDate);
        if (currentUser && ev) {
            const col = ev.type === 'appt' ? 'appointments' : 'tasks';
            await deleteDoc(doc(db, col, id));
        }
    };

    // ==================== حفظ المزاج ====================
    const saveMood = async () => {
        const selected = document.querySelector('.mood-option.selected');
        if (!selected) return;
        const emoji = selected.dataset.emoji;
        const note = document.getElementById('moodNote').value.trim();
        moods[selectedDate] = { emoji, note, updatedAt: new Date().toISOString() };
        await cache.saveMoods(moods);
        renderCalendar();
        showAgenda(selectedDate);
        if (currentUser) {
            const scoreMap = {'😁':5,'😊':4,'😐':3,'😌':3,'😔':2,'😢':2,'😰':1,'😠':1};
            await setDoc(doc(db, 'moods', `${currentUser.uid}_${selectedDate}`), {
                patientId: currentUser.uid, date: selectedDate,
                score: scoreMap[emoji] || 3, emoji, note, updatedAt: new Date()
            }, { merge: true });
        }
    };

    // ==================== إعدادات المودال ====================
    const setupModal = () => {
        const modal = document.getElementById('eventModal');
        const titleInput = document.getElementById('eventTitle');
        const descInput = document.getElementById('eventDesc');
        const dateInput = document.getElementById('eventDate');
        const timeInput = document.getElementById('eventTime');
        const taskTypeBtn = document.getElementById('modalTaskType');
        const apptTypeBtn = document.getElementById('modalApptType');
        const prioRow = document.getElementById('prioRow');
        const recurRow = document.getElementById('recurRow');
        
        // إعداد أزرار الأولوية والتكرار
        const renderPills = () => {
            const prios = [
                { val: 'low', label: 'منخفضة', emoji: '🟢' },
                { val: 'med', label: 'متوسطة', emoji: '🟡' },
                { val: 'high', label: 'عالية', emoji: '🔴' }
            ];
            prioRow.innerHTML = prios.map(p => 
                `<button class="pill-btn ${currentPrio === p.val ? 'active' : ''}" data-prio="${p.val}">${p.emoji} ${p.label}</button>`
            ).join('');
            
            const recs = [
                { val: 'none', label: 'بدون' },
                { val: 'daily', label: 'يومي' },
                { val: 'weekly', label: 'أسبوعي' },
                { val: 'monthly', label: 'شهري' }
            ];
            recurRow.innerHTML = recs.map(r => 
                `<button class="pill-btn ${currentRecur === r.val ? 'active' : ''}" data-recur="${r.val}">${r.label}</button>`
            ).join('');
            
            prioRow.querySelectorAll('[data-prio]').forEach(b => b.addEventListener('click', () => {
                currentPrio = b.dataset.prio;
                renderPills();
            }));
            recurRow.querySelectorAll('[data-recur]').forEach(b => b.addEventListener('click', () => {
                currentRecur = b.dataset.recur;
                renderPills();
            }));
        };
        
        const setType = (type) => {
            currentType = type;
            taskTypeBtn.classList.toggle('active', type === 'task');
            apptTypeBtn.classList.toggle('active', type === 'appt');
            document.getElementById('timeRow').style.display = type === 'appt' ? 'block' : 'none';
            recurRow.style.display = type === 'task' ? 'flex' : 'none';
        };
        
        taskTypeBtn.addEventListener('click', () => setType('task'));
        apptTypeBtn.addEventListener('click', () => setType('appt'));
        
        const openModal = (type = 'task', presetDate = selectedDate) => {
            setType(type);
            currentPrio = 'med';
            currentRecur = 'none';
            titleInput.value = '';
            descInput.value = '';
            dateInput.value = presetDate;
            timeInput.value = '';
            renderPills();
            modal.classList.add('open');
        };
        
        document.getElementById('addTaskBtn').addEventListener('click', () => openModal('task'));
        document.getElementById('addApptBtn').addEventListener('click', () => openModal('appt'));
        document.getElementById('fabTask').addEventListener('click', () => { openModal('task'); document.getElementById('fabContainer').classList.remove('open'); });
        document.getElementById('fabAppt').addEventListener('click', () => { openModal('appt'); document.getElementById('fabContainer').classList.remove('open'); });
        document.getElementById('mainFab').addEventListener('click', () => {
            document.getElementById('fabContainer').classList.toggle('open');
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('open');
        });
        
        document.getElementById('saveEventBtn').addEventListener('click', async () => {
            const title = titleInput.value.trim();
            if (!title) { alert('العنوان مطلوب'); return; }
            const date = dateInput.value;
            if (!date) { alert('التاريخ مطلوب'); return; }
            const time = timeInput.value || null;
            
            const eventData = {
                id: `${currentType}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`,
                type: currentType,
                title,
                desc: descInput.value.trim(),
                date,
                time,
                prio: currentPrio,
                recur: currentType === 'task' ? currentRecur : 'none',
                completed: false,
                patientId: currentUser.uid,
                createdAt: new Date()
            };
            
            // حفظ محلي
            events.push(eventData);
            await cache.saveEvents(events);
            renderCalendar();
            showAgenda(selectedDate);
            modal.classList.remove('open');
            
            // حفظ في Firestore
            const col = currentType === 'appt' ? 'appointments' : 'tasks';
            const { id, ...firestoreData } = eventData;
            if (currentType === 'task') firestoreData.done = false;
            await setDoc(doc(db, col, id), firestoreData);
        });
        
        // إعداد رموز المزاج
        const moodEmojis = document.getElementById('moodEmojis');
        const emojis = ['😁', '😊', '😐', '😌', '😔', '😢', '😰', '😠'];
        moodEmojis.innerHTML = emojis.map(e => `<span class="mood-option" data-emoji="${e}">${e}</span>`).join('');
        moodEmojis.querySelectorAll('.mood-option').forEach(el => {
            el.addEventListener('click', () => {
                moodEmojis.querySelectorAll('.mood-option').forEach(e => e.classList.remove('selected'));
                el.classList.add('selected');
            });
        });
        document.getElementById('saveMoodBtn').addEventListener('click', saveMood);
        
        // التنقل بين الأشهر
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
    };

    // ==================== المزامنة مع السحابة (مستمعات حية) ====================
    const startSync = (user) => {
        if (unsubscribeTasks) unsubscribeTasks();
        if (unsubscribeAppts) unsubscribeAppts();
        if (unsubscribeMoods) unsubscribeMoods();
        
        setSyncStatus(true, 'جاري المزامنة...');
        
        // مهام
        const tasksQuery = query(collection(db, 'tasks'), where('patientId', '==', user.uid));
        unsubscribeTasks = onSnapshot(tasksQuery, async (snapshot) => {
            const cloudTasks = snapshot.docs.map(d => ({
                id: d.id,
                type: 'task',
                title: d.data().title,
                desc: d.data().desc || '',
                date: d.data().date,
                time: d.data().time || null,
                prio: d.data().prio || 'med',
                recur: d.data().recur || 'none',
                completed: d.data().done || false,
                patientId: d.data().patientId
            }));
            // دمج مع المواعيد
            const appts = events.filter(e => e.type === 'appt');
            events = [...cloudTasks, ...appts];
            await cache.saveEvents(events);
            renderCalendar();
            if (selectedDate) showAgenda(selectedDate);
            setSyncStatus(false, 'متصل ✓');
        }, (err) => {
            console.warn('Tasks sync error:', err);
            setSyncStatus(false, 'خطأ في المزامنة');
        });
        
        // مواعيد
        const apptsQuery = query(collection(db, 'appointments'), where('patientId', '==', user.uid));
        unsubscribeAppts = onSnapshot(apptsQuery, async (snapshot) => {
            const cloudAppts = snapshot.docs.map(d => ({
                id: d.id,
                type: 'appt',
                title: d.data().title,
                desc: d.data().desc || '',
                date: d.data().date,
                time: d.data().time || null,
                prio: d.data().prio || 'med',
                recur: 'none',
                completed: false,
                patientId: d.data().patientId
            }));
            const tasks = events.filter(e => e.type === 'task');
            events = [...tasks, ...cloudAppts];
            await cache.saveEvents(events);
            renderCalendar();
            if (selectedDate) showAgenda(selectedDate);
        }, err => console.warn('Appointments sync error:', err));
        
        // مزاج
        const moodsQuery = query(collection(db, 'moods'), where('patientId', '==', user.uid));
        unsubscribeMoods = onSnapshot(moodsQuery, async (snapshot) => {
            const cloudMoods = {};
            snapshot.forEach(d => {
                const data = d.data();
                cloudMoods[data.date] = { emoji: data.emoji, note: data.note, updatedAt: data.updatedAt };
            });
            moods = cloudMoods;
            await cache.saveMoods(moods);
            renderCalendar();
            if (selectedDate) showAgenda(selectedDate);
        });
    };

    // ==================== تهيئة الصفحة ====================
    const init = async (user) => {
        currentUser = user;
        // تحميل من الكاش أولاً
        events = await cache.getAllEvents();
        moods = await cache.getAllMoods();
        renderCalendar();
        showAgenda(selectedDate);
        
        // إعداد واجهة المستخدم
        setupModal();
        
        // بدء المزامنة الحية
        startSync(user);
    };

    // بدء التطبيق
    onAuthStateChanged(auth, user => {
        if (user) init(user);
        else window.location.href = 'patient-login.html';
    });
</script>
</body>
</html>
